                  {importParsed.type === "qcm" ? `${importParsed.data.questions?.length || 0} questions` :
                   importParsed.type === "flashcards" ? `${importParsed.data.cards?.length || 0} cartes` :
                   importParsed.type === "truefalse" ? `${importParsed.data.questions?.length || 0} questions` :
                   importParsed.type === "fillblank" ? `${importParsed.data.sentences?.length || 0} phrases` :
                   `${importParsed.data.pairs?.length || 0} paires`}
                </Chip>
              </div>
            </div>
          </div>
        </Card>

        {/* Matière */}
        <Select label="Matière *" value={importSubjectId} onChange={setImportSubjectId}
          options={data.subjects.map(s => ({ value: s.id, label: s.name }))} />

        {/* Classes */}
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontWeight: 700, fontSize: 14, display: "block", marginBottom: 6 }}>Classes *</label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {data.classes.map(c => <label key={c.id} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 14, padding: "8px 14px", borderRadius: 10, background: importClassIds.includes(c.id) ? `${C.primary}15` : "#F0F0F8", border: importClassIds.includes(c.id) ? `2px solid ${C.primary}` : "2px solid transparent", transition: "all 0.2s" }}>
              <input type="checkbox" checked={importClassIds.includes(c.id)} onChange={e => { if (e.target.checked) setImportClassIds(ids => [...ids, c.id]); else setImportClassIds(ids => ids.filter(id => id !== c.id)); }} style={{ display: "none" }} />
              <span style={{ fontWeight: 600, color: importClassIds.includes(c.id) ? C.primary : C.textLight, display: "flex", alignItems: "center", gap: 4 }}>{importClassIds.includes(c.id) && <Icon name="CheckCircle2" size={14} color={C.primary} />}{c.name}</span>
            </label>)}
          </div>
        </div>

        {/* Cours associé (optionnel) */}
        <Select label="Associer à un cours (optionnel)" value={importCourseId} onChange={setImportCourseId}
          options={[
            { value: "", label: "— Aucun cours —" },
            ...data.courses
              .filter(c => c.subjectId === importSubjectId)
              .map(c => ({ value: c.id, label: c.title }))
          ]} />
        {importSubjectId && data.courses.filter(c => c.subjectId === importSubjectId).length === 0 &&
          <p style={{ fontSize: 12, color: C.textMuted, marginTop: -10, marginBottom: 12 }}>Aucun cours pour cette matière. Vous pourrez en créer un plus tard.</p>
        }

        {/* Buttons */}
        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          <Btn onClick={() => { setImportStep("paste"); setImportParsed(null); }} variant="ghost" style={{ flex: 1 }}><Icon name="ArrowLeft" size={14} style={{marginRight: 4}} />Retour</Btn>
          <Btn onClick={importJsonSubmit} variant="secondary" size="lg" style={{ flex: 2 }} disabled={!importSubjectId || importClassIds.length === 0}><Icon name="FileUp" size={14} style={{marginRight: 4}} />Importer l'activité</Btn>
        </div>
      </>}
    </Modal>

    {/* ── Modal : Génération IA depuis PDF ── */}
    <Modal open={modal === "aiGenerate"} onClose={() => { if (aiStep !== 'loading') { setModal(null); resetAiModal(); } }} title={aiStep === 'upload' ? "Générer avec IA — PDF" : aiStep === 'loading' ? "Analyse en cours..." : "Vérifier et sauvegarder"} wide>
      {/* Étape 1 : Upload + options */}
      {aiStep === 'upload' && <>
        <p style={{ fontSize: 13, color: C.textLight, marginBottom: 16 }}>Upload un PDF de cours. SmartKlass IA analysera le document et générera automatiquement un cours structuré et/ou des activités pédagogiques prêtes à utiliser.</p>
        <div style={{ marginBottom: 16 }}>
          <label style={{ display: 'block', fontWeight: 700, fontSize: 14, marginBottom: 8 }}>Fichier PDF *</label>
          <input type="file" accept=".pdf" onChange={e => setAiPdfFile(e.target.files[0] || null)} style={{ display: 'block', fontSize: 14, width: '100%' }} />
          {aiPdfFile && <p style={{ fontSize: 12, color: C.secondary, marginTop: 6, marginBottom: 0 }}>{aiPdfFile.name} — {(aiPdfFile.size / 1024 / 1024).toFixed(2)} Mo</p>}
        </div>
        <div style={{ marginBottom: 16 }}>
          <label style={{ display: 'block', fontWeight: 700, fontSize: 14, marginBottom: 8 }}>Que générer ?</label>
          <div style={{ display: 'flex', gap: 10, flexWrap: 'wrap' }}>
            {[['course','Cours',aiGenerateCourse,setAiGenerateCourse],['activities','Activités',aiGenerateActivities,setAiGenerateActivities]].map(([k,l,checked,setter]) =>
              <label key={k} style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', fontSize: 14, padding: '8px 16px', borderRadius: 10, background: checked ? `${C.primary}15` : '#F0F0F8', border: `2px solid ${checked ? C.primary : 'transparent'}`, transition: 'all 0.2s' }}>
                <input type="checkbox" checked={checked} onChange={e => setter(e.target.checked)} style={{ display: 'none' }} />
                {checked && <Icon name="CheckCircle2" size={14} color={C.primary} />}
                <span style={{ fontWeight: 600, color: checked ? C.primary : C.textLight }}>{l}</span>
              </label>
            )}
          </div>
        </div>
        {aiGenerateActivities && <div style={{ marginBottom: 20 }}>
          <label style={{ display: 'block', fontWeight: 700, fontSize: 14, marginBottom: 8 }}>Types d'activités à générer</label>
          <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
            {[['qcm','QCM'],['flashcards','Flashcards'],['truefalse','Vrai/Faux'],['fillblank','Texte à trous'],['matching','Associations']].map(([k,l]) => {
              const checked = aiActivityTypes.includes(k);
              return <label key={k} style={{ display: 'flex', alignItems: 'center', gap: 5, cursor: 'pointer', fontSize: 13, padding: '6px 12px', borderRadius: 8, background: checked ? `${C.secondary}20` : '#F0F0F8', border: `2px solid ${checked ? C.secondary : 'transparent'}`, transition: 'all 0.2s' }}>
                <input type="checkbox" checked={checked} onChange={e => { if (e.target.checked) setAiActivityTypes(t => [...t,k]); else setAiActivityTypes(t => t.filter(x => x !== k)); }} style={{ display: 'none' }} />
                {checked && <Icon name="Check" size={12} color={C.secondary} />}
                <span style={{ fontWeight: 600, color: checked ? C.secondary : C.textLight }}>{l}</span>
              </label>;
            })}
          </div>
        </div>}
        <Btn onClick={handleAiGenerate} variant="primary" fullWidth size="lg" disabled={!aiPdfFile}><Icon name="Sparkles" size={16} style={{marginRight: 6}} />Analyser le PDF avec SmartKlass IA</Btn>
      </>}

      {/* Étape 2 : Chargement */}
      {aiStep === 'loading' && <div style={{ textAlign: 'center', padding: '40px 20px' }}>
        <div style={{ width: 48, height: 48, border: `4px solid ${C.primary}30`, borderTopColor: C.primary, borderRadius: '50%', animation: 'spin 0.8s linear infinite', margin: '0 auto 20px' }} />
        <p style={{ fontWeight: 700, fontSize: 16, marginBottom: 8 }}>SmartKlass IA analyse votre PDF...</p>
        <p style={{ fontSize: 13, color: C.textLight, margin: 0 }}>Génération du contenu pédagogique en cours, cela peut prendre 15-30 secondes.</p>
      </div>}

      {/* Étape 3 : Révision + configuration */}
      {aiStep === 'review' && <>
        {/* Cours */}
        {aiEditCourse && <div style={{ marginBottom: 20 }}>
          <h4 style={{ fontWeight: 800, fontSize: 15, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="BookOpen" size={16} color={C.primary} />Cours généré</h4>
          <Input label="Titre" value={aiEditCourse.title} onChange={v => setAiEditCourse(c => ({ ...c, title: v }))} />
          <Input label="Description" value={aiEditCourse.description || ''} onChange={v => setAiEditCourse(c => ({ ...c, description: v }))} />
          {aiEditCourse.chapters?.length > 0 && <div style={{ marginTop: 8 }}>
            <p style={{ fontSize: 12, fontWeight: 700, color: C.textLight, marginBottom: 8 }}>{aiEditCourse.chapters.length} chapitre(s) généré(s) :</p>
            {aiEditCourse.chapters.map((ch, i) => <div key={i} style={{ background: '#F7F7FF', borderRadius: 12, padding: '10px 14px', marginBottom: 8, border: '1px solid #E8E8F0' }}>
              <p style={{ fontWeight: 800, fontSize: 13, margin: '0 0 6px' }}>{ch.title}</p>
              <Markdown content={ch.content} style={{ color: C.textLight }} />
            </div>)}
          </div>}
        </div>}
        {/* Activités */}
        {aiEditActivities.length > 0 && <div style={{ marginBottom: 20 }}>
          <h4 style={{ fontWeight: 800, fontSize: 15, marginBottom: 12, display: 'flex', alignItems: 'center', gap: 6 }}><Icon name="Layers" size={16} color={C.secondary} />Activités générées ({aiEditActivities.length})</h4>
          {aiEditActivities.map((act, idx) => <div key={act._id} style={{ background: '#F7F7FF', borderRadius: 14, padding: 16, marginBottom: 10, border: '1px solid #E8E8F0' }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap' }}>
                <Chip color={C.secondary}>{{ qcm:'QCM', flashcards:'Flashcards', truefalse:'Vrai/Faux', fillblank:'Texte à trous', matching:'Associations' }[act.type]}</Chip>
                <Chip color={C.textMuted}>Diff. {act.difficulty || 2}/3</Chip>
                <Chip color={C.warning}>+{act.xpReward || 40} XP</Chip>
              </div>
              <Btn onClick={() => setAiEditActivities(as => as.filter((_,i) => i !== idx))} variant="ghost" size="xs"><Icon name="Trash2" size={14} color={C.danger} /></Btn>
            </div>
            <Input label="Titre" value={act.title} onChange={v => setAiEditActivities(as => as.map((a,i) => i === idx ? { ...a, title: v } : a))} />
            <div>
              <label style={{ fontWeight: 700, fontSize: 13, display: 'block', marginBottom: 6 }}>Données (JSON)</label>
              <textarea value={act._dataStr} onChange={e => setAiEditActivities(as => as.map((a,i) => i === idx ? { ...a, _dataStr: e.target.value } : a))} style={{ width: '100%', padding: 10, borderRadius: 10, border: 'none', background: '#1E1E2E', color: '#A6E3A1', fontFamily: 'monospace', fontSize: 11, minHeight: 120, resize: 'vertical', outline: 'none', boxSizing: 'border-box' }} />
            </div>
          </div>)}
        </div>}
        {/* Configuration */}
        <div style={{ borderTop: '1px solid #E8E8F0', paddingTop: 20, marginBottom: 16 }}>
          <h4 style={{ fontWeight: 800, fontSize: 15, marginBottom: 12 }}>Configuration</h4>
          <Select label="Matière *" value={aiSubjectId} onChange={setAiSubjectId} options={data.subjects.map(s => ({ value: s.id, label: s.name }))} />
          <div style={{ marginBottom: 16 }}>
            <label style={{ fontWeight: 700, fontSize: 14, display: 'block', marginBottom: 6 }}>Classes *</label>
            <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap' }}>
              {data.classes.map(c => <label key={c.id} style={{ display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer', fontSize: 14, padding: '8px 14px', borderRadius: 10, background: aiClassIds.includes(c.id) ? `${C.primary}15` : '#F0F0F8', border: `2px solid ${aiClassIds.includes(c.id) ? C.primary : 'transparent'}`, transition: 'all 0.2s' }}>
                <input type="checkbox" checked={aiClassIds.includes(c.id)} onChange={e => { if (e.target.checked) setAiClassIds(ids => [...ids, c.id]); else setAiClassIds(ids => ids.filter(id => id !== c.id)); }} style={{ display: 'none' }} />
                {aiClassIds.includes(c.id) && <Icon name="CheckCircle2" size={14} color={C.primary} />}
                <span style={{ fontWeight: 600, color: aiClassIds.includes(c.id) ? C.primary : C.textLight }}>{c.name}</span>
              </label>)}
            </div>
          </div>
          {!aiEditCourse && <Select label="Associer à un cours existant (optionnel)" value={aiLinkCourseId} onChange={setAiLinkCourseId} options={[{ value: '', label: '— Aucun cours —' }, ...data.courses.filter(c => c.subjectId === aiSubjectId).map(c => ({ value: c.id, label: c.title }))]} />}
        </div>
        <div style={{ display: 'flex', gap: 10 }}>
          <Btn onClick={() => setAiStep('upload')} variant="ghost" style={{ flex: 1 }}>← Recommencer</Btn>
          <Btn onClick={handleAiSave} variant="primary" size="lg" style={{ flex: 2 }} disabled={!aiSubjectId || aiClassIds.length === 0 || (!aiEditCourse && aiEditActivities.length === 0)}><Icon name="Save" size={14} style={{marginRight: 6}} />Tout sauvegarder</Btn>
        </div>
      </>}
    </Modal>


    <Modal open={modal === "exportIds"} onClose={() => setModal(null)} title="Export identifiants" wide>
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
        <Btn onClick={() => navigator.clipboard?.writeText(getExportText("all"))} variant="primary" size="sm"><Icon name="Copy" size={14} style={{marginRight: 4}} />Copier tout</Btn>
        {data.classes.map(c => <Btn key={c.id} onClick={() => navigator.clipboard?.writeText(getExportText(c.id))} variant="outline" size="sm"><Icon name="Copy" size={14} style={{marginRight: 4}} />{c.name}</Btn>)}
      </div>
      <pre style={{ background: "#1E1E2E", color: "#CDD6F4", padding: 16, borderRadius: 12, fontSize: 12, lineHeight: 1.6, whiteSpace: "pre-wrap", maxHeight: 400, overflowY: "auto" }}>{getExportText(selectedClass)}</pre>
    </Modal>

    <Modal open={modal === "importCourseJson"} onClose={() => { setModal(null); setCourseImportStep("paste"); setCourseImportParsed(null); }} title={courseImportStep === "paste" ? "Importer un cours (JSON) — Étape 1/2" : "Configurer le cours — Étape 2/2"} wide>
      {courseImportStep === "paste" && <>
        <p style={{ fontSize: 13, color: C.textLight, marginBottom: 6 }}>Collez le JSON généré par Claude. La matière et les classes seront choisies à l'étape suivante.</p>
        <code style={{ display: "block", background: "#1E1E2E", color: "#A6E3A1", padding: 12, borderRadius: 10, fontSize: 11, lineHeight: 1.5, whiteSpace: "pre-wrap", marginBottom: 12 }}>{`{
  "title": "Titre du cours",
  "description": "Résumé du cours",
  "subjectId": "A_CHOISIR",
  "classIds": ["A_CHOISIR"],
  "chapters": [
    { "title": "Chapitre 1 : ...", "content": "Le contenu du chapitre..." },
    { "title": "Chapitre 2 : ...", "content": "..." }
  ]
}`}</code>
        <textarea value={courseJsonImport} onChange={e => setCourseJsonImport(e.target.value)} placeholder='Collez le JSON du cours ici...' style={{ width: "100%", padding: 14, borderRadius: 12, border: "none", background: "#1E1E2E", color: "#A6E3A1", fontFamily: "monospace", fontSize: 12, minHeight: 200, resize: "vertical", outline: "none" }} />
        <div style={{ marginTop: 10 }}><Btn onClick={importCourseJsonParse} fullWidth size="lg" variant="secondary">Suivant →</Btn></div>
      </>}
      {courseImportStep === "configure" && courseImportParsed && <>
        <Card style={{ padding: 16, marginBottom: 16, background: "#F8F9FD" }}>
          <div style={{ fontWeight: 800, fontSize: 16, marginBottom: 4, display: "flex", alignItems: "center", gap: 8 }}><Icon name="BookOpen" size={16} color={C.primary} />{courseImportParsed.title}</div>
          {courseImportParsed.description && <div style={{ fontSize: 13, color: C.textLight, marginBottom: 6 }}>{courseImportParsed.description}</div>}
          <div style={{ fontSize: 12, color: C.textMuted }}>{courseImportParsed.chapters?.length || 0} chapitre(s)</div>
        </Card>
        <Select label="Matière *" value={courseImportSubjectId} onChange={setCourseImportSubjectId}
          options={data.subjects.map(s => ({ value: s.id, label: s.name }))} />
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontWeight: 700, fontSize: 14, display: "block", marginBottom: 6 }}>Classes *</label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {data.classes.map(c => <label key={c.id} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 14, padding: "8px 14px", borderRadius: 10, background: courseImportClassIds.includes(c.id) ? `${C.primary}15` : "#F0F0F8", border: courseImportClassIds.includes(c.id) ? `2px solid ${C.primary}` : "2px solid transparent", transition: "all 0.2s" }}>
              <input type="checkbox" checked={courseImportClassIds.includes(c.id)} onChange={e => { if (e.target.checked) setCourseImportClassIds(ids => [...ids, c.id]); else setCourseImportClassIds(ids => ids.filter(id => id !== c.id)); }} style={{ display: "none" }} />
              <span style={{ fontWeight: 600, color: courseImportClassIds.includes(c.id) ? C.primary : C.textLight, display: "flex", alignItems: "center", gap: 4 }}>{courseImportClassIds.includes(c.id) && <Icon name="CheckCircle2" size={14} color={C.primary} />}{c.name}</span>
            </label>)}
          </div>
        </div>
        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          <Btn onClick={() => { setCourseImportStep("paste"); setCourseImportParsed(null); }} variant="ghost" style={{ flex: 1 }}><Icon name="ArrowLeft" size={14} style={{marginRight: 4}} />Retour</Btn>
          <Btn onClick={importCourseJsonSubmit} variant="secondary" size="lg" style={{ flex: 2 }} disabled={!courseImportSubjectId || courseImportClassIds.length === 0}><Icon name="FileUp" size={14} style={{marginRight: 4}} />Importer le cours</Btn>
        </div>
      </>}
    </Modal>

    <Modal open={modal === "previewActivity"} onClose={() => setModal(null)} title="Aperçu" wide>
      {modal === "previewActivity" && modalData && (() => { const a = modalData; const tl = { qcm: "QCM", flashcards: "Flashcards", truefalse: "V/F", fillblank: "Trous", matching: "Assoc." }; return <><div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}><Chip color={C.primary}>{tl[a.type]}</Chip><Chip color={C.warning}>+{a.xpReward || a.xp_reward} XP</Chip></div><div style={{ background: "#F8F9FD", borderRadius: 12, padding: 16, maxHeight: 400, overflowY: "auto", fontSize: 14 }}>{a.type === "qcm" && a.data.questions.map((q, i) => <div key={i} style={{ marginBottom: 12, paddingBottom: 12, borderBottom: "1px solid #E8E8F0" }}><p style={{ fontWeight: 700 }}>Q{i + 1}: {q.q}</p>{q.choices.map((c, j) => <div key={j} style={{ fontSize: 13, color: j === q.answer ? C.secondary : C.textLight, fontWeight: j === q.answer ? 700 : 400, paddingLeft: 12 }}>{String.fromCharCode(65 + j)}) {c} {j === q.answer ? "✅" : ""}</div>)}</div>)}{a.type === "flashcards" && a.data.cards.map((c, i) => <div key={i} style={{ marginBottom: 8 }}><strong>{c.front}</strong> → <span style={{ color: C.textLight }}>{c.back}</span></div>)}{a.type === "truefalse" && a.data.questions.map((q, i) => <div key={i} style={{ marginBottom: 8 }}><strong>Q{i + 1}:</strong> {q.q} → <span style={{ color: q.answer ? C.secondary : C.danger, fontWeight: 700 }}>{q.answer ? "VRAI" : "FAUX"}</span></div>)}{a.type === "fillblank" && a.data.sentences.map((s, i) => <div key={i} style={{ marginBottom: 8 }}>{s.text.replace("___", `[${s.answer}]`)}</div>)}{a.type === "matching" && a.data.pairs.map((p, i) => <div key={i} style={{ marginBottom: 6 }}><strong>{p.left}</strong> ↔ <span style={{ color: C.textLight }}>{p.right}</span></div>)}</div></>; })()}
    </Modal>

    <Modal open={modal === "activityStats"} onClose={() => setModal(null)} title="Stats" wide>
      {modal === "activityStats" && modalData && (() => { const stats = getActivityStats(modalData); if (!stats) return <p>Introuvable</p>; return <><h3 style={{ fontWeight: 800, marginBottom: 12 }}>{stats.act.title}</h3><div style={{ display: "flex", gap: 16, marginBottom: 16, flexWrap: "wrap" }}><div style={{ textAlign: "center", padding: "12px 20px", background: "#F8F9FD", borderRadius: 12 }}><div style={{ fontSize: 11, color: C.textLight }}>Participation</div><div style={{ fontWeight: 800, fontSize: 22, color: C.primary }}>{stats.participation}%</div></div><div style={{ textAlign: "center", padding: "12px 20px", background: "#F8F9FD", borderRadius: 12 }}><div style={{ fontSize: 11, color: C.textLight }}>Moyenne</div><div style={{ fontWeight: 800, fontSize: 22, color: stats.avgScore >= 70 ? C.secondary : C.accent }}>{stats.avgScore}%</div></div><div style={{ textAlign: "center", padding: "12px 20px", background: "#F8F9FD", borderRadius: 12 }}><div style={{ fontSize: 11, color: C.textLight }}>Max</div><div style={{ fontWeight: 800, fontSize: 22, color: C.secondary }}>{stats.maxScore}%</div></div><div style={{ textAlign: "center", padding: "12px 20px", background: "#F8F9FD", borderRadius: 12 }}><div style={{ fontSize: 11, color: C.textLight }}>Min</div><div style={{ fontWeight: 800, fontSize: 22, color: C.danger }}>{stats.minScore}%</div></div></div>{stats.results.length > 0 && <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}><thead><tr style={{ borderBottom: "2px solid #F0F0F8" }}>{["Élève", "Score", "Date"].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: "left", fontWeight: 700, color: C.textLight, fontSize: 11, textTransform: "uppercase" }}>{h}</th>)}</tr></thead><tbody>{stats.results.sort((a, b) => b.score - a.score).map(r => { const st = data.students.find(s => s.id === r.studentId); return <tr key={r.id} style={{ borderBottom: "1px solid #F0F0F8" }}><td style={{ padding: "6px 8px", fontWeight: 600 }}>{st ? `${st.lastName} ${st.firstName}` : "?"}</td><td style={{ padding: "6px 8px" }}><span style={{ fontWeight: 700, color: r.score >= 70 ? C.secondary : C.danger }}>{r.score}%</span></td><td style={{ padding: "6px 8px", color: C.textLight }}>{new Date(r.completedAt).toLocaleDateString("fr-FR")}</td></tr>; })}</tbody></table>}</>; })()}
    </Modal>

    <Modal open={modal === "changeTeacherPwd"} onClose={() => setModal(null)} title="Changer le mot de passe">
      <Input icon={<Icon name="Lock" size={16} />} label="Mot de passe actuel" value={changePwdData.current} onChange={v => setChangePwdData(d => ({ ...d, current: v }))} type="password" placeholder="Mot de passe actuel" />
      <Input icon={<Icon name="Key" size={16} />} label="Nouveau mot de passe" value={changePwdData.next} onChange={v => setChangePwdData(d => ({ ...d, next: v }))} type="password" placeholder="Minimum 4 caractères" />
      <Input icon={<Icon name="Key" size={16} />} label="Confirmer le nouveau mot de passe" value={changePwdData.confirm} onChange={v => setChangePwdData(d => ({ ...d, confirm: v }))} type="password" placeholder="Retape le nouveau mot de passe" />
      {changePwdError && <p style={{ color: C.danger, fontWeight: 700, fontSize: 13, margin: "4px 0 0" }}>{changePwdError}</p>}
      <Btn onClick={changeTeacherPassword} fullWidth style={{ marginTop: 8 }}>Valider</Btn>
    </Modal>

    {/* MODAL — Modifier une activité */}
    <Modal open={modal === "editActivity"} onClose={() => { setModal(null); setEditActivityData(null); }} title="Modifier l'activité" wide>
      {editActivityData && <>
        <Input label="Titre" value={editActivityData.title} onChange={v => setEditActivityData(d => ({ ...d, title: v }))} />
        <Select label="Matière" value={editActivityData.subjectId} onChange={v => setEditActivityData(d => ({ ...d, subjectId: v }))} options={data.subjects.map(s => ({ value: s.id, label: s.name }))} />
        <div style={{ display: "flex", gap: 12 }}>
          <Select label="Difficulté" value={String(editActivityData.difficulty)} onChange={v => setEditActivityData(d => ({ ...d, difficulty: parseInt(v) }))} options={[{ value: "1", label: "1 — Facile" }, { value: "2", label: "2 — Moyen" }, { value: "3", label: "3 — Difficile" }]} style={{ flex: 1 }} />
          <Input label="XP récompense" value={String(editActivityData.xpReward)} onChange={v => setEditActivityData(d => ({ ...d, xpReward: parseInt(v) || 40 }))} type="number" style={{ flex: 1 }} />
        </div>
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontWeight: 700, fontSize: 14, display: "block", marginBottom: 6 }}>Classes</label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {data.classes.map(c => <label key={c.id} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 14, padding: "8px 14px", borderRadius: 10, background: (editActivityData.classIds || []).includes(c.id) ? `${C.primary}15` : "#F0F0F8", border: (editActivityData.classIds || []).includes(c.id) ? `2px solid ${C.primary}` : "2px solid transparent", transition: "all 0.2s" }}>
              <input type="checkbox" checked={(editActivityData.classIds || []).includes(c.id)} onChange={e => { if (e.target.checked) setEditActivityData(d => ({ ...d, classIds: [...(d.classIds||[]), c.id] })); else setEditActivityData(d => ({ ...d, classIds: (d.classIds||[]).filter(id => id !== c.id) })); }} style={{ display: "none" }} />
              <span style={{ fontWeight: 600, color: (editActivityData.classIds || []).includes(c.id) ? C.primary : C.textLight, display: "flex", alignItems: "center", gap: 4 }}>{(editActivityData.classIds || []).includes(c.id) && <Icon name="CheckCircle2" size={14} color={C.primary} />}{c.name}</span>
            </label>)}
          </div>
        </div>
        <Select label="Cours associé (optionnel)" value={editActivityData.courseId || ""} onChange={v => setEditActivityData(d => ({ ...d, courseId: v || null }))} options={[{ value: "", label: "— Aucun cours —" }, ...data.courses.filter(c => c.subjectId === editActivityData.subjectId).map(c => ({ value: c.id, label: c.title }))]} />
        <div style={{ marginBottom: 16 }}>
          <label style={{ display: "block", fontWeight: 700, fontSize: 14, marginBottom: 6 }}>Contenu (JSON) <span style={{ color: C.textMuted, fontSize: 11, fontWeight: 400 }}>— modifier avec précaution</span></label>
          <textarea value={typeof editActivityData.data === 'string' ? editActivityData.data : JSON.stringify(editActivityData.data, null, 2)} onChange={e => setEditActivityData(d => ({ ...d, data: e.target.value }))} style={{ width: "100%", padding: 14, borderRadius: 12, border: "none", background: "#1E1E2E", color: "#A6E3A1", fontFamily: "monospace", fontSize: 12, minHeight: 200, resize: "vertical", outline: "none" }} />
        </div>
        <Btn onClick={updateActivity} fullWidth size="lg">Enregistrer les modifications</Btn>
      </>}
    </Modal>

    {/* MODAL — Envoyer une notification push */}
    <Modal open={modal === 'sendNotif'} onClose={() => setModal(null)} title="Envoyer une notification">
      <p style={{ color: C.textLight, fontSize: 13, marginBottom: 14, fontWeight: 600 }}>
        Destinataires : élèves abonnés de <strong>{activeClass?.name}</strong>
      </p>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 14 }}>
        {NOTIF_TYPES.map(t => <label key={t.id} style={{ display: 'flex', alignItems: 'flex-start', gap: 12, padding: '12px 14px', borderRadius: 12, border: `2px solid ${notifData.typeId === t.id ? C.primary : '#E4E4F0'}`, cursor: 'pointer', transition: 'border 0.15s', background: notifData.typeId === t.id ? `${C.primary}08` : 'transparent' }}>
          <input type="radio" name="notifType" value={t.id} checked={notifData.typeId === t.id} onChange={() => setNotifData(d => ({ ...d, typeId: t.id }))} style={{ marginTop: 3 }} />
          <div><div style={{ fontWeight: 800, fontSize: 14, display: "flex", alignItems: "center", gap: 6 }}><Icon name={t.icon} size={14} />{t.title}</div>{t.id !== 'custom' && <div style={{ color: C.textLight, fontSize: 12, marginTop: 2 }}>{t.body}</div>}</div>
        </label>)}
      </div>
      {notifData.typeId === 'custom' && <Input label="Message personnalisé" value={notifData.customBody} onChange={v => setNotifData(d => ({ ...d, customBody: v }))} placeholder="Tapez votre message..." />}
      <Input icon={<Icon name="Lock" size={16} />} label="Mot de passe prof (confirmation)" value={notifData.pwd} onChange={v => setNotifData(d => ({ ...d, pwd: v }))} type="password" placeholder="Mot de passe professeur" />
      {notifData.result && <div style={{ padding: '10px 14px', borderRadius: 10, marginBottom: 12, background: notifData.result.success ? `${C.secondary}15` : '#FFE0E0', color: notifData.result.success ? C.secondary : C.danger, fontWeight: 700, fontSize: 13 }}>
        {notifData.result.success
          ? `${notifData.result.sent} notification${notifData.result.sent !== 1 ? 's' : ''} envoyée${notifData.result.sent !== 1 ? 's' : ''} (${notifData.result.total} abonné${notifData.result.total !== 1 ? 's' : ''})`
          : `${notifData.result.error || 'Erreur inconnue'}`}
      </div>}
      <Btn onClick={async () => {
        const t = NOTIF_TYPES.find(x => x.id === notifData.typeId);
        const body = notifData.typeId === 'custom' ? notifData.customBody : t.body;
        setNotifData(d => ({ ...d, sending: true, result: null }));
        try {
          const res = await api.post('push-send', { classId: activeClass?.id, title: t.title, body, teacherPassword: notifData.pwd });
          setNotifData(d => ({ ...d, sending: false, result: res }));
          if (res.success) { try { const h = await api.get(`notification-history?classId=${activeClass?.id}`); setNotifHistory(h); } catch(e) {} }
        } catch(e) { setNotifData(d => ({ ...d, sending: false, result: { success: false, error: 'Erreur serveur' } })); }
      }} fullWidth size="lg" disabled={notifData.sending || !notifData.pwd}>
        {notifData.sending ? <><Icon name="Loader" size={16} style={{marginRight: 6}} />Envoi en cours...</> : <><Icon name="Bell" size={16} style={{marginRight: 6}} />Envoyer la notification</>}
      </Btn>
      {notifHistory.length > 0 && <div style={{ marginTop: 20 }}>
        <button onClick={() => setShowNotifHistory(v => !v)} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 13, color: C.textLight, display: "flex", alignItems: "center", gap: 6, padding: "6px 0", marginBottom: 8 }}>
          <Icon name="Clock" size={14} style={{marginRight: 4}} />Historique ({notifHistory.length}) {showNotifHistory ? "▲" : "▼"}
        </button>
        {showNotifHistory && <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {notifHistory.map((h, i) => <div key={i} style={{ padding: "10px 14px", borderRadius: 12, background: "#F8F9FD", border: "1px solid #E8E8F0" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13 }}>{h.title}</div>
                {h.body && <div style={{ fontSize: 12, color: C.textLight, marginTop: 2 }}>{h.body}</div>}
              </div>
              <div style={{ flexShrink: 0, textAlign: "right" }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.secondary }}>{h.sent_count} envoyé{h.sent_count !== 1 ? 's' : ''}</div>
                <div style={{ fontSize: 10, color: C.textMuted }}>{new Date(h.sent_at).toLocaleDateString("fr-FR", { day: "2-digit", month: "2-digit", hour: "2-digit", minute: "2-digit" })}</div>
              </div>
            </div>
          </div>)}
        </div>}
      </div>}
    </Modal>

    {confirmAction && <Confirm message={confirmAction.msg} onYes={() => { confirmAction.action(); setConfirmAction(null); }} onNo={() => setConfirmAction(null)} />}

    {/* Modal de lancement Live Quiz */}
    <Modal open={!!liveModal} onClose={() => setLiveModal(null)} title="🚀 Lancer un Live Quiz">
      {liveModal && (() => {
        const act = data.activities.find(a => a.id === liveModal);
        const availableClasses = data.classes.filter(c => act?.classIds?.includes(c.id));
        const typeLabel = { qcm: 'QCM', truefalse: 'Vrai / Faux', matching: 'Associations' };
        return <div>
          <div style={{ background: '#D6303115', border: '1px solid #D6303130', borderRadius: 12, padding: '12px 16px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10 }}>
            <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#D63031', animation: 'pulse 1s ease-in-out infinite' }} />
            <div><div style={{ fontWeight: 800, fontSize: 14 }}>{liveActivityTitle}</div><div style={{ fontSize: 12, color: C.textLight }}>{typeLabel[liveActivityType] || liveActivityType}</div></div>
          </div>

          <Select label="Classe" value={liveClassId} onChange={setLiveClassId} options={availableClasses.map(c => ({ value: c.id, label: c.name }))} />

          {/* Timer */}
          <div style={{ marginTop: 12, marginBottom: 12 }}>
            <label style={{ display: 'block', fontWeight: 700, fontSize: 13, marginBottom: 6, color: C.text }}>⏱ Timer par question : {liveTimer}s</label>
            <div style={{ display: 'flex', gap: 6 }}>
              {[10, 15, 20, 30, 60].map(t => <button key={t} onClick={() => setLiveTimer(t)} style={{
                flex: 1, padding: '8px 4px', borderRadius: 10, border: `2px solid ${liveTimer === t ? C.primary : '#E0E0E0'}`,
                background: liveTimer === t ? `${C.primary}15` : '#fff', color: liveTimer === t ? C.primary : C.text,
                fontWeight: 800, fontSize: 13, cursor: 'pointer', fontFamily: "'Nunito',sans-serif", transition: 'all 0.2s'
              }}>{t}s</button>)}
            </div>
          </div>

          {/* Mode */}
          <div style={{ marginBottom: 16 }}>
            <label style={{ display: 'block', fontWeight: 700, fontSize: 13, marginBottom: 6, color: C.text }}>Mode de jeu</label>
            <div style={{ display: 'flex', gap: 8 }}>
              {[{v: 'individual', l: '👤 Individuel', d: 'Chacun pour soi'}, {v: 'team', l: '👥 Équipes', d: 'A vs B'}].map(m => <button key={m.v} onClick={() => setLiveMode(m.v)} style={{
                flex: 1, padding: '12px 10px', borderRadius: 12, border: `2px solid ${liveMode === m.v ? C.primary : '#E0E0E0'}`,
                background: liveMode === m.v ? `${C.primary}15` : '#fff', cursor: 'pointer', fontFamily: "'Nunito',sans-serif", textAlign: 'center', transition: 'all 0.2s'
              }}><div style={{ fontWeight: 800, fontSize: 14, color: liveMode === m.v ? C.primary : C.text }}>{m.l}</div><div style={{ fontSize: 11, color: C.textLight, marginTop: 2 }}>{m.d}</div></button>)}
            </div>
          </div>

          <Btn fullWidth size="lg" style={{ background: "linear-gradient(135deg, #D63031, #E17055)", marginTop: 4 }} disabled={!liveClassId} onClick={async () => {
            try {
              const res = await api.post('live-quiz', { activityId: liveModal, classId: liveClassId, timerSeconds: liveTimer, mode: liveMode });
              if (res.sessionId) {
                setLiveSession(res.sessionId);
                setLiveTotalQ(res.totalQuestions);
                setLiveModal(null);
                SoundEngine.questionReveal();
              } else {
                alert(res.error || 'Erreur lors du lancement du Live Quiz. Vérifiez que la migration v9 a été exécutée.');
              }
            } catch(e) {
              alert('Erreur réseau lors du lancement du Live Quiz : ' + (e.message || e));
            }
          }}><Icon name="Radio" size={16} style={{marginRight: 6}} />Lancer le Live Quiz</Btn>
        </div>;
      })()}
    </Modal>

    {/* Overlay Live Quiz Professeur */}
    {liveSession && <LiveQuizTeacher sessionId={liveSession} activityTitle={liveActivityTitle} totalQuestions={liveTotalQ} classStudents={data.students} onClose={() => setLiveSession(null)} />}

  </AnimatedBg>;
}

// ============================================================================
// MAIN APP — Loads data from API
// ============================================================================
function App() {
  const [data, setData] = useState(null);
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const loadData = async () => {
    try {
      const d = await api.get('data');
      setData(d);
      setError(null);
    } catch (e) {
      setError("Impossible de charger les données. Vérifiez la configuration de l'API.");
      console.error(e);
    }
    setLoading(false);
  };

  useEffect(() => { loadData(); }, []);

  const refreshData = () => loadData();

  const handleActivityComplete = async (studentId, activityId, score) => {
    try {
      const res = await api.post('results', { studentId, activityId, score });
      await loadData();
      return res;
    } catch (e) { console.error(e); }
  };

  if (loading) return React.createElement('div', { className: 'loader' },
    React.createElement('div', { className: 'spinner' }),
    React.createElement('p', { style: { color: '#636E72', fontWeight: 600 } }, 'Chargement de SmartKlass...')
  );

  if (error) return React.createElement(AnimatedBg, null,
    React.createElement('div', { style: { minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 } },
      React.createElement(Card, { style: { maxWidth: 500, textAlign: 'center', padding: 40 } },
        React.createElement(Icon, { name: 'AlertTriangle', size: 56, color: '#E67E22', style: { marginBottom: 16 } }),
        React.createElement('h2', { style: { marginBottom: 12, fontWeight: 800 } }, 'Erreur de connexion'),
        React.createElement('p', { style: { color: C.textLight, marginBottom: 20, lineHeight: 1.6 } }, error),
        React.createElement(Btn, { onClick: loadData, size: 'lg' }, 'Réessayer')
      )
    )
  );

  if (!user) return <LoginScreen onLogin={u => { setUser(u); if (u.type === 'student') registerPush(u.student.id); }} data={data} />;
  if (user.type === "teacher") return <TeacherDashboard data={data} refreshData={refreshData} onLogout={() => setUser(null)} />;
  return <StudentDashboard student={user.student} data={data} news={user.news} onLogout={() => { unregisterPush(user.student?.id); setUser(null); }} onActivityComplete={handleActivityComplete} />;
}

// ============================================================================
// PWA INSTALL PROMPT
// ============================================================================
function InstallPrompt() {
  const [show, setShow] = useState(false);
  const [isIOS, setIsIOS] = useState(false);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    // Déjà installé (mode standalone) → ne rien montrer
    const standalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
    if (standalone) return;

    // Ignoré récemment (7 jours)
    const dismissed = localStorage.getItem('sk_install_dismissed');
    if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 60 * 60 * 1000) return;

    const ios = /iPhone|iPad|iPod/.test(navigator.userAgent) && !/CriOS|FxiOS/.test(navigator.userAgent);
    const android = /Android/.test(navigator.userAgent);

    if (ios) {
      setIsIOS(true);
      setTimeout(() => { setShow(true); setTimeout(() => setVisible(true), 50); }, 2500);
    } else if (android) {
      const show = () => setTimeout(() => { setShow(true); setTimeout(() => setVisible(true), 50); }, 1500);
      if (window._deferredInstallPrompt) {
        show();
      } else {
        window.addEventListener('pwa-installable', show, { once: true });
      }
    }
  }, []);

  const handleDismiss = () => {
    setVisible(false);
    setTimeout(() => setShow(false), 400);
    localStorage.setItem('sk_install_dismissed', Date.now().toString());
  };

  const handleInstall = async () => {
    const prompt = window._deferredInstallPrompt;
    if (prompt) {
      prompt.prompt();
      await prompt.userChoice;
      window._deferredInstallPrompt = null;
    }
    handleDismiss();
  };

  if (!show) return null;

  return <div style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", alignItems: "flex-end", justifyContent: "center", pointerEvents: "none" }}>
    <div onClick={handleDismiss} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.4)", pointerEvents: "auto", opacity: visible ? 1 : 0, transition: "opacity 0.4s" }} />
    <div style={{ position: "relative", width: "100%", maxWidth: 480, background: "#fff", borderRadius: "24px 24px 0 0", padding: "20px 24px 32px", boxShadow: "0 -8px 40px rgba(0,0,0,0.2)", pointerEvents: "auto", transform: visible ? "translateY(0)" : "translateY(100%)", transition: "transform 0.4s cubic-bezier(0.34,1.56,0.64,1)" }}>

      {/* Poignée */}
      <div style={{ width: 40, height: 4, background: "#E0E0E0", borderRadius: 2, margin: "0 auto 16px" }} />

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
        <div style={{ width: 54, height: 54, borderRadius: 14, background: "linear-gradient(135deg, #6C5CE7, #A29BFE)", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><Icon name="BookOpen" size={28} color="#fff" /></div>
        <div>
          <div style={{ fontWeight: 900, fontSize: 17, color: "#2D3436" }}>Installer SmartKlass</div>
          <div style={{ fontSize: 13, color: "#636E72", marginTop: 2 }}>Accès rapide depuis ton écran d'accueil</div>
        </div>
      </div>

      {isIOS ? <>
        {/* Instructions iOS */}
        <div style={{ background: "#F8F9FD", borderRadius: 16, padding: "14px 16px", marginBottom: 16 }}>
          {[
            { n: 1, text: <>Appuie sur le bouton <strong>Partager</strong> <Icon name="Share2" size={14} style={{verticalAlign: "middle"}} /> en bas de Safari</> },
            { n: 2, text: <>Fais défiler et appuie sur <strong>"Sur l'écran d'accueil"</strong> — l'icône avec un <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 20, height: 20, borderRadius: 5, border: "1.5px solid #2D3436", fontSize: 14, fontWeight: 900, lineHeight: 1, verticalAlign: "middle", marginLeft: 2 }}>+</span></> },
            { n: 3, text: <>Confirme en appuyant sur <strong>"Ajouter"</strong> en haut à droite</> },
          ].map((step, i) => <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: i < 2 ? 10 : 0 }}>
            <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 22, height: 22, borderRadius: "50%", background: "#6C5CE7", color: "#fff", fontSize: 12, fontWeight: 800, flexShrink: 0 }}>{step.n}</span>
            <span style={{ fontSize: 14, color: "#2D3436", lineHeight: 1.5 }}>{step.text}</span>
          </div>)}
        </div>
        <button onClick={handleDismiss} style={{ width: "100%", padding: "14px", borderRadius: 14, border: "2px solid #E0E0E0", background: "transparent", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 15, color: "#636E72", cursor: "pointer" }}>J'ai compris</button>
      </> : <>
        {/* Bouton Android */}
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={handleDismiss} style={{ flex: 1, padding: "14px", borderRadius: 14, border: "2px solid #E0E0E0", background: "transparent", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 15, color: "#636E72", cursor: "pointer" }}>Plus tard</button>
          <button onClick={handleInstall} style={{ flex: 2, padding: "14px", borderRadius: 14, border: "none", background: "linear-gradient(135deg, #6C5CE7, #A29BFE)", fontFamily: "'Nunito',sans-serif", fontWeight: 800, fontSize: 15, color: "#fff", cursor: "pointer", boxShadow: "0 4px 15px rgba(108,92,231,0.4)", display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}><Icon name="Download" size={18} color="#fff" />Installer l'app</button>
        </div>
      </>}
    </div>
  </div>;
}

// ============================================================================
// PUSH NOTIFICATIONS — Helpers
// ============================================================================
function urlBase64ToUint8Array(b64) {
  const pad = '='.repeat((4 - b64.length % 4) % 4);
  const bin = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
  return Uint8Array.from(bin, c => c.charCodeAt(0));
}

let _pushSub = null;

async function registerPush(studentId) {
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.register('/sw.js');
    await navigator.serviceWorker.ready;
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') return;
    const { key } = await api.get('vapid-key');
    _pushSub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(key),
    });
    await api.post('push-subscribe', { studentId, subscription: _pushSub.toJSON() });
  } catch (e) { console.warn('Push non disponible :', e); }
}

async function unregisterPush(studentId) {
  try {
    if (_pushSub) { await _pushSub.unsubscribe(); _pushSub = null; }
    if (studentId) {
      const reg = await navigator.serviceWorker?.getRegistration('/sw.js');
      const existing = await reg?.pushManager?.getSubscription();
      if (existing) await existing.unsubscribe();
      await fetch(`/api/push-subscribe?studentId=${encodeURIComponent(studentId)}`, { method: 'DELETE' });
    }
  } catch (e) { /* silencieux */ }
}

ReactDOM.render(
  <ClickSpark sparkColor="#6C5CE7" sparkSize={10} sparkRadius={22} sparkCount={8} duration={450}>
    <App /><InstallPrompt />
  </ClickSpark>,
  document.getElementById('root')
);
