// ============================================================================

const { useState, useEffect, useRef, useCallback } = React;

// --- API Layer ---
const API_BASE = '/api';

const api = {
  async get(path) {
    const res = await fetch(`${API_BASE}/${path}`);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    return res.json();
  },
  async post(path, body) {
    const res = await fetch(`${API_BASE}/${path}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const text = await res.text();
    try { return JSON.parse(text); } catch(e) { console.error('API non-JSON response:', text); throw new Error(`Le serveur a répondu avec du contenu non-JSON (status ${res.status}). Vérifiez config.php.`); }
  },
  async put(path, body) {
    const res = await fetch(`${API_BASE}/${path}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    return res.json();
  },
  async del(path) {
    const res = await fetch(`${API_BASE}/${path}`, { method: 'DELETE' });
    return res.json();
  },
};

// --- BADGES ---

  { id: "xp_500", name: "Expert en herbe", icon: "🏆", desc: "Atteindre 500 XP", condition: (r, s, xp) => xp >= 500 },
  { id: "ten_activities", name: "Travailleur", icon: "📚", desc: "Compléter 10 activités", condition: (r) => r.length >= 10 },

// --- COLORS ---

function getYoutubeEmbedUrl(url) {
  if (!url) return null;
  if (url.includes('youtube.com/embed/')) return url;
  const shortMatch = url.match(/youtu\.be\/([^?&]+)/);
  if (shortMatch) return `https://www.youtube.com/embed/${shortMatch[1]}`;
  const watchMatch = url.match(/[?&]v=([^&]+)/);
  if (watchMatch) return `https://www.youtube.com/embed/${watchMatch[1]}`;
  return null;
}

function Btn({ children, onClick, variant = "primary", size = "md", style, disabled, fullWidth }) {

  const sizes = { xs: { padding: "5px 10px", fontSize: 12, borderRadius: 8 }, sm: { padding: "8px 16px", fontSize: 13, borderRadius: 10 }, md: { padding: "12px 24px", fontSize: 15, borderRadius: 14 }, lg: { padding: "16px 32px", fontSize: 17, borderRadius: 16 } };
  return React.createElement('button', { onClick, disabled, onMouseEnter: () => setHover(true), onMouseLeave: () => setHover(false), style: { ...bases[variant], ...sizes[size], border: bases[variant]?.border || "none", cursor: disabled ? "not-allowed" : "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, letterSpacing: 0.3, transition: "all 0.2s", transform: hover && !disabled ? "translateY(-2px)" : "translateY(0)", boxShadow: hover && !disabled ? "0 8px 25px rgba(108,92,231,0.25)" : "0 4px 15px rgba(0,0,0,0.08)", opacity: disabled ? 0.5 : 1, width: fullWidth ? "100%" : "auto", display: "inline-flex", alignItems: "center", justifyContent: "center", gap: 8, ...style } }, children);
}

function Card({ children, style, onClick, hover: hov }) {
  const [h, setH] = useState(false);
  return React.createElement('div', { onClick, onMouseEnter: () => setH(true), onMouseLeave: () => setH(false), style: { background: C.card, borderRadius: 20, padding: 24, boxShadow: h && hov ? "0 12px 40px rgba(108,92,231,0.15)" : "0 4px 20px rgba(0,0,0,0.06)", transition: "all 0.3s", transform: h && hov ? "translateY(-4px)" : "translateY(0)", cursor: onClick ? "pointer" : "default", ...style } }, children);
}

function ProgressBar({ value, max = 100, color = C.primary, height = 10, style }) {

    React.createElement('div', { style: { width: `${pct}%`, height: "100%", borderRadius: height, background: `linear-gradient(90deg, ${color}, ${color}88)`, transition: "width 0.6s cubic-bezier(0.4,0,0.2,1)" } })

}

function StatCard({ icon, label, value, color, sub }) {

    React.createElement('div', { style: { fontSize: 30, marginBottom: 4 } }, icon),
    React.createElement('div', { style: { fontSize: 26, fontWeight: 800, color } }, value),
    React.createElement('div', { style: { fontSize: 12, color: C.textLight, fontWeight: 600 } }, label),
    sub && React.createElement('div', { style: { fontSize: 11, color: C.textMuted, marginTop: 2 } }, sub)
  );
}

function Input({ label, value, onChange, type = "text", placeholder, style, icon, small }) {
  const [focus, setFocus] = useState(false);
  return React.createElement('div', { style: { marginBottom: small ? 8 : 16, ...style } },
    label && React.createElement('label', { style: { display: "block", marginBottom: 6, fontWeight: 700, fontSize: small ? 12 : 14, color: C.text } }, label),
    React.createElement('div', { style: { display: "flex", alignItems: "center", background: "#F0F0F8", borderRadius: small ? 10 : 14, padding: `0 ${small ? 10 : 16}px`, border: `2px solid ${focus ? C.primary : "transparent"}`, transition: "border 0.2s" } },
      icon && React.createElement('span', { style: { fontSize: small ? 16 : 20, marginRight: 10 } }, icon),
      React.createElement('input', { type, value, onChange: e => onChange(e.target.value), placeholder, onFocus: () => setFocus(true), onBlur: () => setFocus(false), style: { border: "none", background: "transparent", padding: `${small ? 10 : 14}px 0`, fontSize: small ? 13 : 15, fontFamily: "'Nunito',sans-serif", outline: "none", width: "100%", color: C.text } })
    )
  );
}

function Select({ label, value, onChange, options, style, small }) {
  return React.createElement('div', { style: { marginBottom: small ? 8 : 16, ...style } },
    label && React.createElement('label', { style: { display: "block", marginBottom: 6, fontWeight: 700, fontSize: small ? 12 : 14 } }, label),
    React.createElement('select', { value, onChange: e => onChange(e.target.value), style: { width: "100%", padding: `${small ? 10 : 14}px 16px`, borderRadius: small ? 10 : 14, border: "2px solid transparent", background: "#F0F0F8", fontSize: small ? 13 : 15, fontFamily: "'Nunito',sans-serif", outline: "none", cursor: "pointer", color: C.text } },
      options.map(o => React.createElement('option', { key: o.value, value: o.value }, o.label))
    )
  );
}

function Modal({ open, onClose, title, children, wide }) {
  if (!open) return null;
  return React.createElement('div', { style: { position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.5)", backdropFilter: "blur(4px)", padding: 20 }, onClick: onClose },
    React.createElement('div', { onClick: e => e.stopPropagation(), style: { background: C.card, borderRadius: 24, padding: 32, maxWidth: wide ? 750 : 520, width: "100%", maxHeight: "85vh", overflowY: "auto", boxShadow: "0 25px 60px rgba(0,0,0,0.2)" } },
      React.createElement('div', { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 } },
        React.createElement('h2', { style: { margin: 0, fontSize: 20, fontWeight: 800 } }, title),
        React.createElement('button', { onClick: onClose, style: { border: "none", background: "#F0F0F8", borderRadius: 12, width: 36, height: 36, fontSize: 18, cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" } }, "✕")
      ),
      children
    )
  );
}

function Tabs({ tabs, active, onChange }) {
  return React.createElement('div', { style: { display: "flex", gap: 4, background: "#F0F0F8", borderRadius: 16, padding: 4, marginBottom: 20, flexWrap: "wrap" } },
    tabs.map(t => React.createElement('button', { key: t.id, onClick: () => onChange(t.id), style: { flex: 1, padding: "11px 12px", borderRadius: 12, border: "none", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontSize: 13, fontWeight: 700, transition: "all 0.2s", background: active === t.id ? C.card : "transparent", color: active === t.id ? C.primary : C.textLight, boxShadow: active === t.id ? "0 2px 10px rgba(0,0,0,0.08)" : "none", minWidth: "fit-content" } }, t.icon + " " + t.label))
  );
}

function Chip({ children, color = C.primary, style }) {

}

function Confirm({ message, onYes, onNo }) {
  return React.createElement('div', { style: { position: "fixed", inset: 0, zIndex: 2000, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.5)", backdropFilter: "blur(4px)" } },
    React.createElement(Card, { style: { maxWidth: 400, textAlign: "center", padding: 32 } },
      React.createElement('div', { style: { fontSize: 40, marginBottom: 12 } }, "⚠️"),
      React.createElement('p', { style: { fontSize: 15, fontWeight: 600, marginBottom: 20, lineHeight: 1.5 } }, message),
      React.createElement('div', { style: { display: "flex", gap: 12 } },
        React.createElement(Btn, { onClick: onNo, variant: "ghost", fullWidth: true }, "Annuler"),
        React.createElement(Btn, { onClick: onYes, variant: "danger", fullWidth: true }, "Confirmer")
      )
    )

}

// ============================================================================
// ACTIVITY COMPONENTS (JSX via Babel)
// ============================================================================
function QCMActivity({ activity, onComplete }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const [timeLeft, setTimeLeft] = useState(30);
  const timerRef = useRef(null);
  const questions = activity.data.questions;
  const q = questions[current];

  useEffect(() => {
    if (finished || showResult) return;
    setTimeLeft(30);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => { if (t <= 1) { handleAnswer(-1); return 30; } return t - 1; });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [current, finished, showResult]);

  const handleAnswer = (idx) => { clearInterval(timerRef.current); setSelected(idx); setShowResult(true); if (idx === q.answer) setScore(s => s + 1); };
  const next = () => { if (current + 1 >= questions.length) setFinished(true); else { setCurrent(c => c + 1); setSelected(null); setShowResult(false); } };

  if (finished) {
    const pct = Math.round(score / questions.length * 100);
    return <div style={{ textAlign: "center", animation: "fadeIn 0.5s" }}>
      <div style={{ fontSize: 72, marginBottom: 16 }}>{pct >= 80 ? "🏆" : pct >= 50 ? "👍" : "💪"}</div>
      <h2 style={{ fontSize: 28, fontWeight: 900 }}>{pct >= 80 ? "Excellent !" : pct >= 50 ? "Bien joué !" : "Continue !"}</h2>
      <div style={{ fontSize: 48, fontWeight: 900, color: pct >= 80 ? C.secondary : pct >= 50 ? C.primary : C.accent, marginBottom: 8 }}>{pct}%</div>
      <p style={{ color: C.textLight, marginBottom: 8 }}>{score}/{questions.length} bonnes réponses</p>
      <div style={{ display: "inline-block", background: `${C.warning}30`, padding: "8px 20px", borderRadius: 12, fontWeight: 700, color: C.accent, marginBottom: 24 }}>+{activity.xpReward || activity.xp_reward} XP ⚡</div><br />
      <Btn onClick={() => onComplete(pct)} size="lg">Terminer</Btn>
    </div>;
  }

  return <div style={{ animation: "fadeIn 0.3s" }}>
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}>
      <span style={{ fontSize: 13, fontWeight: 700, color: C.textLight }}>{current + 1}/{questions.length}</span>
      <ProgressBar value={current + 1} max={questions.length} style={{ flex: 1 }} />
      <div style={{ background: timeLeft <= 10 ? "#FFE0E0" : "#F0F0F8", padding: "6px 14px", borderRadius: 10, fontWeight: 800, fontSize: 15, color: timeLeft <= 10 ? C.danger : C.text, minWidth: 50, textAlign: "center" }}>⏱ {timeLeft}s</div>
    </div>
    <h3 style={{ fontSize: 20, fontWeight: 800, marginBottom: 20, lineHeight: 1.4 }}>{q.q}</h3>
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      {q.choices.map((c, i) => {
        let bg = "#F0F0F8", border = "2px solid transparent", col = C.text;
        if (showResult) { if (i === q.answer) { bg = "#D4EDDA"; border = `2px solid ${C.secondary}`; col = "#155724"; } else if (i === selected) { bg = "#FFE0E0"; border = `2px solid ${C.danger}`; col = C.danger; } }
        return <button key={i} onClick={() => !showResult && handleAnswer(i)} disabled={showResult} style={{ padding: "16px 20px", borderRadius: 16, border, background: bg, color: col, fontSize: 15, fontWeight: 600, fontFamily: "'Nunito',sans-serif", cursor: showResult ? "default" : "pointer", textAlign: "left", transition: "all 0.2s", display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ width: 32, height: 32, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", background: showResult && i === q.answer ? C.secondary : showResult && i === selected ? C.danger : C.primary, color: "#fff", fontSize: 14, fontWeight: 800, flexShrink: 0 }}>{String.fromCharCode(65 + i)}</span>{c}
        </button>;
      })}
    </div>
    {showResult && <div style={{ marginTop: 16, padding: 16, borderRadius: 16, background: "#F8F9FD", borderLeft: `4px solid ${selected === q.answer ? C.secondary : C.accent}`, animation: "fadeIn 0.3s" }}><div style={{ fontWeight: 700, marginBottom: 4 }}>{selected === q.answer ? "✅ Correct !" : "❌ Pas cette fois"}</div><div style={{ fontSize: 14, color: C.textLight }}>{q.explanation}</div></div>}
    {showResult && <div style={{ marginTop: 16, textAlign: "right" }}><Btn onClick={next}>{current + 1 >= questions.length ? "Résultats" : "Suivant →"}</Btn></div>}
  </div>;
}

function FlashcardsActivity({ activity, onComplete }) {
  const [current, setCurrent] = useState(0); const [flipped, setFlipped] = useState(false); const [known, setKnown] = useState([]); const [finished, setFinished] = useState(false);
  const cards = activity.data.cards; const card = cards[current];
  const xp = activity.xpReward || activity.xp_reward;
  const handleKnow = (d) => { if (d) setKnown(k => [...k, current]); if (current + 1 >= cards.length) setFinished(true); else { setCurrent(c => c + 1); setFlipped(false); } };
  if (finished) { const pct = Math.round(known.length / cards.length * 100); return <div style={{ textAlign: "center", animation: "fadeIn 0.5s" }}><div style={{ fontSize: 72, marginBottom: 16 }}>{pct >= 80 ? "🌟" : "📝"}</div><h2 style={{ fontSize: 28, fontWeight: 900 }}>Révision terminée !</h2><p style={{ fontSize: 18, color: C.textLight, marginBottom: 8 }}>Tu connaissais <strong style={{ color: C.secondary }}>{known.length}</strong> cartes sur {cards.length}</p><div style={{ display: "inline-block", background: `${C.warning}30`, padding: "8px 20px", borderRadius: 12, fontWeight: 700, color: C.accent, marginBottom: 24 }}>+{xp} XP ⚡</div><br /><Btn onClick={() => onComplete(pct)} size="lg">Terminer</Btn></div>; }
  return <div style={{ animation: "fadeIn 0.3s" }}>
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}><span style={{ fontSize: 13, fontWeight: 700, color: C.textLight }}>{current + 1}/{cards.length}</span><ProgressBar value={current + 1} max={cards.length} style={{ flex: 1 }} /></div>
    <div onClick={() => setFlipped(!flipped)} style={{ background: flipped ? C.g2 : C.g1, borderRadius: 24, padding: 40, minHeight: 220, cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", color: "#fff", textAlign: "center", transition: "all 0.4s", boxShadow: "0 12px 40px rgba(108,92,231,0.3)" }}>
      <div style={{ fontSize: 12, fontWeight: 700, opacity: 0.7, marginBottom: 12, textTransform: "uppercase", letterSpacing: 2 }}>{flipped ? "Définition" : "Concept"}</div>
      <div style={{ fontSize: 24, fontWeight: 800, lineHeight: 1.4 }}>{flipped ? card.back : card.front}</div>
      {!flipped && <div style={{ fontSize: 12, opacity: 0.6, marginTop: 16 }}>👆 Clique pour retourner</div>}
    </div>
    {flipped && <div style={{ display: "flex", gap: 12, marginTop: 20, animation: "fadeIn 0.3s" }}><Btn onClick={() => handleKnow(false)} variant="accent" fullWidth size="lg">🤔 À revoir</Btn><Btn onClick={() => handleKnow(true)} variant="secondary" fullWidth size="lg">✅ Je sais !</Btn></div>}
  </div>;
}

function TrueFalseActivity({ activity, onComplete }) {
  const [current, setCurrent] = useState(0); const [score, setScore] = useState(0); const [showResult, setShowResult] = useState(false); const [selected, setSelected] = useState(null); const [finished, setFinished] = useState(false);
  const questions = activity.data.questions; const q = questions[current];
  const xp = activity.xpReward || activity.xp_reward;
  const handleAnswer = (a) => { setSelected(a); setShowResult(true); if (a === q.answer) setScore(s => s + 1); };
  const next = () => { if (current + 1 >= questions.length) setFinished(true); else { setCurrent(c => c + 1); setSelected(null); setShowResult(false); } };
  if (finished) { const pct = Math.round(score / questions.length * 100); return <div style={{ textAlign: "center", animation: "fadeIn 0.5s" }}><div style={{ fontSize: 72, marginBottom: 16 }}>{pct >= 80 ? "🎉" : "💪"}</div><h2 style={{ fontSize: 28, fontWeight: 900 }}>{pct}%</h2><p style={{ color: C.textLight, marginBottom: 8 }}>{score}/{questions.length}</p><div style={{ display: "inline-block", background: `${C.warning}30`, padding: "8px 20px", borderRadius: 12, fontWeight: 700, color: C.accent, marginBottom: 24 }}>+{xp} XP ⚡</div><br /><Btn onClick={() => onComplete(pct)} size="lg">Terminer</Btn></div>; }
  return <div style={{ animation: "fadeIn 0.3s" }}>
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}><span style={{ fontSize: 13, fontWeight: 700, color: C.textLight }}>{current + 1}/{questions.length}</span><ProgressBar value={current + 1} max={questions.length} style={{ flex: 1 }} /></div>
    <Card style={{ textAlign: "center", padding: 32, marginBottom: 20 }}><h3 style={{ fontSize: 20, fontWeight: 800, lineHeight: 1.5 }}>{q.q}</h3></Card>
    {!showResult && <div style={{ display: "flex", gap: 12 }}><Btn onClick={() => handleAnswer(true)} variant="secondary" fullWidth size="lg">✅ VRAI</Btn><Btn onClick={() => handleAnswer(false)} variant="accent" fullWidth size="lg">❌ FAUX</Btn></div>}
    {showResult && <><div style={{ padding: 16, borderRadius: 16, marginBottom: 16, background: selected === q.answer ? "#D4EDDA" : "#FFE0E0", borderLeft: `4px solid ${selected === q.answer ? C.secondary : C.danger}`, animation: "fadeIn 0.3s" }}><div style={{ fontWeight: 700, marginBottom: 4 }}>{selected === q.answer ? "✅ Bonne réponse !" : `❌ Réponse : ${q.answer ? "VRAI" : "FAUX"}`}</div><div style={{ fontSize: 14, color: C.textLight }}>{q.explanation}</div></div><Btn onClick={next} fullWidth>{current + 1 >= questions.length ? "Résultats" : "Suivant →"}</Btn></>}
  </div>;
}

function FillBlankActivity({ activity, onComplete }) {
  const [current, setCurrent] = useState(0); const [input, setInput] = useState(""); const [score, setScore] = useState(0); const [showResult, setShowResult] = useState(false); const [isCorrect, setIsCorrect] = useState(false); const [finished, setFinished] = useState(false); const [showHint, setShowHint] = useState(false);
  const sentences = activity.data.sentences; const s = sentences[current];
  const xp = activity.xpReward || activity.xp_reward;
  const handleCheck = () => { const c = input.trim().toLowerCase() === s.answer.toLowerCase(); setIsCorrect(c); if (c) setScore(sc => sc + 1); setShowResult(true); };
  const next = () => { if (current + 1 >= sentences.length) setFinished(true); else { setCurrent(c => c + 1); setInput(""); setShowResult(false); setShowHint(false); } };
  if (finished) { const pct = Math.round(score / sentences.length * 100); return <div style={{ textAlign: "center", animation: "fadeIn 0.5s" }}><div style={{ fontSize: 72, marginBottom: 16 }}>{pct >= 80 ? "✨" : "📖"}</div><h2 style={{ fontSize: 28, fontWeight: 900 }}>{pct}%</h2><p style={{ color: C.textLight, marginBottom: 8 }}>{score}/{sentences.length}</p><div style={{ display: "inline-block", background: `${C.warning}30`, padding: "8px 20px", borderRadius: 12, fontWeight: 700, color: C.accent, marginBottom: 24 }}>+{xp} XP ⚡</div><br /><Btn onClick={() => onComplete(pct)} size="lg">Terminer</Btn></div>; }
  const parts = s.text.split("___");
  return <div style={{ animation: "fadeIn 0.3s" }}>
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20 }}><span style={{ fontSize: 13, fontWeight: 700, color: C.textLight }}>{current + 1}/{sentences.length}</span><ProgressBar value={current + 1} max={sentences.length} style={{ flex: 1 }} /></div>
    <Card style={{ padding: 28, marginBottom: 20, fontSize: 18, lineHeight: 2 }}>{parts[0]}<span style={{ display: "inline-block", borderBottom: `3px solid ${C.primary}`, minWidth: 120, padding: "2px 8px", fontWeight: 800, color: showResult ? (isCorrect ? C.secondary : C.danger) : C.primary }}>{showResult ? s.answer : input || "..."}</span>{parts[1]}</Card>
    {!showResult && <><Input value={input} onChange={setInput} placeholder="Ta réponse..." icon="✏️" />{showHint && <div style={{ padding: "10px 16px", borderRadius: 12, background: `${C.warning}30`, color: "#856404", fontSize: 13, fontWeight: 600, marginBottom: 12 }}>💡 {s.hint}</div>}<div style={{ display: "flex", gap: 12 }}>{!showHint && <Btn onClick={() => setShowHint(true)} variant="ghost">💡 Indice</Btn>}<Btn onClick={handleCheck} disabled={!input.trim()} style={{ flex: 1 }}>Vérifier</Btn></div></>}
    {showResult && <><div style={{ padding: 16, borderRadius: 16, marginBottom: 16, background: isCorrect ? "#D4EDDA" : "#FFE0E0", borderLeft: `4px solid ${isCorrect ? C.secondary : C.danger}` }}>{isCorrect ? "✅ Parfait !" : `❌ Réponse : "${s.answer}"`}</div><Btn onClick={next} fullWidth>{current + 1 >= sentences.length ? "Résultats" : "Suivant →"}</Btn></>}
  </div>;
}

function MatchingActivity({ activity, onComplete }) {
  const [leftSelected, setLeftSelected] = useState(null); const [matched, setMatched] = useState([]); const [wrong, setWrong] = useState(null); const [finished, setFinished] = useState(false);
  const pairs = activity.data.pairs;
  const shuffledRight = useRef([...pairs].sort(() => Math.random() - 0.5).map(p => p.right)).current;
  const xp = activity.xpReward || activity.xp_reward;
  const handleRight = (rt) => { if (leftSelected === null) return; if (pairs[leftSelected].right === rt) { const nm = [...matched, { leftIdx: leftSelected, right: rt }]; setMatched(nm); setLeftSelected(null); if (nm.length === pairs.length) setTimeout(() => setFinished(true), 400); } else { setWrong(rt); setTimeout(() => { setWrong(null); setLeftSelected(null); }, 600); } };
  const isLM = (i) => matched.some(m => m.leftIdx === i); const isRM = (t) => matched.some(m => m.right === t);
  if (finished) return <div style={{ textAlign: "center", animation: "fadeIn 0.5s" }}><div style={{ fontSize: 72, marginBottom: 16 }}>🎯</div><h2 style={{ fontSize: 28, fontWeight: 900 }}>Toutes les paires trouvées !</h2><div style={{ display: "inline-block", background: `${C.warning}30`, padding: "8px 20px", borderRadius: 12, fontWeight: 700, color: C.accent, marginBottom: 24 }}>+{xp} XP ⚡</div><br /><Btn onClick={() => onComplete(100)} size="lg">Terminer</Btn></div>;
  return <div style={{ animation: "fadeIn 0.3s" }}>
    <p style={{ textAlign: "center", color: C.textLight, marginBottom: 16, fontWeight: 600 }}>Sélectionne un concept → sa définition</p>
    <ProgressBar value={matched.length} max={pairs.length} color={C.secondary} style={{ marginBottom: 16 }} />
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {pairs.map((p, i) => <button key={i} onClick={() => !isLM(i) && setLeftSelected(i)} disabled={isLM(i)} style={{ padding: "12px 14px", borderRadius: 12, border: `2px solid ${isLM(i) ? C.secondary : leftSelected === i ? C.primary : "transparent"}`, background: isLM(i) ? "#D4EDDA" : leftSelected === i ? `${C.primary}10` : "#F0F0F8", fontSize: 13, fontWeight: 700, fontFamily: "'Nunito',sans-serif", cursor: isLM(i) ? "default" : "pointer", textAlign: "left", opacity: isLM(i) ? 0.6 : 1 }}>{isLM(i) ? "✅ " : ""}{p.left}</button>)}
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        {shuffledRight.map((t, i) => <button key={i} onClick={() => handleRight(t)} disabled={isRM(t)} style={{ padding: "12px 14px", borderRadius: 12, border: `2px solid ${isRM(t) ? C.secondary : wrong === t ? C.danger : "transparent"}`, background: isRM(t) ? "#D4EDDA" : wrong === t ? "#FFE0E0" : "#F0F0F8", fontSize: 12, fontWeight: 600, fontFamily: "'Nunito',sans-serif", cursor: isRM(t) ? "default" : "pointer", textAlign: "left", opacity: isRM(t) ? 0.6 : 1 }}>{isRM(t) ? "✅ " : ""}{t}</button>)}
      </div>
    </div>
  </div>;
}

function ActivityPlayer({ activity, onComplete, onBack }) {
  const typeLabels = { qcm: "QCM", flashcards: "Flashcards", truefalse: "Vrai / Faux", fillblank: "Texte à trous", matching: "Associations" };

function LoginScreen({ onLogin, data }) {
  const [mode, setMode] = useState("student");
  const [studentId, setStudentId] = useState("");
  const [studentPwd, setStudentPwd] = useState("");
  const [teacherPwd, setTeacherPwd] = useState("");
  const [error, setError] = useState("");
  const [shake, setShake] = useState(false);
  const [loading, setLoading] = useState(false);
  // First login flow
  const [firstLogin, setFirstLogin] = useState(false);
  const [firstLoginStudent, setFirstLoginStudent] = useState(null);
  const [newPwd, setNewPwd] = useState("");
  const [newPwdConfirm, setNewPwdConfirm] = useState("");
  // Step: need password after identifier found
  const [needPwd, setNeedPwd] = useState(false);

  const handleLogin = async () => {
    setError(""); setLoading(true);
    try {
      if (mode === "student") {
        if (!needPwd) {
          // Step 1: check identifier
          const res = await api.post('auth', { type: 'student', identifier: studentId.trim(), password: '' });
          if (res.success && res.needsPassword) {
            // First login — show set password screen
            setFirstLogin(true); setFirstLoginStudent(res.student);
          } else if (res.success && !res.needsPassword) {
            // Has password — ask for it
            setNeedPwd(true);
          } else if (!res.success && res.error === 'Mot de passe incorrect.') {
            // Has password but we sent empty — ask for it
            setNeedPwd(true);
          } else {
            setError(res.error || "Identifiant introuvable.");
            setShake(true); setTimeout(() => setShake(false), 500);
          }
        } else {
          // Step 2: login with password
          const res = await api.post('auth', { type: 'student', identifier: studentId.trim(), password: studentPwd });
          if (res.success) onLogin({ type: "student", student: res.student });
          else { setError(res.error || "Mot de passe incorrect."); setShake(true); setTimeout(() => setShake(false), 500); }
        }
      } else {
        const res = await api.post('auth', { type: 'teacher', password: teacherPwd });
        if (res.success) onLogin({ type: "teacher" });
        else { setError(res.error || "Mot de passe incorrect."); setShake(true); setTimeout(() => setShake(false), 500); }
      }
    } catch (e) { setError("Erreur de connexion au serveur."); }
    setLoading(false);
  };

  const handleSetPassword = async () => {
    if (newPwd.length < 4) { setError("Le mot de passe doit faire au moins 4 caractères."); return; }
    if (newPwd !== newPwdConfirm) { setError("Les mots de passe ne correspondent pas."); return; }
    setLoading(true); setError("");
    try {
      await api.post('auth', { type: 'set-password', studentId: firstLoginStudent.id, newPassword: newPwd });
      onLogin({ type: "student", student: firstLoginStudent });
    } catch (e) { setError("Erreur serveur."); }
    setLoading(false);
  };

  // First login: set password screen
  if (firstLogin && firstLoginStudent) {
    return <AnimatedBg>
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
        <div style={{ maxWidth: 440, width: "100%", textAlign: "center" }}>
          <div style={{ fontSize: 56, marginBottom: 8 }}>🎉</div>
          <h1 style={{ fontSize: 28, fontWeight: 900, margin: "0 0 4px 0", color: C.primary }}>Bienvenue {firstLoginStudent.firstName} !</h1>
          <p style={{ color: C.textLight, fontSize: 15, margin: "0 0 24px 0", fontWeight: 600 }}>C'est ta première connexion. Choisis un mot de passe pour sécuriser ton compte.</p>
          <Card style={{ padding: 32, textAlign: "left" }}>
            <Input icon="🔒" label="Choisis un mot de passe" value={newPwd} onChange={setNewPwd} type="password" placeholder="Minimum 4 caractères" />
            <Input icon="🔒" label="Confirme le mot de passe" value={newPwdConfirm} onChange={setNewPwdConfirm} type="password" placeholder="Retape le même mot de passe" />
            {error && <div style={{ background: "#FFE0E0", color: C.danger, padding: "10px 16px", borderRadius: 12, fontSize: 13, fontWeight: 600, marginBottom: 16 }}>{error}</div>}
            <Btn onClick={handleSetPassword} fullWidth size="lg" disabled={loading}>{loading ? "..." : "Valider et entrer →"}</Btn>
          </Card>
        </div>
      </div>
    </AnimatedBg>;
  }

  return <AnimatedBg>
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ maxWidth: 440, width: "100%", textAlign: "center" }}>
        <img src="/logo.png" alt="SmartKlass" style={{ width: 360, marginBottom: 32, animation: "float 3s ease-in-out infinite" }} />
        <Card style={{ padding: 32 }}>
          <div style={{ display: "flex", gap: 4, background: "#F0F0F8", borderRadius: 16, padding: 4, marginBottom: 24 }}>
            {[{ id: "student", label: "👩‍🎓 Élève" }, { id: "teacher", label: "👩‍🏫 Professeur" }].map(m => <button key={m.id} onClick={() => { setMode(m.id); setError(""); setNeedPwd(false); setStudentPwd(""); }} style={{ flex: 1, padding: 12, borderRadius: 12, border: "none", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontSize: 15, fontWeight: 700, transition: "all 0.2s", background: mode === m.id ? C.card : "transparent", color: mode === m.id ? C.primary : C.textLight, boxShadow: mode === m.id ? "0 2px 10px rgba(0,0,0,0.08)" : "none" }}>{m.label}</button>)}
          </div>
          <div style={{ animation: shake ? "shake 0.5s" : "none" }}>
            {mode === "student" ? <>
              <Input icon="🔑" label="Ton identifiant" value={studentId} onChange={v => { setStudentId(v); setNeedPwd(false); setStudentPwd(""); setError(""); }} placeholder="Ex: STMG-1ÈRE-MART1" />
              {needPwd && <Input icon="🔒" label="Ton mot de passe" value={studentPwd} onChange={setStudentPwd} type="password" placeholder="Mot de passe" />}
            </> : <Input icon="🔒" label="Mot de passe" value={teacherPwd} onChange={setTeacherPwd} type="password" placeholder="Mot de passe professeur" />}
          </div>
          {error && <div style={{ background: "#FFE0E0", color: C.danger, padding: "10px 16px", borderRadius: 12, fontSize: 13, fontWeight: 600, marginBottom: 16 }}>{error}</div>}
          <Btn onClick={handleLogin} fullWidth size="lg" disabled={loading}>{loading ? "Connexion..." : needPwd ? "Se connecter →" : mode === "student" ? "Suivant →" : "Se connecter →"}</Btn>
        </Card>
        <p style={{ marginTop: 20, fontSize: 12, color: C.textMuted }}>SmartKlass v2.0 — Plateforme STMG</p>
      </div>
    </div>
  </AnimatedBg>;
}

          : <>{/* Course list */}
            <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 14 }}>📖 Mes cours</h2>
            {myCourses.map(c => { const sub = data.subjects.find(s => s.id === c.subjectId); const nbActs = data.activities.filter(a => a.courseId === c.id).length; return <Card key={c.id} hover onClick={() => setActiveCourse(c)} style={{ marginBottom: 10, padding: 18, cursor: "pointer" }}><div style={{ display: "flex", gap: 12, alignItems: "center" }}><div style={{ width: 46, height: 46, borderRadius: 12, background: `${sub?.color || C.primary}20`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22, flexShrink: 0 }}>{sub?.icon || "📖"}</div><div style={{ flex: 1 }}><Chip color={sub?.color}>{sub?.name}</Chip><h3 style={{ fontSize: 16, fontWeight: 800, margin: "4px 0" }}>{c.title}</h3><p style={{ fontSize: 13, color: C.textLight, margin: 0 }}>{c.description}</p><div style={{ display: "flex", gap: 6, marginTop: 6 }}>{c.chapters?.length > 0 && <Chip color={C.primary}>{c.chapters.length} chapitre{c.chapters.length > 1 ? "s" : ""}</Chip>}{nbActs > 0 && <Chip color={C.accent}>{nbActs} activité{nbActs > 1 ? "s" : ""}</Chip>}</div></div><span style={{ fontSize: 22, color: C.primary }}>→</span></div></Card>; })}
            {myCourses.length === 0 && <Card style={{ textAlign: "center", padding: 28 }}><div style={{ fontSize: 44, marginBottom: 8 }}>📭</div><p style={{ fontWeight: 700 }}>Aucun cours disponible</p></Card>}
          </>}
      </div>}

      {view === "activities" && <div style={{ animation: "fadeIn 0.4s" }}>
        <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 14 }}>🎮 Activités</h2>
        <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
          <Btn onClick={() => setSubjectFilter("all")} variant={subjectFilter === "all" ? "primary" : "outline"} size="sm">Toutes</Btn>
          {data.subjects.map(s => <Btn key={s.id} onClick={() => setSubjectFilter(s.id)} variant={subjectFilter === s.id ? "primary" : "outline"} size="sm">{s.icon} {s.name}</Btn>)}
        </div>
        {filteredActivities.map(a => { const sub = data.subjects.find(s => s.id === a.subjectId); const done = completedIds.includes(a.id); const res = myResults.find(r => r.activityId === a.id); const icons = { qcm: "🧠", flashcards: "🃏", truefalse: "⚡", fillblank: "✏️", matching: "🔗" }; const xp = a.xpReward || a.xp_reward; return <Card key={a.id} hover onClick={() => setActiveActivity(a)} style={{ display: "flex", alignItems: "center", gap: 14, padding: 14, cursor: "pointer", marginBottom: 8, border: done ? `2px solid ${C.secondary}40` : "2px solid transparent" }}><div style={{ width: 46, height: 46, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", background: done ? `${C.secondary}20` : `${sub?.color || C.primary}20`, fontSize: 22 }}>{done ? "✅" : icons[a.type]}</div><div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 14 }}>{a.title}</div><div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}><Chip color={sub?.color}>{sub?.name}</Chip><Chip color={C.warning}>+{xp} XP</Chip>{done && res && <Chip color={C.secondary}>{res.score}%</Chip>}</div></div><span style={{ fontSize: 22, color: done ? C.secondary : C.primary }}>→</span></Card>; })}
      </div>}

      {view === "leaderboard" && <div style={{ animation: "fadeIn 0.4s" }}>
        <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 14 }}>🏆 Classement — {myClass?.name}</h2>
        <Card>
          {leaderboard.map((s, i) => { const isMe = s.id === currentStudent.id; const medals = ["🥇", "🥈", "🥉"]; return <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 14px", borderRadius: 12, background: isMe ? `${C.primary}10` : i % 2 === 0 ? "#F8F9FD" : "transparent", border: isMe ? `2px solid ${C.primary}40` : "2px solid transparent", marginBottom: 2 }}><div style={{ width: 34, height: 34, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", background: i < 3 ? `${C.warning}30` : "#F0F0F8", fontSize: i < 3 ? 18 : 13, fontWeight: 800 }}>{i < 3 ? medals[i] : i + 1}</div><div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 14 }}>{s.firstName} {s.lastName} {isMe ? "(moi)" : ""}</div><div style={{ fontSize: 11, color: C.textLight }}>🔥 {s.streak}j</div></div><div style={{ fontWeight: 800, color: C.primary, fontSize: 15 }}>{s.xp} XP</div></div>; })}
        </Card>
      </div>}
    </div>
  </AnimatedBg>;
}

// ============================================================================
// TEACHER DASHBOARD (with API calls)
// ============================================================================
function TeacherDashboard({ data, refreshData, onLogout }) {
  const [view, setView] = useState("overview");
  const [modal, setModal] = useState(null);
  const [modalData, setModalData] = useState(null);
  const [selectedClass, setSelectedClass] = useState("all");
  const [confirmAction, setConfirmAction] = useState(null);
  const [newStudent, setNewStudent] = useState({ firstName: "", lastName: "", classId: "" });
  const [editStudentData, setEditStudentData] = useState(null);
  const [newClass, setNewClass] = useState({ name: "", year: "2025-2026" });
  const [editClassData, setEditClassData] = useState(null);
  const [newSubject, setNewSubject] = useState({ name: "", color: "#6C5CE7", icon: "📊" });
  const [editSubjectData, setEditSubjectData] = useState(null);
  const [newCourse, setNewCourse] = useState({ title: "", description: "", subjectId: "", classIds: [], chapters: [{ title: "", content: "" }], youtubeUrl: "" });
  const [activeCourse, setActiveCourse] = useState(null);
  const [editCourseData, setEditCourseData] = useState(null);
  const [jsonImport, setJsonImport] = useState("");

  const resetPassword = (id, name) => { setConfirmAction({ msg: `Réinitialiser le mot de passe de ${name} ? L'élève devra en créer un nouveau à sa prochaine connexion.`, action: async () => { await api.post('auth', { type: 'reset-password', studentId: id }); alert("✅ Mot de passe réinitialisé !"); refreshData(); } }); };

  const [courseJsonImport, setCourseJsonImport] = useState("");
  const importCourseJson = async () => {
    let parsed;
    try { parsed = JSON.parse(courseJsonImport); } catch (e) { alert("❌ JSON invalide :\n" + e.message); return; }
    if (!parsed.title) { alert("❌ Le champ 'title' est obligatoire."); return; }
    const subId = parsed.subjectId || data.subjects[0]?.id;
    if (!data.subjects.find(s => s.id === subId)) { alert("❌ subjectId invalide. IDs valides : " + data.subjects.map(s => s.id).join(", ")); return; }
    try {
      const payload = { subjectId: subId, classIds: parsed.classIds || data.classes.map(c => c.id), title: parsed.title, description: parsed.description || "", chapters: parsed.chapters || [] };
      const res = await api.post('courses', payload);
      if (res.error) { alert("❌ Erreur : " + res.error); return; }
      alert("✅ Cours '" + parsed.title + "' importé avec succès !");
      setCourseJsonImport(""); setModal(null); await refreshData();
    } catch (e) { alert("❌ Erreur API :\n" + e.message); }
  };

  const totalStudents = data.students.length;
  const filteredStudents = selectedClass === "all" ? data.students : data.students.filter(s => s.classId === selectedClass);

  // API HANDLERS
  const addStudent = async () => { if (!newStudent.firstName || !newStudent.lastName) return; await api.post('students', newStudent); setNewStudent({ firstName: "", lastName: "", classId: data.classes[0]?.id || "" }); setModal(null); refreshData(); };
  const updateStudent = async () => { if (!editStudentData) return; await api.put(`students/${editStudentData.id}`, editStudentData); setModal(null); refreshData(); };
  const deleteStudent = (id) => { setConfirmAction({ msg: "Supprimer cet élève ?", action: async () => { await api.del(`students/${id}`); refreshData(); } }); };
  const addClass = async () => { if (!newClass.name) return; await api.post('classes', newClass); setNewClass({ name: "", year: "2025-2026" }); setModal(null); refreshData(); };
  const updateClass = async () => { if (!editClassData) return; await api.put(`classes/${editClassData.id}`, editClassData); setModal(null); refreshData(); };
  const deleteClass = (id) => { const count = data.students.filter(s => s.classId === id).length; setConfirmAction({ msg: `Supprimer cette classe et ses ${count} élèves ?`, action: async () => { await api.del(`classes/${id}`); refreshData(); } }); };
  const addSubject = async () => { if (!newSubject.name) return; await api.post('subjects', newSubject); setNewSubject({ name: "", color: "#6C5CE7", icon: "📊" }); setModal(null); refreshData(); };
  const updateSubject = async () => { if (!editSubjectData) return; await api.put(`subjects/${editSubjectData.id}`, editSubjectData); setModal(null); refreshData(); };
  const deleteSubject = (id) => { setConfirmAction({ msg: "Supprimer cette matière ?", action: async () => { await api.del(`subjects/${id}`); refreshData(); } }); };
  const addCourse = async () => { if (!newCourse.title) return; await api.post('courses', newCourse); setNewCourse({ title: "", description: "", subjectId: data.subjects[0]?.id || "", classIds: [], chapters: [{ title: "", content: "" }], youtubeUrl: "" }); setModal(null); refreshData(); };
  const deleteCourse = (id) => { setConfirmAction({ msg: "Supprimer ce cours ?", action: async () => { await api.del(`courses/${id}`); setActiveCourse(null); refreshData(); } }); };
  const updateCourse = async () => { if (!editCourseData) return; await api.put(`courses/${editCourseData.id}`, editCourseData); setModal(null); setActiveCourse(editCourseData); refreshData(); };
  const deleteActivity = (id) => { setConfirmAction({ msg: "Supprimer cette activité ?", action: async () => { await api.del(`activities/${id}`); refreshData(); } }); };
  const [importSubjectId, setImportSubjectId] = useState("");
  const [importClassIds, setImportClassIds] = useState([]);
  const [importCourseId, setImportCourseId] = useState("");
  const [importParsed, setImportParsed] = useState(null);
  const [importStep, setImportStep] = useState("paste"); // paste | configure
  const [changePwdData, setChangePwdData] = useState({ current: "", next: "", confirm: "" });
  const [changePwdError, setChangePwdError] = useState("");

  const importJsonParse = () => {
    let parsed;
    try { parsed = JSON.parse(jsonImport); } catch (e) { alert("❌ JSON invalide — erreur de syntaxe :\n" + e.message); return; }
    if (!parsed.title || !parsed.type || !parsed.data) { alert("❌ Champs obligatoires manquants : title, type, data"); return; }
    const validTypes = ["qcm", "flashcards", "truefalse", "fillblank", "matching"];
    if (!validTypes.includes(parsed.type)) { alert("❌ Type '" + parsed.type + "' invalide.\nAcceptés : " + validTypes.join(", ")); return; }
    setImportParsed(parsed);
    // Pre-select subject if valid, else first
    const validSubject = data.subjects.find(s => s.id === parsed.subjectId);
    setImportSubjectId(validSubject ? validSubject.id : data.subjects[0]?.id || "");
    // Pre-select classes if valid, else all
    if (parsed.classIds && parsed.classIds.length > 0 && parsed.classIds.every(cid => data.classes.some(c => c.id === cid))) {
      setImportClassIds(parsed.classIds);
    } else {
      setImportClassIds(data.classes.map(c => c.id));
    }
    setImportStep("configure");
  };

  const importJsonSubmit = async () => {
    if (!importParsed || !importSubjectId || importClassIds.length === 0) { alert("❌ Sélectionne une matière et au moins une classe."); return; }
    try {
      const payload = { subjectId: importSubjectId, classIds: importClassIds, courseId: importCourseId || null, title: importParsed.title, type: importParsed.type, difficulty: importParsed.difficulty || 2, xpReward: importParsed.xpReward || 40, data: importParsed.data };
      const res = await api.post('activities', payload);
      if (res.error) { alert("❌ Erreur serveur : " + res.error); return; }
      alert("✅ Activité '" + importParsed.title + "' importée avec succès !");
      setJsonImport(""); setImportParsed(null); setImportStep("paste"); setImportCourseId(""); setModal(null); await refreshData();
    } catch (e) { alert("❌ Erreur API :\n" + e.message); }
  };

  const changeTeacherPassword = async () => {
    setChangePwdError("");
    if (changePwdData.next.length < 4) { setChangePwdError("Le nouveau mot de passe doit faire au moins 4 caractères."); return; }
    if (changePwdData.next !== changePwdData.confirm) { setChangePwdError("Les deux mots de passe ne correspondent pas."); return; }
    const res = await api.post('auth', { type: 'change-teacher-password', currentPassword: changePwdData.current, newPassword: changePwdData.next });
    if (res.success) { setChangePwdData({ current: "", next: "", confirm: "" }); setModal(null); alert("✅ Mot de passe modifié avec succès !"); }
    else setChangePwdError(res.error || "Erreur inconnue.");
  };

  const getExportText = (classId) => { const students = classId === "all" ? data.students : data.students.filter(s => s.classId === classId); let text = `SmartKlass — Identifiants\n${"=".repeat(40)}\n\n`; const grouped = {}; students.forEach(s => { const cn = data.classes.find(c => c.id === s.classId)?.name || "?"; if (!grouped[cn]) grouped[cn] = []; grouped[cn].push(s); }); Object.entries(grouped).sort().forEach(([cn, sts]) => { text += `--- ${cn} ---\n`; sts.sort((a, b) => a.lastName.localeCompare(b.lastName)).forEach(s => { text += `${s.lastName} ${s.firstName} → ${s.identifier}\n`; }); text += "\n"; }); return text; };
  const getActivityStats = (actId) => { const act = data.activities.find(a => a.id === actId); if (!act) return null; const results = data.results.filter(r => r.activityId === actId); const targetStudents = data.students.filter(s => act.classIds && act.classIds.includes(s.classId)); const participation = targetStudents.length > 0 ? Math.round(results.length / targetStudents.length * 100) : 0; const avgScore = results.length > 0 ? Math.round(results.reduce((a, r) => a + r.score, 0) / results.length) : 0; const maxScore = results.length > 0 ? Math.max(...results.map(r => r.score)) : 0; const minScore = results.length > 0 ? Math.min(...results.map(r => r.score)) : 0; return { act, results, targetStudents, participation, avgScore, maxScore, minScore }; };
  const getStudentResults = (studentId) => { const student = data.students.find(s => s.id === studentId); if (!student) return null; const results = data.results.filter(r => r.studentId === studentId); const avgScore = results.length > 0 ? Math.round(results.reduce((a, r) => a + r.score, 0) / results.length) : 0; return { student, results, avgScore }; };

  return <AnimatedBg>
    <div style={{ maxWidth: 1050, margin: "0 auto", padding: "20px 16px" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}><img src="/logo.png" alt="SmartKlass" style={{ height: 48 }} /><p style={{ color: C.textLight, fontSize: 13, fontWeight: 600, margin: 0 }}>Panel Professeur</p></div>
        <div style={{ display: "flex", gap: 8 }}>
          <button onClick={() => { setChangePwdData({ current: "", next: "", confirm: "" }); setChangePwdError(""); setModal("changeTeacherPwd"); }} style={{ background: "#F0F0F8", border: "none", borderRadius: 12, padding: "10px 20px", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 13, color: C.textLight }}>🔑 Mot de passe</button>
          <button onClick={onLogout} style={{ background: "#F0F0F8", border: "none", borderRadius: 12, padding: "10px 20px", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 13, color: C.textLight }}>Déconnexion</button>
        </div>
      </div>
      <Tabs tabs={[{ id: "overview", icon: "📊", label: "Vue d'ensemble" }, { id: "classes", icon: "🏫", label: "Classes" }, { id: "students", icon: "👩‍🎓", label: "Élèves" }, { id: "subjects", icon: "📐", label: "Matières" }, { id: "courses", icon: "📖", label: "Cours" }, { id: "activities", icon: "🎮", label: "Activités" }]} active={view} onChange={setView} />

      {/* OVERVIEW */}
      {view === "overview" && <div style={{ animation: "fadeIn 0.4s" }}>
        <div style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
          <StatCard icon="👩‍🎓" label="Élèves" value={totalStudents} color={C.primary} />
          <StatCard icon="📖" label="Cours" value={data.courses.length} color={C.secondary} />
          <StatCard icon="🎮" label="Activités" value={data.activities.length} color={C.accent} />
          <StatCard icon="⚡" label="XP moyen" value={totalStudents > 0 ? Math.round(data.students.reduce((a, s) => a + s.xp, 0) / totalStudents) : 0} color="#E67E22" />
        </div>
        <Card style={{ background: `${C.primary}08`, border: `2px solid ${C.primary}20` }}>
          <h3 style={{ fontWeight: 800, marginBottom: 6 }}>💡 Import via Claude</h3>
          <p style={{ fontSize: 13, color: C.textLight, lineHeight: 1.6 }}>Générez des activités et des cours JSON avec Claude → Activités ou Cours → Importer JSON. Demandez à Claude d'analyser un PDF de cours pour l'adapter à SmartKlass !</p>
        </Card>
      </div>}

      {/* CLASSES */}
      {view === "classes" && <div style={{ animation: "fadeIn 0.4s" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
          <h2 style={{ fontSize: 20, fontWeight: 800 }}>🏫 Classes</h2>
          <Btn onClick={() => { setNewClass({ name: "", year: "2025-2026" }); setModal("addClass"); }} size="sm">+ Ajouter</Btn>
        </div>
        {data.classes.map(c => { const count = data.students.filter(s => s.classId === c.id).length; return <Card key={c.id} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}><div><h3 style={{ fontWeight: 800, fontSize: 16, margin: 0 }}>{c.name}</h3><p style={{ fontSize: 13, color: C.textLight, margin: "2px 0 0" }}>{c.year} — {count} élèves</p></div><div style={{ display: "flex", gap: 6 }}><Btn onClick={() => { setEditClassData({ ...c }); setModal("editClass"); }} variant="outline" size="xs">✏️</Btn><Btn onClick={() => deleteClass(c.id)} variant="danger" size="xs">🗑</Btn></div></Card>; })}
      </div>}

      {/* STUDENTS */}
      {view === "students" && <div style={{ animation: "fadeIn 0.4s" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14, flexWrap: "wrap", gap: 8 }}>
          <h2 style={{ fontSize: 20, fontWeight: 800 }}>👩‍🎓 Élèves</h2>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            <Select value={selectedClass} onChange={setSelectedClass} options={[{ value: "all", label: "Toutes" }, ...data.classes.map(c => ({ value: c.id, label: c.name }))]} style={{ marginBottom: 0, minWidth: 150 }} small />
            <Btn onClick={() => { setModal("exportIds"); }} variant="secondary" size="sm">📋 Export</Btn>
            <Btn onClick={() => { setNewStudent({ firstName: "", lastName: "", classId: data.classes[0]?.id || "" }); setModal("addStudent"); }} size="sm">+ Ajouter</Btn>
          </div>

            <button onClick={() => { const chs = editCourseData.chapters.filter((_, j) => j !== i); setEditCourseData(c => ({ ...c, chapters: chs })); }} style={{ border: "none", background: "none", cursor: "pointer", color: C.danger, fontSize: 18, marginLeft: 8, padding: 4 }}>✕</button>
          </div>
          <textarea value={ch.content} onChange={e => { const chs = [...editCourseData.chapters]; chs[i] = { ...chs[i], content: e.target.value }; setEditCourseData(c => ({ ...c, chapters: chs })); }} placeholder="Contenu..." style={{ width: "100%", padding: 10, borderRadius: 10, border: "none", background: "#F0F0F8", fontFamily: "'Nunito',sans-serif", fontSize: 13, minHeight: 80, resize: "vertical", outline: "none" }} />
        </div>)}
        <Btn onClick={() => setEditCourseData(c => ({ ...c, chapters: [...(c.chapters || []), { title: "", content: "" }] }))} variant="ghost" size="xs" style={{ marginBottom: 12 }}>+ Chapitre</Btn><br />
        <Input label="🎬 Lien YouTube (optionnel)" value={editCourseData.youtubeUrl || ""} onChange={v => setEditCourseData(c => ({ ...c, youtubeUrl: v }))} placeholder="https://www.youtube.com/watch?v=..." icon="🔗" />
        <Btn onClick={updateCourse} fullWidth size="lg">Enregistrer</Btn>
      </>}
    </Modal>

    <Modal open={modal === "importJson"} onClose={() => { setModal(null); setImportStep("paste"); setImportParsed(null); }} title={importStep === "paste" ? "📥 Importer JSON — Étape 1/2" : "⚙️ Configurer l'activité — Étape 2/2"} wide>
      {importStep === "paste" && <>
        <p style={{ fontSize: 13, color: C.textLight, marginBottom: 10 }}>Collez le JSON généré par Claude, puis cliquez "Suivant" pour configurer la matière et la classe.</p>
        <textarea value={jsonImport} onChange={e => setJsonImport(e.target.value)} placeholder='{ "title": "...", "type": "qcm", "data": { ... } }' style={{ width: "100%", padding: 14, borderRadius: 12, border: "none", background: "#1E1E2E", color: "#A6E3A1", fontFamily: "monospace", fontSize: 12, minHeight: 200, resize: "vertical", outline: "none" }} />
        <div style={{ marginTop: 12 }}><Btn onClick={importJsonParse} fullWidth size="lg">Suivant →</Btn></div>
      </>}
      {importStep === "configure" && importParsed && <>
        {/* Recap */}
        <Card style={{ padding: 16, marginBottom: 16, background: "#F8F9FD" }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <span style={{ fontSize: 28 }}>{{ qcm: "🧠", flashcards: "🃏", truefalse: "⚡", fillblank: "✏️", matching: "🔗" }[importParsed.type]}</span>
            <div>
              <div style={{ fontWeight: 800, fontSize: 16 }}>{importParsed.title}</div>
              <div style={{ display: "flex", gap: 6, marginTop: 4 }}>
                <Chip color={C.primary}>{{ qcm: "QCM", flashcards: "Flashcards", truefalse: "Vrai/Faux", fillblank: "Texte à trous", matching: "Associations" }[importParsed.type]}</Chip>
                <Chip color={C.accent}>Difficulté {importParsed.difficulty || 2}/3</Chip>
                <Chip color={C.warning}>+{importParsed.xpReward || 40} XP</Chip>
                <Chip color={C.secondary}>
                  {importParsed.type === "qcm" ? `${importParsed.data.questions?.length || 0} questions` :
                   importParsed.type === "flashcards" ? `${importParsed.data.cards?.length || 0} cartes` :
                   importParsed.type === "truefalse" ? `${importParsed.data.questions?.length || 0} questions` :
                   importParsed.type === "fillblank" ? `${importParsed.data.sentences?.length || 0} phrases` :
                   `${importParsed.data.pairs?.length || 0} paires`}
                </Chip>
              </div>
            </div>
          </div>
        </Card>

        {/* Matière */}
        <Select label="📐 Matière *" value={importSubjectId} onChange={setImportSubjectId}
          options={data.subjects.map(s => ({ value: s.id, label: `${s.icon} ${s.name}` }))} />

        {/* Classes */}
        <div style={{ marginBottom: 16 }}>
          <label style={{ fontWeight: 700, fontSize: 14, display: "block", marginBottom: 6 }}>🏫 Classes *</label>
          <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
            {data.classes.map(c => <label key={c.id} style={{ display: "flex", alignItems: "center", gap: 6, cursor: "pointer", fontSize: 14, padding: "8px 14px", borderRadius: 10, background: importClassIds.includes(c.id) ? `${C.primary}15` : "#F0F0F8", border: importClassIds.includes(c.id) ? `2px solid ${C.primary}` : "2px solid transparent", transition: "all 0.2s" }}>
              <input type="checkbox" checked={importClassIds.includes(c.id)} onChange={e => { if (e.target.checked) setImportClassIds(ids => [...ids, c.id]); else setImportClassIds(ids => ids.filter(id => id !== c.id)); }} style={{ display: "none" }} />
              <span style={{ fontWeight: 600, color: importClassIds.includes(c.id) ? C.primary : C.textLight }}>{importClassIds.includes(c.id) ? "✅ " : ""}{c.name}</span>
            </label>)}
          </div>
        </div>

        {/* Cours associé (optionnel) */}
        <Select label="📖 Associer à un cours (optionnel)" value={importCourseId} onChange={setImportCourseId}
          options={[
            { value: "", label: "— Aucun cours —" },
            ...data.courses
              .filter(c => c.subjectId === importSubjectId)
              .map(c => ({ value: c.id, label: c.title }))
          ]} />
        {importSubjectId && data.courses.filter(c => c.subjectId === importSubjectId).length === 0 &&
          <p style={{ fontSize: 12, color: C.textMuted, marginTop: -10, marginBottom: 12 }}>Aucun cours pour cette matière. Vous pourrez en créer un plus tard.</p>
        }

        {/* Buttons */}
        <div style={{ display: "flex", gap: 10, marginTop: 8 }}>
          <Btn onClick={() => { setImportStep("paste"); setImportParsed(null); }} variant="ghost" style={{ flex: 1 }}>← Retour</Btn>
          <Btn onClick={importJsonSubmit} variant="secondary" size="lg" style={{ flex: 2 }} disabled={!importSubjectId || importClassIds.length === 0}>📥 Importer l'activité</Btn>
        </div>
      </>}
    </Modal>

    <Modal open={modal === "exportIds"} onClose={() => setModal(null)} title="📋 Export identifiants" wide>
      <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
        <Btn onClick={() => navigator.clipboard?.writeText(getExportText("all"))} variant="primary" size="sm">📋 Copier tout</Btn>
        {data.classes.map(c => <Btn key={c.id} onClick={() => navigator.clipboard?.writeText(getExportText(c.id))} variant="outline" size="sm">📋 {c.name}</Btn>)}
      </div>
      <pre style={{ background: "#1E1E2E", color: "#CDD6F4", padding: 16, borderRadius: 12, fontSize: 12, lineHeight: 1.6, whiteSpace: "pre-wrap", maxHeight: 400, overflowY: "auto" }}>{getExportText(selectedClass)}</pre>
    </Modal>

    <Modal open={modal === "importCourseJson"} onClose={() => setModal(null)} title="📥 Importer un cours (JSON)" wide>
      <p style={{ fontSize: 13, color: C.textLight, marginBottom: 6 }}>Collez le JSON généré par Claude. Format attendu :</p>
      <code style={{ display: "block", background: "#1E1E2E", color: "#A6E3A1", padding: 12, borderRadius: 10, fontSize: 11, lineHeight: 1.5, whiteSpace: "pre-wrap", marginBottom: 12 }}>{`{
  "title": "Titre du cours",
  "description": "Résumé du cours",
  "subjectId": "${data.subjects[0]?.id || 'sdgn'}",
  "classIds": [${data.classes.map(c => `"${c.id}"`).join(', ')}],
  "chapters": [
    { "title": "Chapitre 1 : ...", "content": "Le contenu du chapitre..." },
    { "title": "Chapitre 2 : ...", "content": "..." }
  ]
}`}</code>
      <textarea value={courseJsonImport} onChange={e => setCourseJsonImport(e.target.value)} placeholder='Collez le JSON du cours ici...' style={{ width: "100%", padding: 14, borderRadius: 12, border: "none", background: "#1E1E2E", color: "#A6E3A1", fontFamily: "monospace", fontSize: 12, minHeight: 200, resize: "vertical", outline: "none" }} />
      <div style={{ marginTop: 10 }}><Btn onClick={importCourseJson} fullWidth size="lg" variant="secondary">📥 Importer le cours</Btn></div>
    </Modal>

    <Modal open={modal === "previewActivity"} onClose={() => setModal(null)} title="👁 Aperçu" wide>
      {modal === "previewActivity" && modalData && (() => { const a = modalData; const tl = { qcm: "QCM", flashcards: "Flashcards", truefalse: "V/F", fillblank: "Trous", matching: "Assoc." }; return <><div style={{ display: "flex", gap: 6, marginBottom: 12, flexWrap: "wrap" }}><Chip color={C.primary}>{tl[a.type]}</Chip><Chip color={C.warning}>+{a.xpReward || a.xp_reward} XP</Chip></div><div style={{ background: "#F8F9FD", borderRadius: 12, padding: 16, maxHeight: 400, overflowY: "auto", fontSize: 14 }}>{a.type === "qcm" && a.data.questions.map((q, i) => <div key={i} style={{ marginBottom: 12, paddingBottom: 12, borderBottom: "1px solid #E8E8F0" }}><p style={{ fontWeight: 700 }}>Q{i + 1}: {q.q}</p>{q.choices.map((c, j) => <div key={j} style={{ fontSize: 13, color: j === q.answer ? C.secondary : C.textLight, fontWeight: j === q.answer ? 700 : 400, paddingLeft: 12 }}>{String.fromCharCode(65 + j)}) {c} {j === q.answer ? "✅" : ""}</div>)}</div>)}{a.type === "flashcards" && a.data.cards.map((c, i) => <div key={i} style={{ marginBottom: 8 }}><strong>{c.front}</strong> → <span style={{ color: C.textLight }}>{c.back}</span></div>)}{a.type === "truefalse" && a.data.questions.map((q, i) => <div key={i} style={{ marginBottom: 8 }}><strong>Q{i + 1}:</strong> {q.q} → <span style={{ color: q.answer ? C.secondary : C.danger, fontWeight: 700 }}>{q.answer ? "VRAI" : "FAUX"}</span></div>)}{a.type === "fillblank" && a.data.sentences.map((s, i) => <div key={i} style={{ marginBottom: 8 }}>{s.text.replace("___", `[${s.answer}]`)}</div>)}{a.type === "matching" && a.data.pairs.map((p, i) => <div key={i} style={{ marginBottom: 6 }}><strong>{p.left}</strong> ↔ <span style={{ color: C.textLight }}>{p.right}</span></div>)}</div></>; })()}
    </Modal>

    <Modal open={modal === "activityStats"} onClose={() => setModal(null)} title="📊 Stats" wide>
      {modal === "activityStats" && modalData && (() => { const stats = getActivityStats(modalData); if (!stats) return <p>Introuvable</p>; return <><h3 style={{ fontWeight: 800, marginBottom: 12 }}>{stats.act.title}</h3><div style={{ display: "flex", gap: 16, marginBottom: 16, flexWrap: "wrap" }}><div style={{ textAlign: "center", padding: "12px 20px", background: "#F8F9FD", borderRadius: 12 }}><div style={{ fontSize: 11, color: C.textLight }}>Participation</div><div style={{ fontWeight: 800, fontSize: 22, color: C.primary }}>{stats.participation}%</div></div><div style={{ textAlign: "center", padding: "12px 20px", background: "#F8F9FD", borderRadius: 12 }}><div style={{ fontSize: 11, color: C.textLight }}>Moyenne</div><div style={{ fontWeight: 800, fontSize: 22, color: stats.avgScore >= 70 ? C.secondary : C.accent }}>{stats.avgScore}%</div></div><div style={{ textAlign: "center", padding: "12px 20px", background: "#F8F9FD", borderRadius: 12 }}><div style={{ fontSize: 11, color: C.textLight }}>Max</div><div style={{ fontWeight: 800, fontSize: 22, color: C.secondary }}>{stats.maxScore}%</div></div><div style={{ textAlign: "center", padding: "12px 20px", background: "#F8F9FD", borderRadius: 12 }}><div style={{ fontSize: 11, color: C.textLight }}>Min</div><div style={{ fontWeight: 800, fontSize: 22, color: C.danger }}>{stats.minScore}%</div></div></div>{stats.results.length > 0 && <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}><thead><tr style={{ borderBottom: "2px solid #F0F0F8" }}>{["Élève", "Score", "Date"].map(h => <th key={h} style={{ padding: "6px 8px", textAlign: "left", fontWeight: 700, color: C.textLight, fontSize: 11, textTransform: "uppercase" }}>{h}</th>)}</tr></thead><tbody>{stats.results.sort((a, b) => b.score - a.score).map(r => { const st = data.students.find(s => s.id === r.studentId); return <tr key={r.id} style={{ borderBottom: "1px solid #F0F0F8" }}><td style={{ padding: "6px 8px", fontWeight: 600 }}>{st ? `${st.lastName} ${st.firstName}` : "?"}</td><td style={{ padding: "6px 8px" }}><span style={{ fontWeight: 700, color: r.score >= 70 ? C.secondary : C.danger }}>{r.score}%</span></td><td style={{ padding: "6px 8px", color: C.textLight }}>{new Date(r.completedAt).toLocaleDateString("fr-FR")}</td></tr>; })}</tbody></table>}</>; })()}
    </Modal>

    <Modal open={modal === "changeTeacherPwd"} onClose={() => setModal(null)} title="🔑 Changer le mot de passe">
      <Input icon="🔒" label="Mot de passe actuel" value={changePwdData.current} onChange={v => setChangePwdData(d => ({ ...d, current: v }))} type="password" placeholder="Mot de passe actuel" />
      <Input icon="🔑" label="Nouveau mot de passe" value={changePwdData.next} onChange={v => setChangePwdData(d => ({ ...d, next: v }))} type="password" placeholder="Minimum 4 caractères" />
      <Input icon="🔑" label="Confirmer le nouveau mot de passe" value={changePwdData.confirm} onChange={v => setChangePwdData(d => ({ ...d, confirm: v }))} type="password" placeholder="Retape le nouveau mot de passe" />
      {changePwdError && <p style={{ color: C.danger, fontWeight: 700, fontSize: 13, margin: "4px 0 0" }}>{changePwdError}</p>}
      <Btn onClick={changeTeacherPassword} fullWidth style={{ marginTop: 8 }}>Valider</Btn>
    </Modal>

    {confirmAction && <Confirm message={confirmAction.msg} onYes={() => { confirmAction.action(); setConfirmAction(null); }} onNo={() => setConfirmAction(null)} />}
  </AnimatedBg>;
}

// ============================================================================
// MAIN APP — Loads data from API
// ============================================================================
function App() {
  const [data, setData] = useState(null);
  const [user, setUser] = useState(null);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);

  const loadData = async () => {
    try {
      const d = await api.get('data');
      setData(d);
      setError(null);
    } catch (e) {
      setError("Impossible de charger les données. Vérifiez la configuration de l'API.");
      console.error(e);
    }
    setLoading(false);
  };

  useEffect(() => { loadData(); }, []);

  const refreshData = () => loadData();

  const handleActivityComplete = async (studentId, activityId, score) => {
    try {
      const res = await api.post('results', { studentId, activityId, score });
      await loadData();
      return res;
    } catch (e) { console.error(e); }
  };

  if (loading) return React.createElement('div', { className: 'loader' },
    React.createElement('div', { className: 'spinner' }),
    React.createElement('p', { style: { color: '#636E72', fontWeight: 600 } }, 'Chargement de SmartKlass...')
  );

  if (error) return React.createElement(AnimatedBg, null,
    React.createElement('div', { style: { minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', padding: 20 } },
      React.createElement(Card, { style: { maxWidth: 500, textAlign: 'center', padding: 40 } },
        React.createElement('div', { style: { fontSize: 56, marginBottom: 16 } }, '⚠️'),
        React.createElement('h2', { style: { marginBottom: 12, fontWeight: 800 } }, 'Erreur de connexion'),
        React.createElement('p', { style: { color: C.textLight, marginBottom: 20, lineHeight: 1.6 } }, error),
        React.createElement(Btn, { onClick: loadData, size: 'lg' }, 'Réessayer')
      )
    )
  );

  if (!user) return <LoginScreen onLogin={setUser} data={data} />;
  if (user.type === "teacher") return <TeacherDashboard data={data} refreshData={refreshData} onLogout={() => setUser(null)} />;
  return <StudentDashboard student={user.student} data={data} onLogout={() => setUser(null)} onActivityComplete={handleActivityComplete} />;
}

// ============================================================================
// PWA INSTALL PROMPT
// ============================================================================
function InstallPrompt() {
  const [show, setShow] = useState(false);
  const [isIOS, setIsIOS] = useState(false);
  const [visible, setVisible] = useState(false);

  useEffect(() => {
    // Déjà installé (mode standalone) → ne rien montrer
    const standalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
    if (standalone) return;

    // Ignoré récemment (7 jours)
    const dismissed = localStorage.getItem('sk_install_dismissed');
    if (dismissed && Date.now() - parseInt(dismissed) < 7 * 24 * 60 * 60 * 1000) return;

    const ios = /iPhone|iPad|iPod/.test(navigator.userAgent) && !/CriOS|FxiOS/.test(navigator.userAgent);
    const android = /Android/.test(navigator.userAgent);

    if (ios) {
      setIsIOS(true);
      setTimeout(() => { setShow(true); setTimeout(() => setVisible(true), 50); }, 2500);
    } else if (android) {
      const show = () => setTimeout(() => { setShow(true); setTimeout(() => setVisible(true), 50); }, 1500);
      if (window._deferredInstallPrompt) {
        show();
      } else {
        window.addEventListener('pwa-installable', show, { once: true });
      }
    }
  }, []);

  const handleDismiss = () => {
    setVisible(false);
    setTimeout(() => setShow(false), 400);
    localStorage.setItem('sk_install_dismissed', Date.now().toString());
  };

  const handleInstall = async () => {
    const prompt = window._deferredInstallPrompt;
    if (prompt) {
      prompt.prompt();
      await prompt.userChoice;
      window._deferredInstallPrompt = null;
    }
    handleDismiss();
  };

  if (!show) return null;

  return <div style={{ position: "fixed", inset: 0, zIndex: 9999, display: "flex", alignItems: "flex-end", justifyContent: "center", pointerEvents: "none" }}>
    <div onClick={handleDismiss} style={{ position: "absolute", inset: 0, background: "rgba(0,0,0,0.4)", pointerEvents: "auto", opacity: visible ? 1 : 0, transition: "opacity 0.4s" }} />
    <div style={{ position: "relative", width: "100%", maxWidth: 480, background: "#fff", borderRadius: "24px 24px 0 0", padding: "20px 24px 32px", boxShadow: "0 -8px 40px rgba(0,0,0,0.2)", pointerEvents: "auto", transform: visible ? "translateY(0)" : "translateY(100%)", transition: "transform 0.4s cubic-bezier(0.34,1.56,0.64,1)" }}>

      {/* Poignée */}
      <div style={{ width: 40, height: 4, background: "#E0E0E0", borderRadius: 2, margin: "0 auto 16px" }} />

      {/* Header */}
      <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
        <div style={{ width: 54, height: 54, borderRadius: 14, background: "linear-gradient(135deg, #6C5CE7, #A29BFE)", display: "flex", alignItems: "center", justifyContent: "center", fontSize: 28, flexShrink: 0 }}>📚</div>
        <div>
          <div style={{ fontWeight: 900, fontSize: 17, color: "#2D3436" }}>Installer SmartKlass</div>
          <div style={{ fontSize: 13, color: "#636E72", marginTop: 2 }}>Accès rapide depuis ton écran d'accueil</div>
        </div>
      </div>

      {isIOS ? <>
        {/* Instructions iOS */}
        <div style={{ background: "#F8F9FD", borderRadius: 16, padding: "14px 16px", marginBottom: 16 }}>
          {[
            { icon: "1️⃣", text: <>Appuie sur le bouton <strong>Partager</strong> <span style={{ fontSize: 16 }}>⬆️</span> en bas de Safari</> },
            { icon: "2️⃣", text: <>Fais défiler et appuie sur <strong>"Sur l'écran d'accueil"</strong> — l'icône avec un <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: 20, height: 20, borderRadius: 5, border: "1.5px solid #2D3436", fontSize: 14, fontWeight: 900, lineHeight: 1, verticalAlign: "middle", marginLeft: 2 }}>+</span></> },
            { icon: "3️⃣", text: <>Confirme en appuyant sur <strong>"Ajouter"</strong> en haut à droite</> },
          ].map((step, i) => <div key={i} style={{ display: "flex", alignItems: "flex-start", gap: 10, marginBottom: i < 2 ? 10 : 0 }}>
            <span style={{ fontSize: 16 }}>{step.icon}</span>
            <span style={{ fontSize: 14, color: "#2D3436", lineHeight: 1.5 }}>{step.text}</span>
          </div>)}
        </div>
        <button onClick={handleDismiss} style={{ width: "100%", padding: "14px", borderRadius: 14, border: "2px solid #E0E0E0", background: "transparent", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 15, color: "#636E72", cursor: "pointer" }}>J'ai compris</button>
      </> : <>
        {/* Bouton Android */}
        <div style={{ display: "flex", gap: 10 }}>
          <button onClick={handleDismiss} style={{ flex: 1, padding: "14px", borderRadius: 14, border: "2px solid #E0E0E0", background: "transparent", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 15, color: "#636E72", cursor: "pointer" }}>Plus tard</button>
          <button onClick={handleInstall} style={{ flex: 2, padding: "14px", borderRadius: 14, border: "none", background: "linear-gradient(135deg, #6C5CE7, #A29BFE)", fontFamily: "'Nunito',sans-serif", fontWeight: 800, fontSize: 15, color: "#fff", cursor: "pointer", boxShadow: "0 4px 15px rgba(108,92,231,0.4)" }}>📲 Installer l'app</button>
        </div>
      </>}
    </div>
  </div>;
}

ReactDOM.render(<><App /><InstallPrompt /></>, document.getElementById('root'));
    </script>
</body>
</html>
