function LoginScreen({ onLogin, data }) {
  const [mode, setMode] = useState("student");
  const [studentId, setStudentId] = useState("");
  const [studentPwd, setStudentPwd] = useState("");
  const [teacherPwd, setTeacherPwd] = useState("");
  const [error, setError] = useState("");
  const [shake, setShake] = useState(false);
  const [loading, setLoading] = useState(false);
  // First login flow
  const [firstLogin, setFirstLogin] = useState(false);
  const [firstLoginStudent, setFirstLoginStudent] = useState(null);
  const [newPwd, setNewPwd] = useState("");
  const [newPwdConfirm, setNewPwdConfirm] = useState("");
  // Step: need password after identifier found
  const [needPwd, setNeedPwd] = useState(false);
  // PWA install prompt
  const [installPrompt, setInstallPrompt] = useState(null);
  const [installed, setInstalled] = useState(false);
  React.useEffect(() => {
    const handler = e => { e.preventDefault(); setInstallPrompt(e); };
    window.addEventListener('beforeinstallprompt', handler);
    window.addEventListener('appinstalled', () => { setInstalled(true); setInstallPrompt(null); });
    return () => window.removeEventListener('beforeinstallprompt', handler);
  }, []);
  const handleInstall = async () => {
    if (!installPrompt) return;
    installPrompt.prompt();
    const { outcome } = await installPrompt.userChoice;
    if (outcome === 'accepted') { setInstalled(true); setInstallPrompt(null); }
  };

  const handleLogin = async () => {
    setError(""); setLoading(true);
    try {
      if (mode === "student") {
        if (!needPwd) {
          // Step 1: check identifier
          const res = await api.post('auth', { type: 'student', identifier: studentId.trim(), password: '' });
          if (res.success && res.needsPassword) {
            // First login — show set password screen
            setFirstLogin(true); setFirstLoginStudent(res.student);
          } else if (res.success && !res.needsPassword) {
            // Has password — ask for it
            setNeedPwd(true);
          } else if (!res.success && res.error === 'Mot de passe incorrect.') {
            // Has password but we sent empty — ask for it
            setNeedPwd(true);
          } else {
            setError(res.error || "Identifiant introuvable.");
            setShake(true); setTimeout(() => setShake(false), 500);
          }
        } else {
          // Step 2: login with password
          const res = await api.post('auth', { type: 'student', identifier: studentId.trim(), password: studentPwd });
          if (res.success) onLogin({ type: "student", student: res.student, news: res.news });
          else { setError(res.error || "Mot de passe incorrect."); setShake(true); setTimeout(() => setShake(false), 500); }
        }
      } else {
        const res = await api.post('auth', { type: 'teacher', password: teacherPwd });
        if (res.success) onLogin({ type: "teacher" });
        else { setError(res.error || "Mot de passe incorrect."); setShake(true); setTimeout(() => setShake(false), 500); }
      }
    } catch (e) { setError("Erreur de connexion au serveur."); }
    setLoading(false);
  };

  const handleSetPassword = async () => {
    if (newPwd.length < 4) { setError("Le mot de passe doit faire au moins 4 caractères."); return; }
    if (newPwd !== newPwdConfirm) { setError("Les mots de passe ne correspondent pas."); return; }
    setLoading(true); setError("");
    try {
      const result = await api.post('auth', { type: 'set-password', studentId: firstLoginStudent.id, newPassword: newPwd });
      if (!result.success) { setError(result.error || "Erreur lors de la sauvegarde du mot de passe."); setLoading(false); return; }
      // Re-login avec le nouveau mot de passe pour vérifier la sauvegarde et obtenir les données fraîches
      const loginRes = await api.post('auth', { type: 'student', identifier: firstLoginStudent.identifier, password: newPwd });
      if (loginRes.success) onLogin({ type: "student", student: loginRes.student, news: loginRes.news });
      else setError("Mot de passe enregistré, mais connexion impossible. Réessaie.");
    } catch (e) { setError("Erreur serveur."); }
    setLoading(false);
  };

  // First login: set password screen
  if (firstLogin && firstLoginStudent) {
    return <AnimatedBg>
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
        <div style={{ maxWidth: 440, width: "100%", textAlign: "center" }}>
          <MascotCelebration message={`Bienvenue ${firstLoginStudent.firstName} !`} sub="On va bien s'amuser ensemble !" />
          <h1 style={{ fontSize: 28, fontWeight: 900, margin: "0 0 4px 0", color: C.primary }}>Première connexion</h1>
          <p style={{ color: C.textLight, fontSize: 15, margin: "0 0 24px 0", fontWeight: 600 }}>Choisis un mot de passe pour sécuriser ton compte.</p>
          <Card style={{ padding: 32, textAlign: "left" }}>
            <form onSubmit={e => { e.preventDefault(); handleSetPassword(); }} autoComplete="on">
              <Input icon={<Icon name="Lock" size={16} />} label="Choisis un mot de passe" value={newPwd} name="new-password" autoComplete="new-password" onChange={setNewPwd} type="password" onKeyDown={e => e.key === "Enter" && handleSetPassword()} placeholder="Minimum 4 caractères" />
              <Input icon={<Icon name="Lock" size={16} />} label="Confirme le mot de passe" value={newPwdConfirm} name="new-password-confirm" autoComplete="new-password" onChange={setNewPwdConfirm} type="password" onKeyDown={e => e.key === "Enter" && handleSetPassword()} placeholder="Retape le même mot de passe" />
              {error && <div style={{ background: "#FFE0E0", color: C.danger, padding: "10px 16px", borderRadius: 12, fontSize: 13, fontWeight: 600, marginBottom: 16 }}>{error}</div>}
              <Btn onClick={handleSetPassword} fullWidth size="lg" disabled={loading}>{loading ? "..." : "Valider et entrer →"}</Btn>
            </form>
          </Card>
        </div>
      </div>
    </AnimatedBg>;
  }

  return <AnimatedBg>
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 }}>
      <div style={{ maxWidth: 440, width: "100%", textAlign: "center" }}>
        <img src="/logo.png" alt="SmartKlass" style={{ width: 360, marginBottom: installPrompt ? 16 : 32, animation: "float 3s ease-in-out infinite" }} />
        {installPrompt && !installed && <button onClick={handleInstall} style={{ display: "flex", alignItems: "center", gap: 8, margin: "0 auto 24px auto", padding: "10px 20px", background: C.primary, color: "#fff", border: "none", borderRadius: 14, fontFamily: "'Nunito',sans-serif", fontSize: 14, fontWeight: 700, cursor: "pointer", boxShadow: "0 4px 14px rgba(108,92,231,0.35)" }}><Icon name="Download" size={16} color="#fff" /> Installer l'application</button>}
        {installed && <p style={{ fontSize: 13, color: C.secondary, fontWeight: 700, marginBottom: 20 }}>Application installée !</p>}

        {mode === "teacher" ? (
          <Card style={{ padding: 32 }}>
            <button onClick={() => { setMode("student"); setError(""); setTeacherPwd(""); }} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 13, color: C.textLight, display: "flex", alignItems: "center", gap: 4, marginBottom: 20, padding: 0 }}>← Retour</button>
            <h2 style={{ fontSize: 18, fontWeight: 800, margin: "0 0 20px 0", color: C.text, display: "flex", alignItems: "center", gap: 8 }}><Icon name="GraduationCap" size={20} color={C.primary} /> Espace Professeur</h2>
            <form onSubmit={e => { e.preventDefault(); handleLogin(); }} autoComplete="on">
              <div style={{ animation: shake ? "shake 0.5s" : "none" }}>
                <Input icon={<Icon name="Lock" size={16} />} label="Mot de passe" value={teacherPwd} name="password" autoComplete="current-password" onChange={setTeacherPwd} type="password" onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="Mot de passe professeur" />
              </div>
              {error && <div style={{ background: "#FFE0E0", color: C.danger, padding: "10px 16px", borderRadius: 12, fontSize: 13, fontWeight: 600, marginBottom: 16 }}>{error}</div>}
              <Btn onClick={handleLogin} fullWidth size="lg" disabled={loading}>{loading ? "Connexion..." : "Se connecter →"}</Btn>
            </form>
          </Card>
        ) : (
          <Card style={{ padding: 32 }}>
            <form onSubmit={e => { e.preventDefault(); handleLogin(); }} autoComplete="on">
              <div style={{ animation: shake ? "shake 0.5s" : "none" }}>
                <Input icon={<Icon name="Hash" size={16} />} label="Ton identifiant" value={studentId} name="username" autoComplete="username" onChange={v => { setStudentId(v); setNeedPwd(false); setStudentPwd(""); setError(""); }} onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="Ex: STMG-1ÈRE-MART1" />
                {needPwd && <Input icon={<Icon name="Lock" size={16} />} label="Ton mot de passe" value={studentPwd} name="password" autoComplete="current-password" onChange={setStudentPwd} type="password" onKeyDown={e => e.key === "Enter" && handleLogin()} placeholder="Mot de passe" />}
              </div>
              {error && <div style={{ background: "#FFE0E0", color: C.danger, padding: "10px 16px", borderRadius: 12, fontSize: 13, fontWeight: 600, marginBottom: 16 }}>{error}</div>}
              <Btn onClick={handleLogin} fullWidth size="lg" disabled={loading}>{loading ? "Connexion..." : needPwd ? "Se connecter →" : "Suivant →"}</Btn>
            </form>
          </Card>
        )}

        <p style={{ marginTop: 20, fontSize: 12, color: C.textMuted }}>SmartKlass v2.0 — Plateforme STMG</p>
        {mode === "student" && <button onClick={() => { setMode("teacher"); setError(""); }} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontSize: 11, color: C.textMuted, textDecoration: "underline", marginTop: 4, padding: 0 }}>Espace professeur</button>}
      </div>
    </div>
  </AnimatedBg>;
}

function CourseReader({ course, data, completedIds, myResults, onLaunchActivity, onBack }) {

  const linkedActivities = data.activities.filter(a => a.courseId === course.id);
  const icons = { qcm: "ListChecks", flashcards: "CreditCard", truefalse: "ToggleLeft", fillblank: "PenLine", matching: "Link2" };
  const embedUrl = getYoutubeEmbedUrl(course.youtubeUrl);
  return <div style={{ animation: "fadeIn 0.4s" }}>
    <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 13, color: C.textLight, display: "flex", alignItems: "center", gap: 4, marginBottom: 14, padding: "6px 0" }}><Icon name="ArrowLeft" size={14} /> Retour aux cours</button>
    <Card style={{ marginBottom: 14, padding: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: course.description || embedUrl ? 10 : 0 }}>
        <div style={{ width: 52, height: 52, borderRadius: 14, background: `${sub?.color || C.primary}20`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><SubjectIcon icon={sub?.icon} size={26} color={sub?.color || C.primary} /></div>
        <div><Chip color={sub?.color}>{sub?.name}</Chip><h2 style={{ fontSize: 20, fontWeight: 900, margin: "4px 0 0 0" }}>{course.title}</h2></div>
      </div>
      {course.description && <p style={{ fontSize: 14, color: C.textLight, margin: "0 0 10px 0", lineHeight: 1.6 }}>{course.description}</p>}
      {embedUrl && <button onClick={() => setShowVideo(true)} style={{ display: "flex", alignItems: "center", gap: 10, background: "linear-gradient(135deg, #FF0000 0%, #CC0000 100%)", border: "none", borderRadius: 14, padding: "12px 20px", cursor: "pointer", color: "#fff", fontFamily: "'Nunito',sans-serif", fontWeight: 800, fontSize: 14, boxShadow: "0 4px 15px rgba(255,0,0,0.3)", transition: "all 0.2s" }}><Icon name="Youtube" size={18} color="#fff" /> Résumé vidéo du cours</button>}
    </Card>
    {course.chapters?.map((ch, i) => <Card key={i} style={{ marginBottom: 10, padding: 20 }}>
      <h3 style={{ fontSize: 15, fontWeight: 800, marginBottom: 10, color: C.text }}>{ch.title}</h3>
      <Markdown content={ch.content} style={{ color: C.text }} />
    </Card>)}
    {linkedActivities.length > 0 && <div style={{ marginTop: 20 }}>
      <h3 style={{ fontSize: 16, fontWeight: 800, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}><Icon name="Layers" size={18} color={C.primary} /> Activités liées à ce cours</h3>
      {linkedActivities.map(a => { const done = completedIds.includes(a.id); const res = myResults.find(r => r.activityId === a.id); const xp = a.xpReward || a.xp_reward; return <Card key={a.id} hover onClick={() => onLaunchActivity(a)} style={{ display: "flex", alignItems: "center", gap: 14, padding: 14, cursor: "pointer", marginBottom: 8, border: done ? `2px solid ${C.secondary}40` : "2px solid transparent" }}><div style={{ width: 46, height: 46, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", background: done ? `${C.secondary}20` : `${sub?.color || C.primary}20` }}>{done ? <Icon name="CheckCircle2" size={22} color={C.secondary} /> : <Icon name={icons[a.type]} size={22} color={sub?.color || C.primary} />}</div><div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 14 }}>{a.title}</div><div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}><Chip color={C.warning}>+{xp} XP</Chip>{done && res && <Chip color={C.secondary}>{res.score}%</Chip>}</div></div><Icon name="ChevronRight" size={20} color={done ? C.secondary : C.primary} /></Card>; })}
    </div>}
    {showVideo && embedUrl && <div style={{ position: "fixed", inset: 0, zIndex: 1000, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.85)", backdropFilter: "blur(4px)", padding: 20 }} onClick={() => setShowVideo(false)}>
      <div onClick={e => e.stopPropagation()} style={{ width: "100%", maxWidth: 800, background: "#000", borderRadius: 20, overflow: "hidden", boxShadow: "0 25px 60px rgba(0,0,0,0.6)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 20px", background: "#111" }}>
          <span style={{ color: "#fff", fontWeight: 800, fontSize: 15, display: "flex", alignItems: "center", gap: 8 }}><Icon name="Youtube" size={16} color="#fff" /> Résumé vidéo du cours</span>
          <button onClick={() => setShowVideo(false)} style={{ border: "none", background: "rgba(255,255,255,0.15)", borderRadius: 10, width: 34, height: 34, fontSize: 18, cursor: "pointer", color: "#fff", display: "flex", alignItems: "center", justifyContent: "center" }}>✕</button>
        </div>
        <div style={{ position: "relative", paddingBottom: "56.25%", height: 0 }}>
          <iframe src={embedUrl} style={{ position: "absolute", top: 0, left: 0, width: "100%", height: "100%", border: "none" }} allowFullScreen allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" />
        </div>
      </div>
    </div>}
  </div>;
}

// ============================================================================
// MASCOT CELEBRATION — Mascotte "saute de joie" avec bulle BD contextuelle
// ============================================================================
function MascotCelebration({ message, sub, visible = true }) {
  if (!visible) return null;
  return <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 0, marginBottom: 10, animation: "mascotCelebIn 0.6s ease-out" }}>
    <style>{`
      @keyframes mascotCelebIn {
        0% { opacity: 0; transform: scale(0.5) translateY(20px); }
        60% { transform: scale(1.08) translateY(-4px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes mascotJump {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        30% { transform: translateY(-12px) rotate(-3deg); }
        60% { transform: translateY(-8px) rotate(3deg); }
      }
    `}</style>
    {/* Bulle BD au-dessus */}
    <div style={{
      position: "relative", background: "#fff", borderRadius: 18, padding: "10px 16px",
      boxShadow: "0 4px 20px rgba(108,92,231,0.15)", border: `2px solid ${C.primary}25`,
      textAlign: "center", maxWidth: 280, marginBottom: -4
    }}>
      <p style={{ margin: 0, fontWeight: 800, fontSize: 14, color: C.text }}>{message}</p>
      {sub && <p style={{ margin: "4px 0 0", fontSize: 12, color: C.textLight, fontWeight: 600 }}>{sub}</p>}
      {/* Queue vers le bas */}
      <div style={{
        position: "absolute", bottom: -9, left: "50%", marginLeft: -8, width: 0, height: 0,
        borderLeft: "8px solid transparent", borderRight: "8px solid transparent",
        borderTop: "10px solid #fff", filter: "drop-shadow(0 2px 1px rgba(108,92,231,0.08))"
      }} />
    </div>
    <img src="/mascot/salue.svg" alt="" style={{
      width: 100, height: "auto",
      animation: "mascotJump 0.8s ease-in-out infinite",
      filter: "drop-shadow(0 6px 12px rgba(0,0,0,0.15))"
    }} />
  </div>;
}

// ============================================================================
// MASCOT MINI PROGRESS — Barre compacte avec mascotte pour les activités en cours
// ============================================================================
function MascotMiniProgress({ value, max, color = C.primary, style }) {
  const pct = max > 0 ? Math.min(Math.round((value / max) * 100), 100) : 0;
  return <div style={{ position: "relative", flex: 1, height: 10, ...style }}>
    {/* Mascotte qui marche */}
    <div style={{
      position: "absolute", top: -20, left: `calc(${pct}% - 16px)`,
      transition: "left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1)", zIndex: 2
    }}>
      <img src="/mascot/marche.svg" alt="" style={{
        width: 32, height: "auto",
        animation: "mascotWalk 0.6s ease-in-out infinite",
        filter: "drop-shadow(0 1px 3px rgba(0,0,0,0.15))"
      }} />
    </div>
    {/* Barre */}
    <div style={{ background: "#E8E8F0", borderRadius: 10, height: 10, overflow: "hidden", width: "100%" }}>
      <div style={{
        width: `${pct}%`, height: "100%", borderRadius: 10,
        background: `linear-gradient(90deg, ${color}, ${color}88)`,
        transition: "width 0.6s cubic-bezier(0.4,0,0.2,1)"
      }} />
    </div>
    <style>{`@keyframes mascotWalk { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }`}</style>
  </div>;
}

// ============================================================================
// MASCOT GREETING — Bulle BD avec mascotte qui salue
// ============================================================================
function MascotGreeting({ studentName, news, onClose }) {
  const [visible, setVisible] = useState(true);
  const [fadeOut, setFadeOut] = useState(false);

  useEffect(() => {
    const timer = setTimeout(() => {
      setFadeOut(true);
      setTimeout(() => { setVisible(false); onClose && onClose(); }, 600);
    }, 6000);
    return () => clearTimeout(timer);
  }, []);

  const handleClose = () => {
    setFadeOut(true);
    setTimeout(() => { setVisible(false); onClose && onClose(); }, 400);
  };

  if (!visible) return null;

  const hasNews = news && (news.newCourses > 0 || news.newActivities > 0);
  const newsLines = [];
  if (news?.newCourses > 0) newsLines.push(`${news.newCourses} nouveau${news.newCourses > 1 ? 'x' : ''} cours`);
  if (news?.newActivities > 0) newsLines.push(`${news.newActivities} nouvelle${news.newActivities > 1 ? 's' : ''} activité${news.newActivities > 1 ? 's' : ''}`);

  return <div onClick={handleClose} style={{
    position: "fixed", inset: 0, zIndex: 1000,
    display: "flex", alignItems: "center", justifyContent: "center",
    background: "rgba(0,0,0,0.35)", backdropFilter: "blur(8px)", WebkitBackdropFilter: "blur(8px)",
    animation: fadeOut ? "mascotOverlayOut 0.5s ease-out forwards" : "mascotOverlayIn 0.3s ease-out",
    cursor: "pointer"
  }}>
    <style>{`
      @keyframes mascotOverlayIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes mascotOverlayOut {
        to { opacity: 0; }
      }
      @keyframes mascotBounceIn {
        0% { opacity: 0; transform: scale(0.5) translateY(30px); }
        60% { transform: scale(1.05) translateY(-5px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes bubblePop {
        0% { transform: scale(0); opacity: 0; }
        70% { transform: scale(1.05); }
        100% { transform: scale(1); opacity: 1; }
      }
    `}</style>
    <div style={{
      display: "flex", flexDirection: "column", alignItems: "center", gap: 0,
      animation: fadeOut ? "none" : "mascotBounceIn 0.6s ease-out",
      maxWidth: 400, width: "90%"
    }}>
      <img src="/mascot/salue.svg" alt="Mascotte" style={{
        width: 180, height: "auto", marginBottom: -12, zIndex: 1,
        filter: "drop-shadow(0 8px 24px rgba(0,0,0,0.2))"
      }} />
      <div style={{
        position: "relative", background: "#fff", borderRadius: 24,
        padding: "22px 26px", boxShadow: "0 12px 48px rgba(108,92,231,0.25)",
        border: `2px solid ${C.primary}30`, width: "100%", textAlign: "center",
        animation: "bubblePop 0.4s ease-out 0.3s both"
      }}>
        {/* Queue de bulle BD vers le haut */}
        <div style={{
          position: "absolute", top: -10, left: "50%", marginLeft: -8, width: 0, height: 0,
          borderLeft: "10px solid transparent", borderRight: "10px solid transparent",
          borderBottom: "12px solid #fff", filter: "drop-shadow(0 -3px 2px rgba(108,92,231,0.1))"
        }} />
        <p style={{ margin: 0, fontWeight: 800, fontSize: 18, color: C.text }}>
          Salut {studentName} ! 👋
        </p>
        {hasNews ? <p style={{ margin: "10px 0 0", fontSize: 14, color: C.textLight, lineHeight: 1.6 }}>
          Depuis ta dernière visite :<br />
          <span style={{ color: C.primary, fontWeight: 700, fontSize: 15 }}>{newsLines.join(' et ')}</span> t'attendent !
        </p> : <p style={{ margin: "10px 0 0", fontSize: 14, color: C.textLight, lineHeight: 1.6 }}>
          Content de te revoir ! Prêt à gagner des XP ?
        </p>}
        <p style={{ margin: "10px 0 0", fontSize: 11, color: C.textMuted }}>Clique n'importe où pour continuer</p>
      </div>
    </div>
  </div>;
}

// ============================================================================
// STUDENT DASHBOARD (uses data from props, API calls for results)
// ============================================================================
function StudentDashboard({ student, data, news, onLogout, onActivityComplete }) {
  const [view, setView] = useState("home");
  const [activeActivity, setActiveActivity] = useState(null);
  const [subjectFilter, setSubjectFilter] = useState("all");
  const [activeCourse, setActiveCourse] = useState(null);
  const [activeSubject, setActiveSubject] = useState(null);
  const [currentStudent, setCurrentStudent] = useState(student);
  const [newBadge, setNewBadge] = useState(null);
  const [showMascot, setShowMascot] = useState(true);

  const myClass = data.classes.find(c => c.id === currentStudent.classId);
  const classStudents = data.students.filter(s => s.classId === currentStudent.classId);
  const myActivities = data.activities.filter(a => a.classIds && a.classIds.includes(currentStudent.classId));
  const myCourses = data.courses.filter(c => c.classIds && c.classIds.includes(currentStudent.classId));
  const myResults = data.results.filter(r => r.studentId === currentStudent.id);
  const completedIds = myResults.map(r => r.activityId);
  const leaderboard = [...classStudents].sort((a, b) => b.xp - a.xp);
  const myRank = leaderboard.findIndex(s => s.id === currentStudent.id) + 1;
  const filteredActivities = subjectFilter === "all" ? myActivities : myActivities.filter(a => a.subjectId === subjectFilter);
  const earnedBadges = BADGES.filter(b => b.condition(myResults, currentStudent.streak, currentStudent.xp));

  const isNew = (dateStr) => dateStr && (Date.now() - new Date(dateStr).getTime()) < 7 * 24 * 60 * 60 * 1000;

  const isMobile = useIsMobile();
  const studentTabs = [{ id: "home", icon: <Icon name="Home" size={20} />, label: "Accueil" }, { id: "courses", icon: <Icon name="BookOpen" size={20} />, label: "Matières" }, { id: "activities", icon: <Icon name="Layers" size={20} />, label: "Activités" }, { id: "leaderboard", icon: <Icon name="Trophy" size={20} />, label: "Classement" }];
  const handleTabChange = (tab) => { setView(tab); setActiveCourse(null); setActiveSubject(null); };

  // Live Quiz — détection et état
  const [liveSession, setLiveSession] = useState(null);
  const [inLive, setInLive] = useState(false);
  const [liveDismissed, setLiveDismissed] = useState(null); // sessionId ignoré
  React.useEffect(() => {
    if (inLive) return;
    let interval;
    const detect = async () => {
      try {
        const res = await api.get(`live-quiz?classId=${currentStudent.classId}`);
        if (res.session && res.session.status !== 'finished' && res.session.id !== liveDismissed) {
          setLiveSession(res.session);
        } else {
          setLiveSession(null);
          // Reset dismissed si la session a changé
          if (liveDismissed && (!res.session || res.session.id !== liveDismissed)) {
            setLiveDismissed(null);
          }
        }
      } catch(e) {
        // En cas d'erreur réseau, ne pas laisser un live fantôme
        setLiveSession(null);
      }
    };
    detect();
    interval = setInterval(detect, 3000);
    return () => clearInterval(interval);
  }, [currentStudent.classId, inLive, liveDismissed]);

  const handleComplete = async (actId, score) => {
    const prevBadgeIds = BADGES.filter(b => b.condition(myResults, currentStudent.streak, currentStudent.xp)).map(b => b.id);
    const result = await onActivityComplete(currentStudent.id, actId, score);
    if (result && result.student) {
      setCurrentStudent(result.student);
      const updatedResults = [...myResults, { activityId: actId, score }];
      const unlocked = BADGES.find(b => b.condition(updatedResults, result.student.streak, result.student.xp) && !prevBadgeIds.includes(b.id));
      if (unlocked) setNewBadge(unlocked);
    }
    setActiveActivity(null); setView("home");
  };

  if (inLive && liveSession) {
    return <LiveQuizStudent sessionId={liveSession.id} student={currentStudent} onExit={() => { setInLive(false); setLiveSession(null); }} />;
  }

  if (activeActivity) {
    return <AnimatedBg><ActivityPlayer activity={activeActivity} onComplete={(score) => handleComplete(activeActivity.id, score)} onBack={() => setActiveActivity(null)} /></AnimatedBg>;
  }

  return <AnimatedBg>
    {newBadge && <BadgeUnlock badge={newBadge} onClose={() => setNewBadge(null)} />}
    {showMascot && <MascotGreeting studentName={currentStudent.firstName} news={news} onClose={() => setShowMascot(false)} />}
    {liveSession && !inLive && <LiveQuizBanner session={liveSession} onJoin={() => setInLive(true)} onDismiss={() => { setLiveDismissed(liveSession.id); setLiveSession(null); }} />}
    {isMobile && <div style={{ position: "fixed", top: 0, left: 0, right: 0, zIndex: 100, background: "rgba(248,249,253,0.97)", backdropFilter: "blur(10px)", padding: "10px 16px", borderBottom: "1px solid #EEEEF5", boxShadow: "0 2px 12px rgba(0,0,0,0.06)" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}><img src="/logo.png" alt="SmartKlass" style={{ height: 34 }} /><div><p style={{ fontSize: 15, fontWeight: 900, margin: 0 }}>Salut {currentStudent.firstName} !</p><p style={{ color: C.textLight, fontSize: 11, fontWeight: 600, margin: 0 }}>{myClass?.name}</p></div></div>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <div style={{ background: `${C.warning}30`, padding: "5px 10px", borderRadius: 10, fontWeight: 800, fontSize: 12, color: "#856404", display: "flex", alignItems: "center", gap: 4 }}><Icon name="Flame" size={13} color="#E17055" /> {currentStudent.streak}j</div>
          <button onClick={onLogout} style={{ background: "#F0F0F8", border: "none", borderRadius: 10, padding: "7px 12px", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 13, color: C.textLight, display: "flex", alignItems: "center" }}><Icon name="LogOut" size={16} color={C.textLight} /></button>
        </div>
      </div>
    </div>}
    <div style={{ maxWidth: 900, margin: "0 auto", padding: isMobile ? "76px 16px 90px" : "20px 16px" }}>
      {!isMobile && <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 24, flexWrap: "wrap", gap: 10 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}><img src="/logo.png" alt="SmartKlass" style={{ height: 44 }} /><div><h1 style={{ fontSize: 22, fontWeight: 900, margin: 0 }}>Salut {currentStudent.firstName} !</h1><p style={{ color: C.textLight, fontSize: 13, fontWeight: 600, margin: 0 }}>{myClass?.name}</p></div></div>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{ background: `${C.warning}30`, padding: "6px 14px", borderRadius: 10, fontWeight: 800, fontSize: 13, color: "#856404", display: "flex", alignItems: "center", gap: 5 }}><Icon name="Flame" size={14} color="#E17055" /> {currentStudent.streak}j</div>
          <button onClick={onLogout} style={{ background: "#F0F0F8", border: "none", borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 12, color: C.textLight }}>Déconnexion</button>
        </div>
      </div>}
      {!isMobile && <Tabs tabs={studentTabs} active={view} onChange={handleTabChange} />}

      {view === "home" && <div style={{ animation: "fadeIn 0.4s" }}>
        <BentoGrid style={{ display: "flex", gap: 10, marginBottom: 20, flexWrap: "wrap" }}>
          <StatCard icon={<Icon name="Zap" size={28} color={C.primary} />} label="XP Total" value={currentStudent.xp} color={C.primary} />
          <StatCard icon={<Icon name="Medal" size={28} color={C.secondary} />} label="Rang" value={`#${myRank}`} color={C.secondary} sub={`sur ${classStudents.length}`} />
          <StatCard icon={<Icon name="CheckCircle2" size={28} color={C.accent} />} label="Activités" value={completedIds.length} color={C.accent} sub={`sur ${myActivities.length}`} />
          <StatCard icon={<Icon name="Flame" size={28} color="#E67E22" />} label="Streak" value={`${currentStudent.streak}j`} color="#E67E22" />
        </BentoGrid>
        <Card style={{ marginBottom: 20 }}>
          <h3 style={{ fontSize: 15, fontWeight: 800, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}><Icon name="Trophy" size={16} color="#FDCB6E" /> Mes badges</h3>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(90px, 1fr))", gap: 10 }}>
            {BADGES.map(b => { const earned = earnedBadges.includes(b); return <div key={b.id} title={b.desc} style={{ textAlign: "center", padding: "10px 14px", borderRadius: 14, background: earned ? `${C.warning}20` : "#F0F0F8", opacity: earned ? 1 : 0.4, cursor: "default", position: "relative", transition: "all 0.2s" }}>
              <div style={{ display: "flex", justifyContent: "center", marginBottom: 4 }}><Icon name={b.icon} size={28} color={earned ? b.color : C.textMuted} /></div>
              <div style={{ fontSize: 10, fontWeight: 800, color: earned ? C.text : C.textMuted }}>{b.name}</div>
              <div style={{ fontSize: 9, color: earned ? C.secondary : C.textMuted, marginTop: 2, lineHeight: 1.3 }}>{earned ? "Débloqué !" : b.desc}</div>
            </div>; })}
          </div>
        </Card>
        <h3 style={{ fontSize: 15, fontWeight: 800, marginBottom: 10, display: "flex", alignItems: "center", gap: 8 }}><Icon name="Target" size={16} color={C.accent} /> À faire</h3>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {myActivities.filter(a => !completedIds.includes(a.id)).slice(0, 4).map(a => { const sub = data.subjects.find(s => s.id === a.subjectId); const xp = a.xpReward || a.xp_reward; return <Card key={a.id} hover onClick={() => setActiveActivity(a)} style={{ display: "flex", alignItems: "center", gap: 14, padding: 14, cursor: "pointer" }}><div style={{ width: 46, height: 46, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", background: `${sub?.color || C.primary}20` }}><SubjectIcon icon={sub?.icon} size={22} color={sub?.color || C.primary} /></div><div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 14 }}>{a.title}</div><div style={{ display: "flex", gap: 6, marginTop: 4 }}><Chip color={sub?.color}>{sub?.name}</Chip><Chip color={C.warning}>+{xp} XP</Chip></div></div><Icon name="ChevronRight" size={22} color={C.primary} /></Card>; })}
          {myActivities.filter(a => !completedIds.includes(a.id)).length === 0 && <Card style={{ textAlign: "center", padding: 28 }}><MascotCelebration message="Tout est fait !" sub="Tu as complété toutes les activités, champion !" /><p style={{ fontWeight: 700, color: C.secondary }}>Reviens bientôt pour de nouvelles activités !</p></Card>}
        </div>
      </div>}

      {view === "courses" && <div style={{ animation: "fadeIn 0.4s" }}>
        {activeCourse
          ? <CourseReader course={activeCourse} data={data} completedIds={completedIds} myResults={myResults} onLaunchActivity={a => { setActiveActivity(a); setActiveCourse(null); }} onBack={() => setActiveCourse(null)} />
          : activeSubject
            ? <>
                {/* En-tête matière + retour */}
                <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 18 }}>
                  <button onClick={() => setActiveSubject(null)} style={{ background: "#F0F0F8", border: "none", borderRadius: 10, padding: "8px 14px", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 14, color: C.text, display: "flex", alignItems: "center", gap: 6 }}><Icon name="ArrowLeft" size={14} /> Retour</button>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <SubjectIcon icon={activeSubject.icon} size={24} color={activeSubject.color || C.primary} />
                    <h2 style={{ fontSize: 20, fontWeight: 900, margin: 0 }}>{activeSubject.name}</h2>
                  </div>
                </div>
                {/* Liste des cours triés du plus récent au plus ancien */}
                {myCourses.filter(c => c.subjectId === activeSubject.id).sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).map(c => {
                  const courseActs = data.activities.filter(a => a.courseId === c.id);
                  const nbActs = courseActs.length;
                  const doneActs = courseActs.filter(a => completedIds.includes(a.id)).length;
                  const allDone = nbActs > 0 && doneActs === nbActs;
                  const nouveau = isNew(c.created_at);
                  return <Card key={c.id} hover onClick={() => setActiveCourse(c)} style={{ marginBottom: 10, padding: 18, cursor: "pointer", position: "relative", border: allDone ? `2px solid ${C.secondary}40` : "2px solid transparent" }}>
                    {nouveau && <div style={{ position: "absolute", top: 12, right: 12, background: C.accent, color: "#fff", borderRadius: 8, padding: "3px 10px", fontSize: 11, fontWeight: 800, letterSpacing: 0.5 }}>NOUVEAU</div>}
                    <div style={{ display: "flex", gap: 12, alignItems: "center" }}>
                      <div style={{ flex: 1, paddingRight: nouveau ? 80 : 0 }}>
                        <h3 style={{ fontSize: 16, fontWeight: 800, margin: "0 0 4px 0" }}>{c.title}</h3>
                        <p style={{ fontSize: 13, color: C.textLight, margin: 0 }}>{c.description}</p>
                        <div style={{ display: "flex", gap: 6, marginTop: 6, flexWrap: "wrap" }}>
                          {c.chapters?.length > 0 && <Chip color={C.primary}>{c.chapters.length} chapitre{c.chapters.length > 1 ? "s" : ""}</Chip>}
                          {nbActs > 0 && <Chip color={allDone ? C.secondary : C.accent}>{allDone ? <span style={{display:"flex",alignItems:"center",gap:3}}><Icon name="CheckCircle2" size={11} />{doneActs}/{nbActs} activité{nbActs > 1 ? "s" : ""}</span> : `${doneActs}/${nbActs} activité${nbActs > 1 ? "s" : ""}`}</Chip>}
                        </div>
                        {nbActs > 0 && <ProgressBar value={doneActs} max={nbActs} color={allDone ? C.secondary : C.accent} height={4} style={{ marginTop: 8 }} />}
                      </div>
                      <Icon name="ChevronRight" size={22} color={allDone ? C.secondary : C.primary} style={{ flexShrink: 0 }} />
                    </div>
                  </Card>;
                })}
                {myCourses.filter(c => c.subjectId === activeSubject.id).length === 0 && <Card style={{ textAlign: "center", padding: 28 }}><div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}><Icon name="Inbox" size={44} color={C.textMuted} /></div><p style={{ fontWeight: 700 }}>Aucun cours dans cette matière</p></Card>}
              </>
            : <>
                {/* Grille des matières */}
                <h2 style={{ fontSize: 20, fontWeight: 900, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}><Icon name="BookOpen" size={20} color={C.primary} /> Mes matières</h2>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
                  {data.subjects.filter(s => myCourses.some(c => c.subjectId === s.id)).map(s => {
                    const count = myCourses.filter(c => c.subjectId === s.id).length;
                    const hasNew = myCourses.filter(c => c.subjectId === s.id).some(c => isNew(c.created_at));
                    const subActs = myActivities.filter(a => a.subjectId === s.id);
                    const subDone = subActs.filter(a => completedIds.includes(a.id)).length;
                    return <Card key={s.id} hover onClick={() => setActiveSubject(s)} style={{ cursor: "pointer", padding: "22px 16px", textAlign: "center", position: "relative" }}>
                      {hasNew && <div style={{ position: "absolute", top: 10, right: 10, background: C.accent, color: "#fff", borderRadius: 8, padding: "2px 8px", fontSize: 10, fontWeight: 800, letterSpacing: 0.5 }}>NOUVEAU</div>}
                      <div style={{ display: "flex", justifyContent: "center", marginBottom: 10 }}><SubjectIcon icon={s.icon} size={42} color={s.color || C.primary} /></div>
                      <div style={{ fontWeight: 900, fontSize: 15, color: C.text, marginBottom: 4 }}>{s.name}</div>
                      <div style={{ fontSize: 12, color: C.textLight, fontWeight: 600, marginBottom: subActs.length > 0 ? 6 : 0 }}>{count} cours</div>
                      {subActs.length > 0 && <><div style={{ fontSize: 11, color: subDone === subActs.length ? C.secondary : C.textMuted, fontWeight: 700, marginBottom: 4 }}>{subDone}/{subActs.length} activités</div><ProgressBar value={subDone} max={subActs.length} color={s.color || C.primary} height={4} /></>}
                    </Card>;
                  })}
                  {data.subjects.filter(s => myCourses.some(c => c.subjectId === s.id)).length === 0 &&
                    <div style={{ gridColumn: "1/-1" }}><Card style={{ textAlign: "center", padding: 28 }}><div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}><Icon name="Inbox" size={44} color={C.textMuted} /></div><p style={{ fontWeight: 700 }}>Aucun cours disponible</p></Card></div>}
                </div>
              </>}
      </div>}

      {view === "activities" && <div style={{ animation: "fadeIn 0.4s" }}>
        <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}><Icon name="Layers" size={20} color={C.primary} /> Activités</h2>
        <div style={{ display: "flex", gap: 6, marginBottom: 14, flexWrap: "wrap" }}>
          <Btn onClick={() => setSubjectFilter("all")} variant={subjectFilter === "all" ? "primary" : "outline"} size="sm">Toutes</Btn>
          {data.subjects.map(s => <Btn key={s.id} onClick={() => setSubjectFilter(s.id)} variant={subjectFilter === s.id ? "primary" : "outline"} size="sm" style={{display:"flex",alignItems:"center",gap:5}}><SubjectIcon icon={s.icon} size={14} color={subjectFilter === s.id ? "#fff" : s.color || C.primary} /> {s.name}</Btn>)}
        </div>
        {filteredActivities.map(a => { const sub = data.subjects.find(s => s.id === a.subjectId); const done = completedIds.includes(a.id); const res = myResults.find(r => r.activityId === a.id); const actIcons = { qcm: "ListChecks", flashcards: "CreditCard", truefalse: "ToggleLeft", fillblank: "PenLine", matching: "Link2" }; const xp = a.xpReward || a.xp_reward; return <Card key={a.id} hover onClick={() => setActiveActivity(a)} style={{ display: "flex", alignItems: "center", gap: 14, padding: 14, cursor: "pointer", marginBottom: 8, border: done ? `2px solid ${C.secondary}40` : "2px solid transparent" }}><div style={{ width: 46, height: 46, borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", background: done ? `${C.secondary}20` : `${sub?.color || C.primary}20` }}>{done ? <Icon name="CheckCircle2" size={22} color={C.secondary} /> : <Icon name={actIcons[a.type]} size={22} color={sub?.color || C.primary} />}</div><div style={{ flex: 1 }}><div style={{ fontWeight: 700, fontSize: 14 }}>{a.title}</div><div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}><Chip color={sub?.color}>{sub?.name}</Chip><Chip color={C.warning}>+{xp} XP</Chip>{done && res && <Chip color={C.secondary}>{res.score}%</Chip>}</div></div><Icon name="ChevronRight" size={22} color={done ? C.secondary : C.primary} /></Card>; })}
      </div>}

      {view === "leaderboard" && <div style={{ animation: "fadeIn 0.4s" }}>
        <h2 style={{ fontSize: 20, fontWeight: 800, marginBottom: 14, display: "flex", alignItems: "center", gap: 8 }}><Icon name="Trophy" size={20} color="#FDCB6E" /> Classement — {myClass?.name}</h2>
        <Card>

              <StatCard icon={<Icon name="Target" size={28} color="#00B894" />} label="Score moyen" value={data.results.length > 0 ? `${avgScore}%` : "—"} color="#00B894" sub={data.results.length > 0 ? (avgScore >= 70 ? "Bon niveau" : avgScore >= 40 ? "À améliorer" : "Difficultés") : "Pas encore de données"} />

            </div>
          </BentoGrid>

          {/* Aperçu par classe */}
          {data.classes.length > 0 && <Card style={{ marginBottom: 16, padding: 0, overflow: "hidden" }}>
            <div style={{ padding: "14px 18px", borderBottom: "1px solid #EEEEF6", fontWeight: 800, fontSize: 15, display: "flex", alignItems: "center", gap: 8 }}><Icon name="Users" size={16} />Aperçu par classe</div>
            <div style={{ overflowX: "auto" }}>
              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
                <thead>
                  <tr style={{ background: "#F8F9FD" }}>
                    <th style={{ padding: "10px 18px", textAlign: "left", fontWeight: 700, color: C.textLight }}>Classe</th>
                    <th style={{ padding: "10px 14px", textAlign: "center", fontWeight: 700, color: C.textLight }}>Élèves</th>
                    <th style={{ padding: "10px 14px", textAlign: "center", fontWeight: 700, color: C.textLight }}>Participation</th>
                    <th style={{ padding: "10px 14px", textAlign: "center", fontWeight: 700, color: C.textLight }}>Score moyen</th>
                  </tr>
                </thead>
                <tbody>
                  {classSummary.map(({ cls, count, participation, avgScore: as }, i) => <tr key={cls.id} style={{ borderTop: "1px solid #F0F0F8", background: i % 2 === 0 ? "#fff" : "#FAFBFF" }}>
                    <td style={{ padding: "10px 18px", fontWeight: 700 }}>{cls.name}</td>
                    <td style={{ padding: "10px 14px", textAlign: "center", color: C.textLight, fontWeight: 600 }}>{count}</td>
                    <td style={{ padding: "10px 14px", textAlign: "center" }}><span style={{ fontWeight: 800, color: scoreColor(participation) }}>{participation}%</span></td>
                    <td style={{ padding: "10px 14px", textAlign: "center" }}><span style={{ fontWeight: 800, color: scoreColor(as) }}>{as > 0 ? `${as}%` : "—"}</span></td>
                  </tr>)}
                </tbody>
              </table>
            </div>
          </Card>}

          {/* Colonnes : dernières activités + alertes */}
          <div style={{ display: "flex", gap: 14, marginBottom: 16, flexWrap: "wrap" }}>
            <Card style={{ flex: 1, minWidth: 260, padding: 0, overflow: "hidden" }}>
              <div style={{ padding: "14px 18px", borderBottom: "1px solid #EEEEF6", fontWeight: 800, fontSize: 15, display: "flex", alignItems: "center", gap: 8 }}><Icon name="Clock" size={16} />Dernières activités</div>
              {recentResults.length === 0
                ? <p style={{ padding: "16px 18px", color: C.textMuted, fontSize: 13, fontWeight: 600, margin: 0 }}>Aucune activité complétée pour l'instant.</p>
                : recentResults.map((r, i) => <div key={i} style={{ display: "flex", alignItems: "center", gap: 10, padding: "10px 16px", borderTop: i > 0 ? "1px solid #F0F0F8" : "none" }}>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 700, fontSize: 13, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.student.firstName} {r.student.lastName}</div>
                      <div style={{ fontSize: 12, color: C.textLight, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{r.activity.title}</div>
                    </div>
                    <div style={{ textAlign: "right", flexShrink: 0 }}>
                      <div style={{ fontWeight: 800, fontSize: 13, color: scoreColor(r.score) }}>{r.score}%</div>
                      <div style={{ fontSize: 11, color: C.textMuted }}>{relativeDate(r.date)}</div>
                    </div>
                  </div>)}
            </Card>

            <Card style={{ flex: 1, minWidth: 260, padding: 0, overflow: "hidden" }}>
              <div style={{ padding: "14px 18px", borderBottom: "1px solid #EEEEF6", fontWeight: 800, fontSize: 15, display: "flex", alignItems: "center", gap: 8 }}><Icon name="AlertTriangle" size={16} color="#E67E22" />Alertes engagement</div>
              {inactiveStudents.length === 0 && lowParticipationActs.length === 0
                ? <p style={{ padding: "16px 18px", color: "#00B894", fontSize: 13, fontWeight: 700, margin: 0, display: "flex", alignItems: "center", gap: 6 }}><Icon name="CheckCircle2" size={14} color="#00B894" />Tout va bien — aucune alerte !</p>

                        <span style={{ fontSize: 12, color: C.danger, fontWeight: 700 }}>{s.lastActive ? relativeDate(s.lastActive) : "jamais connecté"}</span>
                      </div>)}

      {/* CLASSES */}
      {view === "classes" && <div style={{ animation: "fadeIn 0.4s" }}>
        {activeClass ? (() => {
          const classStudents = data.students.filter(s => s.classId === activeClass.id).sort((a, b) => a.lastName.localeCompare(b.lastName));

            </div>

            {/* Élèves */}
            <div style={{ marginBottom: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
                <h3 style={{ fontSize: 16, fontWeight: 800, margin: 0, display: "flex", alignItems: "center", gap: 6 }}><Icon name="GraduationCap" size={16} />Élèves</h3>
                <div style={{ display: "flex", gap: 6 }}>
                  <Btn onClick={() => { setModal("exportIds"); }} variant="secondary" size="sm"><Icon name="FileDown" size={14} style={{marginRight: 4}} />Export</Btn>
                  <Btn onClick={() => { setNewStudent({ firstName: "", lastName: "", classId: activeClass.id }); setModal("addStudent"); }} size="sm">+ Ajouter</Btn>
                </div>
              </div>
              {classStudents.length === 0
                ? <Card style={{ textAlign: "center", padding: 20 }}><p style={{ color: C.textLight, fontWeight: 700, margin: 0 }}>Aucun élève dans cette classe.</p></Card>
                : <Card><div style={{ overflowX: "auto" }}>
                    <table style={{ width: "100%", borderCollapse: "collapse", fontFamily: "'Nunito',sans-serif", fontSize: 13 }}>
                      <thead><tr style={{ borderBottom: "2px solid #F0F0F8" }}>{["Nom", "Prénom", "ID", "XP", "Actions"].map(h => <th key={h} style={{ padding: "10px 12px", textAlign: "left", fontWeight: 700, color: C.textLight, fontSize: 11, textTransform: "uppercase" }}>{h}</th>)}</tr></thead>
                      <tbody>{classStudents.map(s => <tr key={s.id} style={{ borderBottom: "1px solid #F0F0F8" }}><td style={{ padding: "10px 12px", fontWeight: 700 }}>{s.lastName}</td><td style={{ padding: "10px 12px" }}>{s.firstName}</td><td style={{ padding: "10px 12px" }}><code style={{ background: "#F0F0F8", padding: "3px 8px", borderRadius: 6, fontSize: 12, fontWeight: 700 }}>{s.identifier}</code></td><td style={{ padding: "10px 12px", fontWeight: 700, color: C.primary }}>{s.xp}</td><td style={{ padding: "10px 12px" }}><div style={{ display: "flex", gap: 4 }}><Btn onClick={() => { setModalData(s.id); setModal("studentResults"); }} variant="outline" size="xs"><Icon name="BarChart2" size={12} /></Btn><Btn onClick={() => { setEditStudentData({ ...s }); setModal("editStudent"); }} variant="outline" size="xs"><Icon name="Pencil" size={12} /></Btn><Btn onClick={() => resetPassword(s.id, s.firstName)} variant="outline" size="xs" style={{ color: "#E67E22" }}><Icon name="Key" size={12} /></Btn><Btn onClick={() => deleteStudent(s.id)} variant="danger" size="xs"><Icon name="Trash2" size={12} /></Btn></div></td></tr>)}</tbody>
                    </table>
                  </div></Card>}
            </div>

            {/* Sections par matière */}
            <div style={{ marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <h3 style={{ fontSize: 16, fontWeight: 800, margin: 0, display: "flex", alignItems: "center", gap: 6 }}><Icon name="BookOpen" size={16} />Matières et cours</h3>
              <Btn onClick={() => { setNewSubject({ name: "", color: "#6C5CE7", icon: "BarChart2" }); setModal("addSubject"); }} variant="outline" size="sm">+ Matière</Btn>
            </div>

            {data.subjects.length === 0 && <Card style={{ textAlign: "center", padding: 28 }}><div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}><Icon name="BookMarked" size={44} color="#CCC" /></div><p style={{ fontWeight: 700 }}>Aucune matière — commencez par en créer une</p></Card>}

            {data.subjects.map(s => {
              const classCourses = data.courses.filter(c => c.classIds?.includes(activeClass.id) && c.subjectId === s.id);
              return <Card key={s.id} style={{ marginBottom: 12, padding: 0, overflow: "hidden" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px", background: `${s.color}12`, borderBottom: `1px solid ${s.color}25` }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <div style={{ width: 36, height: 36, borderRadius: 10, background: `${s.color}25`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 20 }}>{s.icon}</div>
                    <span style={{ fontWeight: 800, fontSize: 15, color: s.color }}>{s.name}</span>
                    <Chip color={s.color}>{classCourses.length} cours</Chip>
                  </div>
                  <Btn onClick={() => { setNewCourse({ title: "", description: "", subjectId: s.id, classIds: [activeClass.id], chapters: [{ title: "", content: "" }], youtubeUrl: "" }); setModal("addCourse"); }} size="xs">+ Cours</Btn>
                </div>
                <div style={{ padding: "10px 14px", display: "flex", flexDirection: "column", gap: 6 }}>
                  {classCourses.length === 0
                    ? <p style={{ color: C.textMuted, fontSize: 13, fontWeight: 600, textAlign: "center", padding: "10px 0", margin: 0 }}>Aucun cours pour cette classe — cliquez "+ Cours" pour en ajouter</p>
                    : classCourses.sort((a, b) => new Date(b.created_at) - new Date(a.created_at)).map(c => {
                        const nbActs = data.activities.filter(a => a.courseId === c.id).length;
                        return <div key={c.id} onClick={() => { setActiveCourse(c); setView("subjects"); setActiveSubject(data.subjects.find(s2 => s2.id === c.subjectId)); }} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 12px", borderRadius: 12, background: "#F8F8FC", cursor: "pointer", border: "1px solid #EEEEF6", transition: "background 0.15s" }}
                          onMouseEnter={e => e.currentTarget.style.background = `${s.color}10`}
                          onMouseLeave={e => e.currentTarget.style.background = "#F8F8FC"}>
                          <div style={{ flex: 1, minWidth: 0 }}>
                            <div style={{ fontWeight: 800, fontSize: 14, color: C.text, marginBottom: 3 }}>{c.title}</div>
                            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                              {c.chapters?.length > 0 && <Chip color={C.primary}>{c.chapters.length} chapitre{c.chapters.length > 1 ? "s" : ""}</Chip>}
                              {nbActs > 0 && <Chip color={C.accent}>{nbActs} activité{nbActs > 1 ? "s" : ""}</Chip>}
                            </div>
                          </div>
                          <span style={{ fontSize: 18, color: C.textLight, flexShrink: 0 }}>→</span>
                        </div>;
                      })}
                </div>
              </Card>;
            })}
          </>;
        })() : <>
          {/* Liste des classes */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
            <h2 style={{ fontSize: 20, fontWeight: 800, display: "flex", alignItems: "center", gap: 8 }}><Icon name="Users" size={20} />Classes</h2>
            <Btn onClick={() => { setNewClass({ name: "", year: "2025-2026" }); setModal("addClass"); }} size="sm">+ Ajouter</Btn>
          </div>
          {data.classes.map(c => {
            const count = data.students.filter(s => s.classId === c.id).length;
            return <Card key={c.id} hover onClick={() => setActiveClass(c)} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8, cursor: "pointer" }}>
              <div>
                <h3 style={{ fontWeight: 800, fontSize: 16, margin: 0 }}>{c.name}</h3>
                <p style={{ fontSize: 13, color: C.textLight, margin: "2px 0 0" }}>{c.year} — {count} élève{count > 1 ? "s" : ""}</p>
              </div>
              <div style={{ display: "flex", gap: 6 }} onClick={e => e.stopPropagation()}>
                <Btn onClick={() => { setEditClassData({ ...c }); setModal("editClass"); }} variant="outline" size="xs"><Icon name="Pencil" size={12} /></Btn>
                <Btn onClick={() => deleteClass(c.id)} variant="danger" size="xs"><Icon name="Trash2" size={12} /></Btn>
              </div>
            </Card>;
          })}
        </>}
      </div>}

      {/* SUBJECTS — navigation 3 niveaux : Matières → Cours → Fiche cours + Activités */}
      {view === "subjects" && <div style={{ animation: "fadeIn 0.4s" }}>
        {activeCourse ? (() => {
          const sub = data.subjects.find(s => s.id === activeCourse.subjectId);
          const linkedActivities = data.activities.filter(a => a.courseId === activeCourse.id);
          const typeIcons = { qcm: "ListChecks", flashcards: "CreditCard", truefalse: "ToggleLeft", fillblank: "PenLine", matching: "Link2" };
          return <>
            <button onClick={() => setActiveCourse(null)} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 13, color: C.textLight, display: "flex", alignItems: "center", gap: 4, marginBottom: 14, padding: "6px 0" }}>← {sub?.name || "Matière"}</button>
            <Card style={{ marginBottom: 14, padding: 20 }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <div style={{ width: 52, height: 52, borderRadius: 14, background: `${sub?.color || C.primary}20`, display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0 }}><SubjectIcon icon={sub?.icon} size={26} color={sub?.color || C.primary} /></div>
                  <div>
                    <Chip color={sub?.color}>{sub?.name}</Chip>
                    <h2 style={{ fontSize: 20, fontWeight: 900, margin: "4px 0 0 0" }}>{activeCourse.title}</h2>
                    {activeCourse.description && <p style={{ fontSize: 13, color: C.textLight, margin: "4px 0 0 0", lineHeight: 1.5 }}>{activeCourse.description}</p>}
                  </div>
                </div>
                <div style={{ display: "flex", gap: 6 }}>
                  <Btn onClick={() => { setEditCourseData({ ...activeCourse }); setModal("editCourse"); }} variant="outline" size="sm"><Icon name="Pencil" size={14} style={{marginRight: 4}} />Modifier</Btn>
                  <Btn onClick={() => deleteCourse(activeCourse.id)} variant="danger" size="sm"><Icon name="Trash2" size={14} style={{marginRight: 4}} />Supprimer</Btn>
                </div>
              </div>
              {activeCourse.classIds?.length > 0 && <div style={{ marginTop: 10, display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                <span style={{ fontSize: 12, color: C.textLight, fontWeight: 700, marginRight: 4 }}>Classes :</span>
                {activeCourse.classIds.map(cid => { const cls = data.classes.find(c => c.id === cid); return cls ? <Chip key={cid} color={C.primary}>{cls.name}</Chip> : null; })}
              </div>}
              {activeCourse.youtubeUrl && <div style={{ marginTop: 10, display: "flex", alignItems: "center", gap: 8, padding: "8px 14px", background: "#FFF0F0", borderRadius: 12, border: "1px solid #FFCCCC" }}>
                <Icon name="Youtube" size={18} color="#CC0000" />
                <span style={{ fontSize: 13, fontWeight: 700, color: "#CC0000" }}>Vidéo liée :</span>
                <a href={activeCourse.youtubeUrl} target="_blank" rel="noopener noreferrer" style={{ fontSize: 12, color: "#CC0000", textDecoration: "underline", wordBreak: "break-all" }}>{activeCourse.youtubeUrl}</a>
              </div>}
            </Card>
            {activeCourse.chapters?.map((ch, i) => <Card key={i} style={{ marginBottom: 10, padding: 20 }}>
              <h3 style={{ fontSize: 15, fontWeight: 800, marginBottom: 10, color: C.text }}>{ch.title}</h3>
              <Markdown content={ch.content} style={{ color: C.text }} />
            </Card>)}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginTop: 14, marginBottom: 10 }}>
              <h3 style={{ fontSize: 15, fontWeight: 800, margin: 0, display: "flex", alignItems: "center", gap: 6 }}><Icon name="Layers" size={15} />Activités</h3>
              <Btn onClick={() => { setJsonImport(""); setImportParsed(null); setImportStep("paste"); setImportSubjectId(activeCourse.subjectId); setImportClassIds(activeCourse.classIds || []); setImportCourseId(activeCourse.id); setModal("importJson"); }} size="sm"><Icon name="Plus" size={14} style={{marginRight: 4}} />Ajouter une activité</Btn>
            </div>
            {linkedActivities.length > 0 ? linkedActivities.map(a => { const tl = { qcm: "QCM", flashcards: "Flashcards", truefalse: "V/F", fillblank: "Trous", matching: "Assoc." }; const xp = a.xpReward || a.xp_reward; const resCount = data.results.filter(r => r.activityId === a.id).length; return <Card key={a.id} style={{ marginBottom: 8, display: "flex", justifyContent: "space-between", alignItems: "center", padding: 14 }}><div style={{ display: "flex", gap: 12, alignItems: "center", flex: 1 }}><div style={{ width: 42, height: 42, borderRadius: 12, background: `${sub?.color || C.primary}20`, display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name={typeIcons[a.type]} size={20} color={sub?.color || C.primary} /></div><div><div style={{ fontWeight: 700, fontSize: 14 }}>{a.title}</div><div style={{ display: "flex", gap: 4, marginTop: 3, flexWrap: "wrap" }}><Chip color={C.primary}>{tl[a.type]}</Chip><Chip color={C.warning}>+{xp} XP</Chip>{resCount > 0 && <Chip color={C.secondary}>{resCount} rés.</Chip>}</div></div></div><div style={{ display: "flex", gap: 4, flexWrap: "wrap" }}>{['qcm','truefalse','matching'].includes(a.type) && <Btn onClick={() => { setLiveModal(a.id); setLiveActivityTitle(a.title); setLiveClassId(a.classIds?.[0] || ""); setLiveActivityType(a.type); setLiveTimer(20); setLiveMode("individual"); }} style={{ background: "#D63031", color: "#fff", fontSize: 10, display: "flex", alignItems: "center", gap: 3 }} size="xs"><Icon name="Radio" size={10} />Live</Btn>}<Btn onClick={() => { setModalData(a.id); setModal("activityStats"); }} variant="outline" size="xs"><Icon name="BarChart2" size={12} /></Btn><Btn onClick={() => { setModalData(a); setModal("previewActivity"); }} variant="outline" size="xs"><Icon name="Eye" size={12} /></Btn><Btn onClick={() => { setEditActivityData({ ...a, data: JSON.stringify(a.data, null, 2) }); setModal("editActivity"); }} variant="outline" size="xs"><Icon name="Pencil" size={12} /></Btn><Btn onClick={() => deleteActivity(a.id)} variant="danger" size="xs"><Icon name="Trash2" size={12} /></Btn></div></Card>; })
            : <Card style={{ textAlign: "center", padding: 20 }}><p style={{ color: C.textLight, fontWeight: 700, margin: 0 }}>Aucune activité liée à ce cours.</p></Card>}

            {subCourses.map((c) => { const nbActs = data.activities.filter(a => a.courseId === c.id).length; const isOver = dropCourseId === c.id && dragCourseId !== c.id; return <div key={c.id} draggable
              onDragStart={e => { setDragCourseId(c.id); e.dataTransfer.setData('text/plain', c.id); e.dataTransfer.effectAllowed = "move"; }}

              onDrop={e => {
                e.preventDefault();
                const from = dragCourseId || e.dataTransfer.getData('text/plain'); const to = c.id;
                setDragCourseId(null); setDropCourseId(null);
                if (!from || from === to) return;
                const reordered = [...subCourses]; const fi = reordered.findIndex(x => x.id === from); const ti = reordered.findIndex(x => x.id === to);
                if (fi < 0 || ti < 0) return;
                reordered.splice(ti, 0, reordered.splice(fi, 1)[0]);
                saveCourseOrder(reordered);
              }}
              onDragEnd={() => { setDragCourseId(null); setDropCourseId(null); }}
              style={{ marginBottom: 8, opacity: dragCourseId === c.id ? 0.4 : 1, outline: isOver ? `2px solid ${C.primary}` : "2px solid transparent", borderRadius: 22, transition: "opacity 0.2s" }}>

                  </div>
                  <div style={{ display: "flex", gap: 6 }} onClick={e => e.stopPropagation()}><Btn onClick={e => { e.stopPropagation(); setEditCourseData({ ...c }); setModal("editCourse"); }} variant="outline" size="xs"><Icon name="Pencil" size={12} /></Btn><Btn onClick={e => { e.stopPropagation(); deleteCourse(c.id); }} variant="danger" size="xs"><Icon name="Trash2" size={12} /></Btn></div>
                </div>
              </Card>
            </div>;})}
            {subCourses.length === 0 && <Card style={{ textAlign: "center", padding: 28 }}><div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}><Icon name="Inbox" size={44} color="#CCC" /></div><p style={{ fontWeight: 700 }}>Aucun cours dans cette matière</p></Card>}
          </>;
        })() : <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}><h2 style={{ fontSize: 20, fontWeight: 800, display: "flex", alignItems: "center", gap: 8 }}><Icon name="BookMarked" size={20} />Matières</h2><Btn onClick={() => { setNewSubject({ name: "", color: "#6C5CE7", icon: "BarChart2" }); setModal("addSubject"); }} size="sm">+ Ajouter</Btn></div>
          {data.subjects.length === 0 && <Card style={{ textAlign: "center", padding: 28 }}><div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}><Icon name="BookMarked" size={44} color="#CCC" /></div><p style={{ fontWeight: 700 }}>Aucune matière créée</p></Card>}

                <p style={{ fontSize: 12, color: C.textLight, margin: "2px 0 0 0" }}>{data.courses.filter(c => c.subjectId === s.id).length} cours · {data.activities.filter(a => a.subjectId === s.id).length} activités</p>
              </div>
            </div>
            <div style={{ display: "flex", gap: 6 }} onClick={e => e.stopPropagation()}>
              <Btn onClick={e => { e.stopPropagation(); setEditSubjectData({ ...s }); setModal("editSubject"); }} variant="outline" size="xs"><Icon name="Pencil" size={12} /></Btn>
              <Btn onClick={e => { e.stopPropagation(); deleteSubject(s.id); }} variant="danger" size="xs"><Icon name="Trash2" size={12} /></Btn>
            </div>
          </Card>)}
        </>}
      </div>}
      {isMobile && <BottomNav tabs={teacherTabs} active={view} onChange={tab => { setView(tab); setActiveClass(null); setActiveSubject(null); setActiveCourse(null); }} />}
