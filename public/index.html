// ── Sound Engine (Web Audio API — synthèse procédurale) ──
const SoundEngine = (() => {
  let ctx = null;
  let enabled = true;
  let musicEnabled = true;
  let musicOsc = null;
  let musicGain = null;

  const getCtx = () => {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  };

  const playNote = (freq, duration, type = 'sine', vol = 0.3, delay = 0) => {
    if (!enabled) return;
    const c = getCtx();
    const osc = c.createOscillator();
    const gain = c.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, c.currentTime + delay);
    gain.gain.linearRampToValueAtTime(vol, c.currentTime + delay + 0.02);
    gain.gain.linearRampToValueAtTime(0, c.currentTime + delay + duration);
    osc.connect(gain);
    gain.connect(c.destination);
    osc.start(c.currentTime + delay);
    osc.stop(c.currentTime + delay + duration + 0.05);
  };

  const playNoise = (duration, vol = 0.15) => {
    if (!enabled) return;
    const c = getCtx();
    const bufSize = c.sampleRate * duration;
    const buf = c.createBuffer(1, bufSize, c.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = c.createBufferSource();
    src.buffer = buf;
    const gain = c.createGain();
    const filter = c.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800;
    gain.gain.setValueAtTime(vol, c.currentTime);
    gain.gain.linearRampToValueAtTime(0, c.currentTime + duration);
    src.connect(filter);
    filter.connect(gain);
    gain.connect(c.destination);
    src.start();
    src.stop(c.currentTime + duration + 0.05);
  };

  return {
    setEnabled: (v) => { enabled = v; },
    isEnabled: () => enabled,
    setMusicEnabled: (v) => {
      musicEnabled = v;
      if (!v && musicOsc) { try { musicOsc.stop(); } catch(e){} musicOsc = null; }
    },
    isMusicEnabled: () => musicEnabled,

    tick: () => playNote(800, 0.05, 'sine', 0.08),
    countdown: () => playNote(440, 0.15, 'sine', 0.25),
    countdownFinal: () => { playNote(880, 0.1, 'square', 0.2); playNote(880, 0.1, 'square', 0.2, 0.12); },
    correct: () => { playNote(523, 0.12, 'sine', 0.3); playNote(659, 0.12, 'sine', 0.3, 0.1); playNote(784, 0.2, 'sine', 0.35, 0.2); },
    wrong: () => { playNote(330, 0.15, 'sawtooth', 0.15); playNote(220, 0.25, 'sawtooth', 0.12, 0.12); },
    streakUp: () => { playNote(660, 0.08, 'sine', 0.25); playNote(880, 0.08, 'sine', 0.25, 0.06); playNote(1100, 0.12, 'sine', 0.3, 0.12); playNote(1320, 0.15, 'triangle', 0.2, 0.18); },
    rankUp: () => { [523,587,659,784,1047].forEach((f,i) => playNote(f, 0.1, 'sine', 0.25, i*0.07)); },
    questionReveal: () => { playNoise(0.15, 0.1); playNote(1047, 0.15, 'sine', 0.2, 0.08); },
    podiumFanfare: () => {
      [523,659,784,1047].forEach((f,i) => playNote(f, 0.15, 'sine', 0.3, i*0.12));
      playNote(1047, 0.5, 'sine', 0.35, 0.6);
      playNote(1319, 0.5, 'sine', 0.3, 0.6);
    },
    joinPop: () => { playNote(1200, 0.06, 'sine', 0.15); playNote(1600, 0.08, 'sine', 0.12, 0.05); },

    startMusic: () => {
      if (!musicEnabled || !enabled) return;
      const c = getCtx();
      musicGain = c.createGain();
      musicGain.gain.value = 0.06;
      musicGain.connect(c.destination);
      const notes = [261, 329, 392, 329, 261, 392, 329, 261, 349, 440, 349, 261, 329, 392, 329, 261];
      let step = 0;
      const playStep = () => {
        if (!musicEnabled || !musicOsc) return;
        const osc = c.createOscillator();
        osc.type = 'sine';
        osc.frequency.value = notes[step % notes.length];
        const g = c.createGain();
        g.gain.setValueAtTime(0.06, c.currentTime);
        g.gain.linearRampToValueAtTime(0, c.currentTime + 0.35);
        osc.connect(g);
        g.connect(c.destination);
        osc.start();
        osc.stop(c.currentTime + 0.4);
        step++;
        musicOsc = setTimeout(playStep, 350);
      };
      musicOsc = setTimeout(playStep, 100);
    },
    stopMusic: () => {
      if (musicOsc) { clearTimeout(musicOsc); musicOsc = null; }
    },
  };
})();

// ── Confetti Canvas ──
function ConfettiCanvas({ active, duration = 2000 }) {
  const canvasRef = React.useRef(null);
  React.useEffect(() => {
    if (!active) return;
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#6C5CE7', '#00B894', '#FDCB6E', '#E17055', '#0984E3', '#FF6B81', '#A29BFE'];
    const particles = Array.from({ length: 60 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * -0.5,
      w: Math.random() * 8 + 4,
      h: Math.random() * 6 + 3,
      vx: (Math.random() - 0.5) * 4,
      vy: Math.random() * 3 + 2,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.2,
      color: colors[Math.floor(Math.random() * colors.length)],
    }));
    let startTime = Date.now();
    let animId;
    const draw = () => {
      const elapsed = Date.now() - startTime;
      if (elapsed > duration) { ctx.clearRect(0, 0, canvas.width, canvas.height); return; }
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const alpha = Math.max(0, 1 - elapsed / duration);
      particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.08;
        p.rot += p.rotV;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      });
      animId = requestAnimationFrame(draw);
    };
    animId = requestAnimationFrame(draw);
    return () => cancelAnimationFrame(animId);
  }, [active, duration]);
  if (!active) return null;
  return <canvas ref={canvasRef} style={{ position: 'fixed', inset: 0, zIndex: 9999, pointerEvents: 'none' }} />;
}

// ── Countdown Circulaire SVG ──
function CountdownCircle({ remaining, total, size = 80, danger = false }) {
  const radius = (size - 8) / 2;
  const circumference = 2 * Math.PI * radius;
  const progress = total > 0 ? Math.max(0, remaining / total) : 0;
  const offset = circumference * (1 - progress);
  const isDanger = remaining <= 5 && remaining > 0;
  const isUrgent = remaining <= 3 && remaining > 0;

  return <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <circle cx={size/2} cy={size/2} r={radius} fill="none" stroke="rgba(255,255,255,0.15)" strokeWidth="4" />
      <circle cx={size/2} cy={size/2} r={radius} fill="none"
        stroke={isDanger ? '#D63031' : '#00B894'}
        strokeWidth="4" strokeLinecap="round"
        strokeDasharray={circumference}
        strokeDashoffset={offset}
        style={{ transition: 'stroke-dashoffset 0.3s linear, stroke 0.3s' }}
      />
    </svg>
    <div style={{
      position: 'absolute', inset: 0, display: 'flex', alignItems: 'center', justifyContent: 'center',
      fontSize: isUrgent ? 28 : isDanger ? 24 : 20,
      fontWeight: 900, color: isDanger ? '#D63031' : '#fff',
      animation: isUrgent ? 'pulse 0.5s ease-in-out infinite' : isDanger ? 'pulse 1s ease-in-out infinite' : 'none',
    }}>
      {remaining > 0 ? remaining : '⏱'}
    </div>
  </div>;
}

// ============================================================================
// AURORA BACKGROUND — WebGL shader (adapté de react-bits/Aurora, sans OGL)
// ============================================================================
function Aurora({ colorStops = ['#5227FF', '#7cff67', '#5227FF'], amplitude = 1.0, blend = 0.5, speed = 1.0 }) {
  const ctnRef = React.useRef(null);
  const propsRef = React.useRef({ colorStops, amplitude, blend, speed });
  propsRef.current = { colorStops, amplitude, blend, speed };

  React.useEffect(() => {
    const ctn = ctnRef.current;
    if (!ctn) return;
    const canvas = document.createElement('canvas');
    const gl = canvas.getContext('webgl2', { alpha: true, premultipliedAlpha: true, antialias: true });
    if (!gl) return;
    gl.clearColor(0, 0, 0, 0);
    gl.enable(gl.BLEND);
    gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);

    const VERT = `#version 300 es\nin vec2 position;\nvoid main(){gl_Position=vec4(position,0.,1.);}`;
    const FRAG = `#version 300 es
precision highp float;
uniform float uTime; uniform float uAmplitude; uniform vec3 uColorStops[3]; uniform vec2 uResolution; uniform float uBlend;
out vec4 fragColor;
vec3 permute(vec3 x){return mod(((x*34.)+1.)*x,289.);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
  vec2 i=floor(v+dot(v,C.yy)); vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.,0.):vec2(0.,1.);
  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1; i=mod(i,289.);
  vec3 p=permute(permute(i.y+vec3(0.,i1.y,1.))+i.x+vec3(0.,i1.x,1.));
  vec3 m=max(.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.);
  m=m*m; m=m*m;
  vec3 x=2.*fract(p*C.www)-1.; vec3 h=abs(x)-.5; vec3 ox=floor(x+.5); vec3 a0=x-ox;
  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g; g.x=a0.x*x0.x+h.x*x0.y; g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.*dot(m,g);
}
void main(){
  vec2 uv=gl_FragCoord.xy/uResolution;
  vec3 c0=uColorStops[0],c1=uColorStops[1],c2=uColorStops[2];
  vec3 ramp=uv.x<.5?mix(c0,c1,uv.x*2.):mix(c1,c2,(uv.x-.5)*2.);
  float h=snoise(vec2(uv.x*2.+uTime*.1,uTime*.25))*.5*uAmplitude;
  h=exp(h); h=(uv.y*2.-h+.2);
  float intensity=.6*h;
  float alpha=smoothstep(uBlend*.5-uBlend*.5,.2+uBlend*.5,intensity);
  fragColor=vec4(intensity*ramp*alpha,alpha);
}`;

    const mkShader = (type, src) => { const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s); return s; };
    const prog = gl.createProgram();
    gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VERT));
    gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FRAG));
    gl.linkProgram(prog); gl.useProgram(prog);

    const buf = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, buf);
    gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 3,-1, -1,3]), gl.STATIC_DRAW);
    const posLoc = gl.getAttribLocation(prog, 'position');
    gl.enableVertexAttribArray(posLoc);
    gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

    const uTime=gl.getUniformLocation(prog,'uTime'), uAmp=gl.getUniformLocation(prog,'uAmplitude'),
          uCS=gl.getUniformLocation(prog,'uColorStops'), uRes=gl.getUniformLocation(prog,'uResolution'),
          uBlendU=gl.getUniformLocation(prog,'uBlend');

    const hexToRgb = h => [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255];

    const resize = () => {
      canvas.width=ctn.offsetWidth; canvas.height=ctn.offsetHeight;
      gl.viewport(0,0,canvas.width,canvas.height);
      gl.uniform2f(uRes, canvas.width, canvas.height);
    };
    const ro = new ResizeObserver(resize);
    ro.observe(ctn);
    canvas.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;pointer-events:none;';
    ctn.appendChild(canvas);
    resize();

    let animId;
    const draw = t => {
      animId = requestAnimationFrame(draw);
      const {colorStops:cs,amplitude:amp,blend:bl,speed:sp} = propsRef.current;
      gl.uniform1f(uTime, t*0.001*(sp||1));
      gl.uniform1f(uAmp, amp??1);
      gl.uniform1f(uBlendU, bl??0.5);
      gl.uniform3fv(uCS, (cs||['#5227FF','#7cff67','#5227FF']).map(hexToRgb).flat());
      gl.clear(gl.COLOR_BUFFER_BIT);
      gl.drawArrays(gl.TRIANGLES, 0, 3);
    };
    animId = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(animId); ro.disconnect();
      if (canvas.parentNode===ctn) ctn.removeChild(canvas);
      gl.getExtension('WEBGL_lose_context')?.loseContext();
    };
  }, []);

  return <div ref={ctnRef} style={{ position: 'absolute', inset: 0, overflow: 'hidden', zIndex: 0 }} />;
}

function LiveQuizStudent({ sessionId, student, onExit }) {
  const [liveData, setLiveData] = useState(null);
  const [selectedAnswer, setSelectedAnswer] = useState(null);
  const [localQ, setLocalQ] = useState(-1);
  const [lastScore, setLastScore] = useState(0);
  const [streak, setStreak] = useState(0);
  const [showConfetti, setShowConfetti] = useState(false);
  const [showScorePop, setShowScorePop] = useState(false);
  const [countdown, setCountdown] = useState(null);
  const [prevRank, setPrevRank] = useState(null);
  const [rankDelta, setRankDelta] = useState(null);
  const [myTeam, setMyTeam] = useState(null);
  const [reaction, setReaction] = useState(null);
  const [soundMuted, setSoundMuted] = useState(false);
  const [sessionEnded, setSessionEnded] = useState(false);
  const [connectionTimeout, setConnectionTimeout] = useState(false);
  const prevJoinedRef = React.useRef(0);
  const pollFailCount = React.useRef(0);
  const colors = ["#0984E3", C.primary, "#E17055", "#00B894"];
  const labels = ["A", "B", "C", "D"];

  // Timeout si la connexion prend trop longtemps
  React.useEffect(() => {
    const t = setTimeout(() => { if (!liveData) setConnectionTimeout(true); }, 10000);
    return () => clearTimeout(t);
  }, [liveData]);

  // Timer countdown local
  React.useEffect(() => {
    if (!liveData || liveData.status !== 'active' || !liveData.questionStartedAt || !liveData.timerSeconds) {
      setCountdown(null); return;
    }
    const update = () => {
      const serverNow = new Date(liveData.serverTime).getTime();
      const started = new Date(liveData.questionStartedAt).getTime();
      const elapsed = (Date.now() - (Date.now() - serverNow) - started) / 1000;
      const rem = Math.max(0, Math.ceil(liveData.timerSeconds - elapsed));
      setCountdown(rem);
      // Sons countdown
      if (rem <= 5 && rem > 3 && rem !== countdown) SoundEngine.countdown();
      if (rem <= 3 && rem > 0 && rem !== countdown) SoundEngine.countdownFinal();
    };
    update();
    const iv = setInterval(update, 200);
    return () => clearInterval(iv);
  }, [liveData?.questionStartedAt, liveData?.timerSeconds, liveData?.serverTime, liveData?.status]);

  // Polling
  React.useEffect(() => {
    let interval;
    const poll = async () => {
      try {
        const data = await api.get(`live-quiz/${sessionId}?studentId=${student.id}`);
        pollFailCount.current = 0;

        // Session supprimée ou erreur
        if (data.error || (!data.status && !data.currentQ && data.currentQ !== 0)) {
          clearInterval(interval);
          setSessionEnded(true);
          SoundEngine.stopMusic();
          return;
        }

        // Son quand un nouvel élève rejoint
        if (data.joinedCount > prevJoinedRef.current && prevJoinedRef.current > 0) SoundEngine.joinPop();
        prevJoinedRef.current = data.joinedCount;

        // Nouvelle question
        if (data.currentQ !== localQ) {
          setSelectedAnswer(null);
          setShowScorePop(false);
          setReaction(null);
          if (localQ >= 0) SoundEngine.questionReveal();
          // Calcul du delta de rang
          if (prevRank !== null && data.leaderboard) {
            const newRank = data.leaderboard.findIndex(l => l.studentId === student.id);
            if (newRank >= 0) {
              const delta = prevRank - newRank;
              if (delta !== 0) setRankDelta(delta);
              if (delta > 0) SoundEngine.rankUp();
            }
          }
          setLocalQ(data.currentQ);
        }

        // Enregistrer le rang actuel
        if (data.leaderboard) {
          const myRankNow = data.leaderboard.findIndex(l => l.studentId === student.id);
          if (myRankNow >= 0) setPrevRank(myRankNow);
        }

        // Équipe
        if (data.myTeam) setMyTeam(data.myTeam);
        if (data.myStreak !== undefined) setStreak(data.myStreak);

        setLiveData(data);
        if (data.status === 'finished') {
          clearInterval(interval);
          SoundEngine.podiumFanfare();
          setShowConfetti(true);
        }
      } catch(e) {
        pollFailCount.current++;
        // Si 5 échecs consécutifs, le live n'existe probablement plus
        if (pollFailCount.current >= 5) {
          clearInterval(interval);
          setSessionEnded(true);
          SoundEngine.stopMusic();
        }
      }
    };
    poll();
    interval = setInterval(poll, 1500);
    return () => clearInterval(interval);
  }, [sessionId, localQ]);

  // Musique de fond
  React.useEffect(() => {
    SoundEngine.startMusic();
    return () => SoundEngine.stopMusic();
  }, []);

  const handleAnswer = async (idx) => {
    if (selectedAnswer !== null || liveData?.hasAnswered) return;
    setSelectedAnswer(idx);
    SoundEngine.tick();
    try {
      const res = await api.post(`live-quiz/${sessionId}/answer`, { studentId: student.id, questionIdx: liveData.currentQ, answerIdx: idx });
      if (res.isCorrect) {
        SoundEngine.correct();
        setShowConfetti(true);
        setTimeout(() => setShowConfetti(false), 1500);
        if (res.streak >= 2) SoundEngine.streakUp();
      } else {
        SoundEngine.wrong();
      }
      setLastScore(res.score || 0);
      setStreak(res.streak || 0);
      setShowScorePop(true);
    } catch(e) {}
  };

  const handleTeamJoin = async (team) => {
    try {
      const res = await api.post(`live-quiz/${sessionId}/join-team`, { studentId: student.id, team });
      if (res.success) setMyTeam(team);
    } catch(e) {
      // Équipe pleine
    }
  };

  const toggleMute = () => {
    const newVal = !soundMuted;
    setSoundMuted(newVal);
    SoundEngine.setEnabled(!newVal);
    SoundEngine.setMusicEnabled(!newVal);
    if (newVal) SoundEngine.stopMusic();
    else SoundEngine.startMusic();
  };

  // Écran session terminée par le prof
  if (sessionEnded) return <div style={{ position: "fixed", inset: 0, zIndex: 300, background: "#F8F9FD", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Nunito',sans-serif" }}>
    <div style={{ textAlign: "center", maxWidth: 380, padding: 32 }}>
      <div style={{ width: 72, height: 72, borderRadius: '50%', background: `${C.warning}20`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px", animation: "correctPop 0.5s ease" }}>
        <Icon name="AlertTriangle" size={36} color={C.warning} />
      </div>
      <h2 style={{ fontWeight: 900, fontSize: 22, color: C.text, marginBottom: 8 }}>Live terminé</h2>
      <p style={{ color: C.textLight, fontSize: 14, fontWeight: 600, marginBottom: 24 }}>Le professeur a mis fin au quiz. Merci pour ta participation !</p>
      <Btn onClick={onExit} fullWidth>Retour</Btn>
    </div>
  </div>;

  // Écran de connexion avec timeout
  if (!liveData) return <div style={{ position: "fixed", inset: 0, zIndex: 300, background: "#F8F9FD", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Nunito',sans-serif" }}>
    <div style={{ textAlign: "center", maxWidth: 380, padding: 32 }}>
      <div style={{ width: 64, height: 64, borderRadius: '50%', background: `${C.primary}15`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", animation: "float 1s ease-in-out infinite" }}>
        <Icon name="Radio" size={32} color={C.primary} />
      </div>
      <p style={{ fontWeight: 700, color: C.text, fontSize: 16 }}>Connexion au live...</p>
      {connectionTimeout && <div style={{ marginTop: 16 }}>
        <p style={{ color: C.textLight, fontSize: 13, marginBottom: 12 }}>La connexion prend plus de temps que prévu.</p>
        <Btn onClick={onExit} variant="outline" size="sm">Quitter</Btn>
      </div>}
    </div>
  </div>;

  const { status, currentQ, totalQuestions, question, hasAnswered, leaderboard, mode, teams } = liveData;
  const myTotalScore = leaderboard?.find(l => l.studentId === student.id)?.score || 0;
  const myCorrectCount = leaderboard?.find(l => l.studentId === student.id)?.correctCount || 0;
  const isTF = question?.isTrueFalse;
  const teamColor = myTeam === 'A' ? '#0984E3' : myTeam === 'B' ? '#E17055' : null;

  return <div style={{ position: "fixed", inset: 0, zIndex: 300, background: "#F8F9FD", display: "flex", flexDirection: "column", fontFamily: "'Nunito',sans-serif", color: C.text }}>
    <ConfettiCanvas active={showConfetti} />

    {/* Top bar minimaliste */}
    <div style={{ position: "relative", zIndex: 1, background: "#fff", borderBottom: "1px solid #EEEEF5", padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#ff4444', animation: 'pulse 1s ease-in-out infinite', boxShadow: '0 0 6px rgba(255,68,68,0.6)' }} />
        <span style={{ fontWeight: 800, fontSize: 14, color: C.text }}>{liveData.activityTitle}</span>
        {myTeam && <span style={{ background: teamColor + '20', color: teamColor, padding: '2px 10px', borderRadius: 20, fontWeight: 700, fontSize: 11 }}>Éq. {myTeam}</span>}
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <button onClick={toggleMute} style={{ background: "#F0F0F8", color: C.textLight, border: "none", borderRadius: 8, padding: "5px 8px", cursor: "pointer", fontSize: 14 }}>{soundMuted ? '🔇' : '🔊'}</button>
        <button onClick={onExit} style={{ background: "#F0F0F8", color: C.textLight, border: "none", borderRadius: 8, padding: "5px 10px", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 11, cursor: "pointer" }}>✕</button>
      </div>
    </div>

    {/* Score + streak flottants */}
    <div style={{ position: "relative", zIndex: 1, display: "flex", justifyContent: "center", gap: 10, padding: "10px 16px 0" }}>
      <div style={{ background: "#fff", borderRadius: 14, padding: "6px 16px", boxShadow: "0 2px 8px rgba(0,0,0,0.06)", display: "flex", alignItems: "center", gap: 6 }}>
        <Icon name="Zap" size={16} color={C.primary} />
        <span style={{ fontWeight: 900, fontSize: 16, color: C.primary }}>{myTotalScore}</span>
        <span style={{ fontSize: 11, color: C.textLight, fontWeight: 600 }}>pts</span>
      </div>
      {streak >= 2 && <div style={{ background: 'linear-gradient(135deg, #E17055, #FDCB6E)', padding: '6px 14px', borderRadius: 14, fontWeight: 800, fontSize: 12, color: '#fff', display: 'flex', alignItems: 'center', gap: 4, animation: streak >= 5 ? 'pulse 0.5s ease-in-out infinite' : 'none', boxShadow: '0 2px 8px rgba(225,112,85,0.3)' }}>🔥 x{streak}</div>}
    </div>

    {/* Contenu */}
    <div style={{ position: "relative", zIndex: 1, flex: 1, overflow: "auto", padding: "12px 16px 16px", maxWidth: 640, margin: "0 auto", width: "100%" }}>

      {/* ── Waiting ── */}
      {status === 'waiting' && !myTeam && mode === 'team' && <div style={{ textAlign: "center", paddingTop: 40 }}>
        <h2 style={{ fontWeight: 900, fontSize: 22, marginBottom: 8, color: C.text }}>Choisis ton équipe !</h2>
        <p style={{ color: C.textLight, marginBottom: 24 }}>Les équipes doivent être équilibrées</p>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, maxWidth: 400, margin: '0 auto' }}>
          {['A', 'B'].map(t => {
            const tCount = teams?.[t]?.count || 0;
            const otherCount = teams?.[t === 'A' ? 'B' : 'A']?.count || 0;
            const disabled = tCount - otherCount >= 2;
            const tColor = t === 'A' ? '#0984E3' : '#E17055';
            return <button key={t} onClick={() => !disabled && handleTeamJoin(t)} disabled={disabled}
              style={{ background: disabled ? '#F0F0F8' : `${tColor}12`, border: `3px solid ${disabled ? '#E0E0E0' : tColor}`, borderRadius: 20, padding: '32px 16px', cursor: disabled ? 'not-allowed' : 'pointer', fontFamily: "'Nunito',sans-serif", color: C.text, textAlign: 'center', transition: 'all 0.2s', opacity: disabled ? 0.5 : 1 }}>
              <div style={{ fontSize: 32, fontWeight: 900, marginBottom: 8, color: tColor }}>Équipe {t}</div>
              <div style={{ fontSize: 14, color: C.textLight }}>{tCount} joueur{tCount > 1 ? 's' : ''}</div>
              {disabled && <div style={{ fontSize: 12, marginTop: 8, color: C.warning }}>Complète !</div>}
            </button>;
          })}
        </div>
      </div>}

      {status === 'waiting' && (mode !== 'team' || myTeam) && <div style={{ textAlign: "center", paddingTop: 40 }}>
        <div style={{ display: "flex", justifyContent: "center", marginBottom: 16, animation: "float 2s ease-in-out infinite" }}><Icon name="Clock" size={64} color={C.primary} /></div>
        <h2 style={{ fontWeight: 900, fontSize: 22, marginBottom: 8, color: C.text }}>En attente du démarrage</h2>
        <p style={{ color: C.textLight, fontWeight: 600, marginBottom: 24 }}>Le professeur va lancer le quiz dans quelques instants...</p>
        {/* Avatars des joueurs connectés */}
        <div style={{ display: 'flex', flexWrap: 'wrap', justifyContent: 'center', gap: 8, maxWidth: 400, margin: '0 auto' }}>
          {(liveData.joinedStudents || []).map((s, i) => <div key={s.id} style={{
            width: 40, height: 40, borderRadius: '50%',
            background: `hsl(${(i * 47) % 360}, 65%, 55%)`,
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontWeight: 800, fontSize: 13, color: '#fff',
            animation: `correctPop 0.4s ease ${i * 0.05}s both`,
            border: s.id === student.id ? '3px solid #fff' : '2px solid transparent',
            boxShadow: '0 2px 8px rgba(0,0,0,0.1)',
          }}>{s.firstName?.[0]}{s.lastName?.[0]}</div>)}
        </div>
        <p style={{ fontSize: 12, color: C.textLight, marginTop: 12 }}>{liveData.joinedCount} / {liveData.totalStudents} élèves</p>
        {myTeam && <div style={{ marginTop: 12, background: teamColor + '15', border: `2px solid ${teamColor}40`, borderRadius: 12, padding: '8px 16px', display: 'inline-block', color: teamColor, fontWeight: 700 }}>Équipe {myTeam}</div>}
      </div>}

      {/* ── Active / Paused ── */}
      {(status === 'active' || status === 'paused') && question && <>
        {/* Progression + Timer */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
            <Chip color={status === 'paused' ? C.warning : C.secondary}>{status === 'paused' ? <span style={{display:"flex",alignItems:"center",gap:4}}><Icon name="PauseCircle" size={12} /> Pause</span> : <span style={{display:"flex",alignItems:"center",gap:4}}><Icon name="Radio" size={12} /> En direct</span>}</Chip>
            <span style={{ fontWeight: 700, color: C.textLight, fontSize: 13 }}>Question {currentQ + 1} / {totalQuestions}</span>
          </div>
          {status === 'active' && countdown !== null && <CountdownCircle remaining={countdown} total={liveData.timerSeconds} size={56} />}
        </div>
        <ProgressBar value={currentQ + 1} max={totalQuestions} color={C.primary} height={6} style={{ marginBottom: 16 }} />

        {/* Rank delta */}
        {rankDelta !== null && <div style={{ textAlign: 'center', marginBottom: 8, animation: 'fadeIn 0.3s' }}>
          <span style={{ background: rankDelta > 0 ? 'rgba(0,184,148,0.15)' : 'rgba(214,48,49,0.15)', color: rankDelta > 0 ? '#00B894' : '#D63031', padding: '4px 14px', borderRadius: 20, fontWeight: 800, fontSize: 13 }}>
            {rankDelta > 0 ? `↑ +${rankDelta} place${rankDelta > 1 ? 's' : ''}` : `↓ ${rankDelta} place${rankDelta < -1 ? 's' : ''}`}
          </span>
        </div>}

        {/* Question */}
        <div style={{ background: "#fff", borderRadius: 16, padding: 24, marginBottom: 16, textAlign: "center", animation: "fadeIn 0.4s", border: question.isMatching ? `2px solid ${C.warning}60` : '1px solid #EEEEF5', boxShadow: '0 2px 12px rgba(0,0,0,0.06)' }}>
          {question.isMatching && <div style={{ fontSize: 11, fontWeight: 700, color: C.warning, marginBottom: 8 }}>🔗 ASSOCIATION</div>}
          <p style={{ fontSize: 18, fontWeight: 800, lineHeight: 1.4, margin: 0, color: C.text }}>{question.q}</p>
        </div>

        {/* Choix — Vrai/Faux ou QCM */}
        {isTF ? (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
            {['Vrai', 'Faux'].map((label, i) => {
              const answered = hasAnswered || selectedAnswer !== null;
              const isSelected = selectedAnswer === i;
              const isCorrect = status === 'paused' && i === question.answer;
              const isWrong = status === 'paused' && isSelected && i !== question.answer;
              const tfColor = i === 0 ? '#00B894' : '#D63031';
              let bg = `${tfColor}12`, border = `3px solid ${tfColor}40`, clr = tfColor;
              if (isSelected && status === 'active') { bg = tfColor; clr = "#fff"; border = `3px solid ${tfColor}`; }
              if (isCorrect) { bg = "#00B894"; clr = "#fff"; border = "3px solid #00B894"; }
              if (isWrong) { bg = "#D63031"; clr = "#fff"; border = "3px solid #D63031"; }
              return <button key={i} onClick={() => handleAnswer(i)} disabled={answered || (countdown !== null && countdown <= 0)}
                style={{ background: bg, border, borderRadius: 20, padding: "28px 16px", cursor: answered ? "default" : "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 900, fontSize: 22, color: clr, transition: "all 0.2s", textAlign: "center", opacity: (countdown !== null && countdown <= 0 && !answered) ? 0.4 : 1, boxShadow: '0 2px 8px rgba(0,0,0,0.06)' }}>
                {i === 0 ? '✓' : '✗'} {label}
              </button>;
            })}
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 16 }}>
            {(question.choices || []).map((choice, i) => {
              const answered = hasAnswered || selectedAnswer !== null;
              const isSelected = selectedAnswer === i;
              const isCorrect = status === 'paused' && i === question.answer;
              const isWrong = status === 'paused' && isSelected && i !== question.answer;
              let bg = `${colors[i % 4]}10`, border = `2px solid ${colors[i % 4]}40`, clr = C.text;
              if (isSelected && status === 'active') { bg = colors[i % 4]; clr = "#fff"; border = `2px solid ${colors[i % 4]}`; }
              if (isCorrect) { bg = "#00B894"; clr = "#fff"; border = "2px solid #00B894"; }
              if (isWrong) { bg = "#D63031"; clr = "#fff"; border = "2px solid #D63031"; }
              return <button key={i} onClick={() => handleAnswer(i)} disabled={answered || (countdown !== null && countdown <= 0)}
                style={{ background: bg, border, borderRadius: 14, padding: "14px 10px", cursor: answered ? "default" : "pointer", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 13, color: clr, transition: "all 0.2s", textAlign: "left", display: "flex", alignItems: "center", gap: 8, animation: `fadeIn ${0.1 + i * 0.08}s ease`, opacity: (countdown !== null && countdown <= 0 && !answered) ? 0.4 : 1, boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
                <span style={{ width: 24, height: 24, borderRadius: 6, background: (isSelected || isCorrect || isWrong) ? "rgba(255,255,255,0.3)" : colors[i % 4], display: "flex", alignItems: "center", justifyContent: "center", fontSize: 11, fontWeight: 800, color: "#fff", flexShrink: 0 }}>{labels[i]}</span>
                {choice}
              </button>;
            })}
          </div>
        )}

        {/* Timer expired */}
        {countdown !== null && countdown <= 0 && !hasAnswered && selectedAnswer === null && <div style={{ padding: 16, textAlign: "center", background: "#D6303112", border: "1px solid #D6303130", borderRadius: 16, marginBottom: 12 }}>
          <p style={{ fontWeight: 700, color: "#D63031", margin: 0 }}>⏱ Temps écoulé !</p>
        </div>}

        {/* Feedback après réponse (active) */}
        {(hasAnswered || selectedAnswer !== null) && status === 'active' && <div style={{ textAlign: "center" }}>
          {showScorePop && lastScore > 0 && <div style={{ marginBottom: 8 }}><ScorePop score={lastScore} streak={streak} /></div>}
          <div style={{ padding: 12, background: "#00B89412", border: "1px solid #00B89430", borderRadius: 14 }}>
            <p style={{ fontWeight: 700, color: "#00B894", margin: 0, fontSize: 13 }}>✅ Réponse envoyée !</p>
          </div>
        </div>}

        {/* Résultat révélé (pause) */}
        {status === 'paused' && selectedAnswer !== null && (() => {
          const correct = selectedAnswer === question.answer;
          return <div style={{ animation: correct ? "correctPop 0.5s ease" : "wrongShake 0.45s ease", borderRadius: 18, padding: "20px 16px", textAlign: "center", background: correct ? "linear-gradient(135deg,#00B894,#00cec9)" : "linear-gradient(135deg,#D63031,#e17055)", color: "#fff", marginBottom: 8, boxShadow: correct ? "0 6px 24px rgba(0,184,148,0.3)" : "0 6px 24px rgba(214,48,49,0.25)" }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 8 }}>{correct ? <Icon name="CheckCircle2" size={48} color="#fff" /> : <Icon name="XCircle" size={48} color="#fff" />}</div>
            <div style={{ fontWeight: 900, fontSize: 22, marginBottom: 4 }}>{correct ? "Bonne réponse !" : "Mauvaise réponse"}</div>
            {correct && lastScore > 0 && <div style={{ marginTop: 4 }}><ScorePop score={lastScore} streak={streak} /></div>}
            {!correct && question.answer !== undefined && <div style={{ fontSize: 13, opacity: 0.9 }}>La bonne réponse était : <strong>{isTF ? (question.answer === 0 ? 'Vrai' : 'Faux') : labels[question.answer]}</strong></div>}
          </div>;
        })()}

        {/* Reactions (pause) */}
        {status === 'paused' && <div style={{ display: 'flex', justifyContent: 'center', gap: 8, marginBottom: 8 }}>
          {['😎', '🤯', '😅', '💪'].map(emoji => <button key={emoji} onClick={() => setReaction(emoji)}
            style={{ fontSize: 24, background: reaction === emoji ? `${C.primary}15` : '#F0F0F8', border: reaction === emoji ? `2px solid ${C.primary}40` : '2px solid transparent', borderRadius: 12, padding: '8px 12px', cursor: 'pointer', transition: 'all 0.2s' }}>
            {emoji}
          </button>)}
        </div>}

        {/* Explication (pause) */}
        {status === 'paused' && question.explanation && <div style={{ padding: 14, background: `${C.warning}10`, border: `1px solid ${C.warning}30`, borderRadius: 14, marginBottom: 8 }}>
          <p style={{ fontWeight: 700, color: C.warning, margin: "0 0 4px 0", display: "flex", alignItems: "center", gap: 6, fontSize: 13 }}><Icon name="Lightbulb" size={14} color={C.warning} /> Explication</p>
          <p style={{ margin: 0, lineHeight: 1.5, color: C.text, fontSize: 13 }}>{question.explanation}</p>
        </div>}

        {/* Mini leaderboard (pause) */}
        {status === 'paused' && leaderboard && leaderboard.length > 0 && <div style={{ background: '#fff', borderRadius: 14, padding: 12, marginTop: 4, border: '1px solid #EEEEF5', boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
          <div style={{ fontWeight: 800, fontSize: 13, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6, color: C.text }}><Icon name="Trophy" size={14} color={C.warning} /> Top 3</div>
          {leaderboard.slice(0, 3).map((l, i) => {
            const medalColors = ["#F1C40F","#BDC3C7","#CD7F32"];
            const isMe = l.studentId === student.id;
            return <div key={l.studentId} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '4px 8px', borderRadius: 8, background: isMe ? `${C.primary}10` : 'transparent', marginBottom: 2 }}>
              <Icon name="Medal" size={16} color={medalColors[i]} />
              <span style={{ flex: 1, fontWeight: isMe ? 800 : 600, fontSize: 13, color: C.text }}>{l.firstName} {l.lastName}{isMe ? ' (moi)' : ''}</span>
              <span style={{ fontWeight: 800, fontSize: 13, color: C.primary }}>{l.score}</span>
            </div>;
          })}
        </div>}
      </>}

      {/* ── Finished ── */}
      {status === 'finished' && (() => {
        const lb = leaderboard || [];
        const medalColors = ["#F1C40F","#BDC3C7","#CD7F32"];
        const podiumOrder = [1, 0, 2]; // 2ème, 1er, 3ème
        const podiumHeights = [100, 140, 80];
        const top3 = lb.slice(0, 3);
        const myRank = lb.findIndex(l => l.studentId === student.id);
        const myEntry = lb[myRank];

        return <div style={{ textAlign: "center", paddingTop: 16 }}>
          <div style={{ animation: "correctPop 0.6s ease" }}>
            <Icon name="Trophy" size={64} color={C.warning} />
          </div>
          <h2 style={{ fontWeight: 900, fontSize: 26, marginBottom: 4, marginTop: 8, color: C.text }}>Quiz terminé !</h2>

          {/* Équipe gagnante */}
          {mode === 'team' && teams && <div style={{ marginBottom: 16, animation: 'fadeIn 0.5s' }}>
            {(() => {
              const winner = (teams.A?.score || 0) >= (teams.B?.score || 0) ? 'A' : 'B';
              const wColor = winner === 'A' ? '#0984E3' : '#E17055';
              return <div style={{ background: `${wColor}10`, border: `2px solid ${wColor}40`, borderRadius: 16, padding: 16 }}>
                <div style={{ fontWeight: 900, fontSize: 20, color: C.text }}>🏆 Équipe {winner} remporte la victoire !</div>
                <div style={{ display: 'flex', justifyContent: 'center', gap: 24, marginTop: 8 }}>
                  <div><span style={{ fontWeight: 700, color: '#0984E3' }}>Équipe A</span><div style={{ fontWeight: 900, fontSize: 18, color: C.text }}>{teams.A?.score || 0} pts</div></div>
                  <div><span style={{ fontWeight: 700, color: '#E17055' }}>Équipe B</span><div style={{ fontWeight: 900, fontSize: 18, color: C.text }}>{teams.B?.score || 0} pts</div></div>
                </div>
              </div>;
            })()}
          </div>}

          {/* Score personnel */}
          <div style={{ background: `${C.primary}08`, border: `1px solid ${C.primary}25`, borderRadius: 16, padding: 16, marginBottom: 16 }}>
            <div style={{ fontSize: 14, color: C.textLight, marginBottom: 4 }}>Ton score</div>
            <div style={{ fontWeight: 900, fontSize: 32, color: C.primary }}>{myTotalScore} pts</div>
            <div style={{ fontSize: 13, color: C.textLight, marginTop: 4 }}>{myCorrectCount} / {totalQuestions} bonnes réponses</div>
            {myRank >= 0 && <div style={{ marginTop: 8, fontWeight: 800, fontSize: 15, color: C.text }}>
              {myRank === 0 ? '🥇 1er !' : myRank === 1 ? '🥈 2ème !' : myRank === 2 ? '🥉 3ème !' : `${myRank + 1}ème`}
            </div>}
          </div>

          {/* Podium visuel */}
          {top3.length >= 2 && <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'flex-end', gap: 8, marginBottom: 16, height: 180 }}>
            {podiumOrder.map((rankIdx, displayIdx) => {
              const entry = top3[rankIdx];
              if (!entry) return <div key={displayIdx} style={{ width: 80 }} />;
              const isMe = entry.studentId === student.id;
              return <div key={entry.studentId} style={{ textAlign: 'center', animation: `fadeIn ${0.3 + displayIdx * 0.2}s ease` }}>
                <div style={{ width: 40, height: 40, borderRadius: '50%', background: medalColors[rankIdx], display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 800, fontSize: 14, color: '#fff', margin: '0 auto 6px', border: isMe ? '3px solid #fff' : 'none', boxShadow: '0 2px 8px rgba(0,0,0,0.15)' }}>
                  {entry.firstName?.[0]}
                </div>
                <div style={{ fontSize: 11, fontWeight: isMe ? 800 : 600, marginBottom: 4, color: C.text }}>{entry.firstName}</div>
                <div style={{
                  width: 80, height: podiumHeights[displayIdx],
                  background: `linear-gradient(180deg, ${medalColors[rankIdx]}40, ${medalColors[rankIdx]}10)`,
                  borderRadius: '10px 10px 0 0', display: 'flex', flexDirection: 'column', justifyContent: 'flex-start', alignItems: 'center', paddingTop: 10, border: `1px solid ${medalColors[rankIdx]}30`, borderBottom: 'none',
                }}>
                  <div style={{ fontSize: 20, fontWeight: 900, color: C.text }}>{rankIdx + 1}</div>
                  <div style={{ fontSize: 11, fontWeight: 700, color: C.textLight }}>{entry.score} pts</div>
                </div>
              </div>;
            })}
          </div>}

          {myRank >= 3 && myEntry && <div style={{ background: `${C.primary}08`, borderRadius: 12, padding: '10px 16px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10, border: `1px solid ${C.primary}20` }}>
            <span style={{ fontWeight: 900, fontSize: 16, color: C.primary }}>{myRank + 1}e</span>
            <span style={{ flex: 1, fontWeight: 700, textAlign: 'left', color: C.text }}>{myEntry.firstName} {myEntry.lastName} (moi)</span>
            <span style={{ fontWeight: 800, color: C.primary }}>{myEntry.score} pts</span>
          </div>}

          <Btn onClick={onExit} fullWidth style={{ marginTop: 8 }}>Fermer</Btn>
        </div>;
      })()}
    </div>
  </div>;
}

function LiveQuizTeacher({ sessionId, activityTitle, totalQuestions: initTotal, classStudents, onClose }) {
  const [liveData, setLiveData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [showConfetti, setShowConfetti] = useState(false);
  const [countdown, setCountdown] = useState(null);
  const [soundMuted, setSoundMuted] = useState(false);
  const [initError, setInitError] = useState(null);
  const prevJoinedRef = React.useRef(0);
  const pollFailRef = React.useRef(0);
  const colors = ["#0984E3", C.primary, "#E17055", "#00B894"];
  const labels = ["A", "B", "C", "D"];

  // Timer countdown
  React.useEffect(() => {
    if (!liveData || liveData.status !== 'active' || !liveData.questionStartedAt || !liveData.timerSeconds) { setCountdown(null); return; }
    const update = () => {
      const serverNow = new Date(liveData.serverTime).getTime();
      const started = new Date(liveData.questionStartedAt).getTime();
      const elapsed = (Date.now() - (Date.now() - serverNow) - started) / 1000;
      setCountdown(Math.max(0, Math.ceil(liveData.timerSeconds - elapsed)));
    };
    update();
    const iv = setInterval(update, 200);
    return () => clearInterval(iv);
  }, [liveData?.questionStartedAt, liveData?.timerSeconds, liveData?.serverTime, liveData?.status]);

  React.useEffect(() => {
    if (countdown !== null && countdown <= 5 && countdown > 3) SoundEngine.countdown();
    if (countdown !== null && countdown <= 3 && countdown > 0) SoundEngine.countdownFinal();
  }, [countdown]);

  // Polling
  React.useEffect(() => {
    let interval;
    const poll = async () => {
      try {
        const data = await api.get(`live-quiz/${sessionId}`);
        if (data.error) {
          pollFailRef.current++;
          if (pollFailRef.current >= 3) { clearInterval(interval); setInitError(data.error); SoundEngine.stopMusic(); }
          return;
        }
        pollFailRef.current = 0;
        if (data.joinedCount > prevJoinedRef.current && prevJoinedRef.current > 0) SoundEngine.joinPop();
        prevJoinedRef.current = data.joinedCount;
        setLiveData(data);
        if (data.status === 'finished') { clearInterval(interval); SoundEngine.podiumFanfare(); setShowConfetti(true); }
      } catch(e) {
        pollFailRef.current++;
        if (pollFailRef.current >= 3) { clearInterval(interval); setInitError('Impossible de se connecter au serveur.'); SoundEngine.stopMusic(); }
      }
    };
    poll();
    interval = setInterval(poll, 2000);
    return () => clearInterval(interval);
  }, [sessionId]);

  React.useEffect(() => { SoundEngine.startMusic(); return () => SoundEngine.stopMusic(); }, []);

  const action = async (act) => {
    setLoading(true);
    try { await api.put(`live-quiz/${sessionId}`, { action: act }); if (act === 'pause') SoundEngine.questionReveal(); }
    catch(e) {}
    setLoading(false);
  };

  const handleClose = async () => {
    if (liveData && liveData.status !== 'finished') {
      try { await api.put(`live-quiz/${sessionId}`, { action: 'cancel' }); } catch(e) {}
    }
    SoundEngine.stopMusic();
    onClose();
  };

  const toggleMute = () => {
    const v = !soundMuted; setSoundMuted(v); SoundEngine.setEnabled(!v); SoundEngine.setMusicEnabled(!v);
    if (v) SoundEngine.stopMusic(); else SoundEngine.startMusic();
  };

  if (!liveData) return <div style={{ position: "fixed", inset: 0, zIndex: 300, background: "#F8F9FD", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "'Nunito',sans-serif" }}>
    <div style={{ textAlign: "center", maxWidth: 400, padding: 24 }}>
      {initError ? <>
        <div style={{ width: 64, height: 64, borderRadius: '50%', background: '#D6303115', display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" }}>
          <Icon name="AlertTriangle" size={32} color="#D63031" />
        </div>
        <h3 style={{ fontWeight: 900, color: C.text, marginBottom: 8 }}>Erreur de connexion</h3>
        <p style={{ color: C.textLight, fontSize: 13, marginBottom: 8 }}>{initError}</p>
        <p style={{ color: C.textLight, fontSize: 12, marginBottom: 16, background: '#F0F0F8', borderRadius: 10, padding: '8px 12px' }}>Vérifiez que la migration v9 a été exécutée (table <code>live_teams</code>).</p>
        <Btn onClick={handleClose}>Fermer</Btn>
      </> : <>
        <div style={{ width: 64, height: 64, borderRadius: '50%', background: `${C.primary}15`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px", animation: "float 1s ease-in-out infinite" }}>
          <Icon name="Radio" size={32} color={C.primary} />
        </div>
        <p style={{ fontWeight: 700, color: C.text }}>Initialisation du Live Quiz...</p>
      </>}
    </div>
  </div>;

  const { status, currentQ, totalQuestions, question, answeredCount, totalStudents, joinedStudents, joinedCount, distribution, leaderboard, mode, teams, avgTimeMs, activityType } = liveData;
  const isLast = currentQ + 1 >= totalQuestions;
  const allAnswered = joinedCount > 0 && answeredCount >= joinedCount;

  return <div style={{ position: "fixed", inset: 0, zIndex: 300, background: "#F8F9FD", display: "flex", flexDirection: "column", fontFamily: "'Nunito',sans-serif", color: C.text }}>
    <ConfettiCanvas active={showConfetti} duration={3000} />
    {/* Header minimaliste */}
    <div style={{ position: "relative", zIndex: 1, background: "#fff", borderBottom: "1px solid #EEEEF5", padding: "10px 20px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
        <div style={{ width: 10, height: 10, borderRadius: '50%', background: status === 'active' ? '#ff4444' : status === 'finished' ? '#636E72' : '#FDCB6E', animation: status === 'active' ? 'pulse 1s ease-in-out infinite' : 'none', boxShadow: status === 'active' ? '0 0 8px rgba(255,68,68,0.6)' : 'none' }} />
        <div>
          <div style={{ fontWeight: 900, fontSize: 16, color: C.text }}>{activityTitle}</div>
          <div style={{ fontSize: 11, color: C.textLight, display: 'flex', alignItems: 'center', gap: 6 }}>Panel Professeur
            {mode === 'team' && <span style={{ background: `${C.primary}10`, color: C.primary, padding: '1px 8px', borderRadius: 10, fontSize: 10, fontWeight: 700 }}>Équipes</span>}
            {activityType && activityType !== 'qcm' && <span style={{ background: `${C.primary}10`, color: C.primary, padding: '1px 8px', borderRadius: 10, fontSize: 10, fontWeight: 700 }}>{activityType === 'truefalse' ? 'V/F' : 'Assoc.'}</span>}
          </div>
        </div>
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        {countdown !== null && status === 'active' && <div style={{ fontWeight: 900, fontSize: 20, color: countdown <= 5 ? '#D63031' : C.text, animation: countdown <= 3 ? 'pulse 0.5s ease-in-out infinite' : 'none', fontVariantNumeric: 'tabular-nums' }}>{countdown}s</div>}
        <div style={{ background: status === 'active' ? "#00B894" : status === 'paused' ? C.warning : status === 'waiting' ? C.primaryLight : "#636E72", padding: "4px 12px", borderRadius: 20, fontSize: 12, fontWeight: 800, color: '#fff' }}>
          {status === 'active' ? 'EN DIRECT' : status === 'paused' ? 'PAUSE' : status === 'waiting' ? 'ATTENTE' : 'TERMINÉ'}
        </div>
        <button onClick={toggleMute} style={{ background: "#F0F0F8", color: C.textLight, border: "none", borderRadius: 8, padding: "6px 10px", cursor: "pointer", fontSize: 14 }}>{soundMuted ? '🔇' : '🔊'}</button>
        <button onClick={handleClose} style={{ background: "#F0F0F8", color: C.textLight, border: "none", borderRadius: 10, padding: "8px 14px", fontFamily: "'Nunito',sans-serif", fontWeight: 700, fontSize: 13, cursor: "pointer" }}>✕</button>
      </div>
    </div>

    {/* Corps — 3 colonnes : Stats | Quiz | Classement */}
    <div style={{ position: "relative", zIndex: 1, flex: 1, overflow: "auto" }}>
    <div style={{ display: "grid", gridTemplateColumns: "260px 1fr 280px", gap: 16, maxWidth: 1280, margin: "0 auto", padding: "16px 20px", alignItems: "start" }}>

      {/* ══ COLONNE GAUCHE — Stats réponses ══ */}
      <div style={{ position: 'sticky', top: 0 }}>
        {/* Participants */}
        <div style={{ background: "#fff", borderRadius: 16, padding: 14, border: '1px solid #EEEEF5', boxShadow: '0 2px 8px rgba(0,0,0,0.04)', marginBottom: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
            <h4 style={{ fontWeight: 800, fontSize: 13, margin: 0, display: 'flex', alignItems: 'center', gap: 6, color: C.text }}><Icon name="Users" size={14} color={C.primary} /> Participants</h4>
            <span style={{ fontWeight: 800, fontSize: 13, color: joinedCount > 0 ? C.primary : C.textLight }}>{joinedCount}/{totalStudents}</span>
          </div>
          {joinedCount === 0 ? <p style={{ color: C.textLight, fontSize: 12, margin: 0, textAlign: 'center' }}>En attente...</p>
            : <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4 }}>
              {(joinedStudents || []).map((s, i) => <div key={s.id} title={`${s.firstName} ${s.lastName}`} style={{
                width: 30, height: 30, borderRadius: '50%', background: `hsl(${(i*47)%360},60%,50%)`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontWeight: 800, fontSize: 10, color: '#fff', animation: `correctPop 0.3s ease ${i*0.04}s both`,
              }}>{s.firstName?.[0]}{s.lastName?.[0]}</div>)}
            </div>}
        </div>

        {/* Équipes (mode team) */}
        {mode === 'team' && teams && <div style={{ background: "#fff", borderRadius: 16, padding: 14, border: '1px solid #EEEEF5', boxShadow: '0 2px 8px rgba(0,0,0,0.04)', marginBottom: 12 }}>
          <h4 style={{ fontWeight: 800, fontSize: 13, margin: '0 0 10px', display: 'flex', alignItems: 'center', gap: 6, color: C.text }}><Icon name="Swords" size={14} color={C.primary} /> Équipes</h4>
          <div style={{ display: 'flex', gap: 8 }}>
            <div style={{ flex: 1, background: '#0984E308', border: '2px solid #0984E330', borderRadius: 12, padding: '10px 8px', textAlign: 'center' }}>
              <div style={{ fontWeight: 800, fontSize: 11, color: '#0984E3' }}>Équipe A</div>
              <div style={{ fontWeight: 900, fontSize: 22, color: '#0984E3' }}>{teams.A?.score || 0}</div>
              <div style={{ fontSize: 10, color: C.textLight }}>{teams.A?.count || 0} joueurs</div>
            </div>
            <div style={{ flex: 1, background: '#E1705508', border: '2px solid #E1705530', borderRadius: 12, padding: '10px 8px', textAlign: 'center' }}>
              <div style={{ fontWeight: 800, fontSize: 11, color: '#E17055' }}>Équipe B</div>
              <div style={{ fontWeight: 900, fontSize: 22, color: '#E17055' }}>{teams.B?.score || 0}</div>
              <div style={{ fontSize: 10, color: C.textLight }}>{teams.B?.count || 0} joueurs</div>
            </div>
          </div>
        </div>}

        {/* Stats détaillées (active/pause) */}
        {(status === 'active' || status === 'paused') && question && <div style={{ background: "#fff", borderRadius: 16, padding: 14, border: '1px solid #EEEEF5', boxShadow: '0 2px 8px rgba(0,0,0,0.04)', marginBottom: 12 }}>
          <h4 style={{ fontWeight: 800, fontSize: 13, margin: '0 0 10px', display: 'flex', alignItems: 'center', gap: 6, color: C.text }}><Icon name="TrendingUp" size={14} color="#00B894" /> Stats</h4>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid #F0F0F8' }}>
            <span style={{ fontSize: 12, color: C.textLight }}>Réponses</span>
            <span style={{ fontWeight: 800, fontSize: 13, color: allAnswered ? '#00B894' : answeredCount > 0 ? '#E67E22' : C.textLight }}>{answeredCount}/{joinedCount}{allAnswered ? ' ✓' : ''}</span>
          </div>
          {avgTimeMs != null && avgTimeMs > 0 && <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0', borderBottom: '1px solid #F0F0F8' }}>
            <span style={{ fontSize: 12, color: C.textLight }}>Temps moyen</span>
            <span style={{ fontWeight: 800, fontSize: 13, color: C.text }}>{(avgTimeMs / 1000).toFixed(1)}s</span>
          </div>}
          {status === 'paused' && (() => { const total = distribution.reduce((a, b) => a + b, 0); const correct = total > 0 ? distribution[question.answer] || 0 : 0; const pct = total > 0 ? Math.round((correct / total) * 100) : 0; return <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '6px 0' }}>
            <span style={{ fontSize: 12, color: C.textLight }}>Bonnes réponses</span>
            <span style={{ fontWeight: 800, fontSize: 13, color: pct >= 70 ? '#00B894' : pct >= 40 ? '#E67E22' : '#D63031' }}>{pct}%</span>
          </div>; })()}
        </div>}

        {/* Info quand waiting */}
        {status === 'waiting' && <div style={{ background: "#fff", borderRadius: 16, padding: 14, border: '1px solid #EEEEF5', boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
          <h4 style={{ fontWeight: 800, fontSize: 13, margin: '0 0 10px', display: 'flex', alignItems: 'center', gap: 6, color: C.text }}><Icon name="BarChart3" size={14} color={C.primary} /> Réponses</h4>
          <p style={{ color: C.textLight, fontSize: 12, margin: 0, textAlign: 'center' }}>Les stats apparaîtront quand le quiz démarrera.</p>
        </div>}
      </div>

      {/* ══ COLONNE CENTRALE — Quiz & Gestion ══ */}
      <div>
        {/* ── Waiting ── */}
        {status === 'waiting' && <div style={{ textAlign: "center", paddingTop: 24 }}>
          <div style={{ background: '#fff', borderRadius: 20, padding: '40px 32px', border: '1px solid #EEEEF5', boxShadow: '0 2px 12px rgba(0,0,0,0.04)' }}>
            <div style={{ display: "flex", justifyContent: "center", marginBottom: 16 }}>
              <div style={{ width: 72, height: 72, borderRadius: '50%', background: `${C.primary}10`, display: 'flex', alignItems: 'center', justifyContent: 'center', animation: "float 2s ease-in-out infinite" }}>
                <Icon name="Clock" size={36} color={C.primary} />
              </div>
            </div>
            <h2 style={{ fontWeight: 900, fontSize: 22, marginBottom: 6, color: C.text }}>Quiz prêt à démarrer</h2>
            <p style={{ color: C.textLight, marginBottom: 24, fontSize: 14 }}>Les élèves rejoignent le salon...</p>
            <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: joinedCount > 0 ? '#00B89410' : '#F0F0F8', padding: '8px 20px', borderRadius: 20, marginBottom: 24 }}>
              <Icon name="Users" size={16} color={joinedCount > 0 ? '#00B894' : C.textLight} />
              <span style={{ fontWeight: 800, fontSize: 15, color: joinedCount > 0 ? '#00B894' : C.textLight }}>{joinedCount} / {totalStudents}</span>
              <span style={{ fontSize: 12, color: C.textLight }}>connecté{joinedCount > 1 ? 's' : ''}</span>
            </div>
            <div>
              <Btn onClick={() => action('start')} size="lg" disabled={loading || joinedCount === 0} style={{ background: '#00B894', padding: '14px 40px' }}>
                <span style={{ display: 'flex', alignItems: 'center', gap: 8 }}><Icon name="Play" size={18} /> Démarrer le quiz</span>
              </Btn>
            </div>
          </div>
        </div>}

        {/* ── Active / Paused ── */}
        {(status === 'active' || status === 'paused') && question && <div style={{ animation: "fadeIn 0.3s" }}>
          {/* Timer bar */}
          {status === 'active' && countdown !== null && <div style={{ background: "#E0E0E0", borderRadius: 10, height: 6, marginBottom: 10, overflow: "hidden" }}>
            <div style={{ width: `${(countdown / (liveData.timerSeconds || 20)) * 100}%`, height: "100%", background: countdown <= 5 ? '#D63031' : countdown <= 10 ? '#FDCB6E' : '#00B894', borderRadius: 10, transition: "width 0.3s linear, background 0.3s" }} />
          </div>}

          {/* Progression */}
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
            <span style={{ fontWeight: 700, color: C.textLight, fontSize: 13 }}>Question {currentQ + 1} / {totalQuestions}</span>
            {status === 'active' && countdown !== null && <span style={{ fontWeight: 900, fontSize: 18, color: countdown <= 5 ? '#D63031' : C.text, animation: countdown <= 3 ? 'pulse 0.5s ease-in-out infinite' : 'none', fontVariantNumeric: 'tabular-nums' }}>{countdown}s</span>}
          </div>
          <div style={{ background: "#E0E0E0", borderRadius: 10, height: 6, marginBottom: 16, overflow: "hidden" }}>
            <div style={{ width: `${((currentQ + 1) / totalQuestions) * 100}%`, height: "100%", background: C.primary, borderRadius: 10, transition: "width 0.4s" }} />
          </div>

          {/* Question card + Distribution */}
          <div style={{ background: "#fff", borderRadius: 18, padding: '28px 24px', marginBottom: 16, border: "1px solid #EEEEF5", boxShadow: "0 2px 12px rgba(0,0,0,0.05)" }}>
            {question.isMatching && <div style={{ fontSize: 11, fontWeight: 700, color: C.warning, marginBottom: 8, textAlign: 'center' }}>🔗 ASSOCIATION</div>}
            <p style={{ fontSize: 20, fontWeight: 800, margin: 0, lineHeight: 1.5, color: C.text, textAlign: 'center' }}>{question.q}</p>
            {status === 'paused' && question.answer !== undefined && <div style={{ marginTop: 12, textAlign: 'center' }}>
              <div style={{ padding: '8px 16px', background: '#00B89410', borderRadius: 12, display: 'inline-block' }}>
                <span style={{ fontWeight: 800, fontSize: 13, color: '#00B894' }}>Réponse : {question.isTrueFalse ? (question.answer === 0 ? 'Vrai' : 'Faux') : (labels[question.answer] || '') + (question.choices?.[question.answer] ? ` — ${question.choices[question.answer]}` : '')}</span>
              </div>
            </div>}
            {/* Distribution des réponses sous la question */}
            <div style={{ marginTop: 20, paddingTop: 16, borderTop: '1px solid #F0F0F8' }}>
              <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                <span style={{ fontWeight: 700, fontSize: 12, color: C.textLight, display: 'flex', alignItems: 'center', gap: 5 }}><Icon name="BarChart3" size={13} color={C.primary} /> Réponses en direct</span>
                <span style={{ fontWeight: 700, fontSize: 12, color: allAnswered ? "#00B894" : answeredCount > 0 ? '#E67E22' : C.textLight }}>{answeredCount}/{joinedCount}{allAnswered ? ' ✓' : ''}</span>
              </div>
              <DistributionBar choices={question.choices} distribution={distribution} correctAnswer={question.answer} revealed={status === 'paused'} />
            </div>
          </div>

          {/* Explication si pause */}
          {status === 'paused' && question.explanation && <div style={{ background: `${C.warning}08`, border: `1px solid ${C.warning}25`, borderRadius: 14, padding: 16, marginBottom: 16 }}>
            <p style={{ fontWeight: 700, color: C.warning, margin: "0 0 4px 0", display: "flex", alignItems: "center", gap: 6, fontSize: 13 }}><Icon name="Lightbulb" size={14} color={C.warning} /> Explication</p>
            <p style={{ margin: 0, color: C.text, lineHeight: 1.5, fontSize: 14 }}>{question.explanation}</p>
          </div>}

          {/* Attente réponses */}
          {status === 'active' && !allAnswered && joinedCount > 0 && <div style={{ background: '#fff', borderRadius: 14, padding: '12px 16px', fontSize: 13, color: C.textLight, border: '1px solid #EEEEF5', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 8 }}>
            <div style={{ width: 6, height: 6, borderRadius: '50%', background: '#FDCB6E', animation: 'pulse 1.5s ease-in-out infinite' }} />
            {joinedCount - answeredCount} élève(s) n'ont pas encore répondu
          </div>}

          {/* Boutons d'action */}
          <div style={{ display: "flex", gap: 10, flexWrap: "wrap", alignItems: "center" }}>
            {status === 'active' && <>
              <Btn onClick={() => action('pause')} style={{ background: allAnswered ? "#00B894" : undefined, transition: "background 0.3s", flex: 1 }} disabled={loading}>
                <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Icon name="Eye" size={16} /> Révéler la réponse{!allAnswered ? ` (${answeredCount}/${joinedCount})` : ''}</span>
              </Btn>
              {!isLast && <Btn onClick={() => action('skip')} variant="outline" disabled={loading}><span style={{display:"flex",alignItems:"center",gap:4}}><Icon name="SkipForward" size={14} /> Skip</span></Btn>}
            </>}
            {status === 'paused' && <>
              {!isLast ? <Btn onClick={() => action('next')} disabled={loading} style={{ background: '#00B894', flex: 1 }}>
                <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Icon name="ArrowRight" size={16} /> Question suivante</span>
              </Btn>
                : <Btn onClick={() => action('finish')} style={{ background: "#D63031", flex: 1 }} disabled={loading}>
                  <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6}}><Icon name="FlagTriangleRight" size={16} /> Terminer le quiz</span>
                </Btn>}
            </>}
          </div>
        </div>}

function QCMActivity({ activity, onComplete }) {
  const [current, setCurrent] = useState(0);
  const [selected, setSelected] = useState(null);
  const [showResult, setShowResult] = useState(false);
  const [score, setScore] = useState(0);
  const [finished, setFinished] = useState(false);
  const [timeLeft, setTimeLeft] = useState(30);
  const timerRef = useRef(null);
  const questions = activity.data.questions;
  const q = questions[current];

  useEffect(() => {
    if (finished || showResult) return;
    setTimeLeft(30);
    timerRef.current = setInterval(() => {
      setTimeLeft(t => { if (t <= 1) { handleAnswer(-1); return 30; } return t - 1; });
    }, 1000);
    return () => clearInterval(timerRef.current);
  }, [current, finished, showResult]);

  const handleAnswer = (idx) => { clearInterval(timerRef.current); setSelected(idx); setShowResult(true); if (idx === q.answer) setScore(s => s + 1); };
  const next = () => { if (current + 1 >= questions.length) setFinished(true); else { setCurrent(c => c + 1); setSelected(null); setShowResult(false); } };

  if (finished) {
    const pct = Math.round(score / questions.length * 100);
    return <div style={{ textAlign: "center", animation: "fadeIn 0.5s" }}>
      {pct >= 80 ? <MascotCelebration message={pct === 100 ? "Sans faute ! Tu gères !" : "Excellent travail !"} sub={`${score}/${questions.length} bonnes réponses`} />

      <h2 style={{ fontSize: 28, fontWeight: 900 }}>{pct >= 80 ? "Excellent !" : pct >= 50 ? "Bien joué !" : "Continue !"}</h2>
      <div style={{ fontSize: 48, fontWeight: 900, color: pct >= 80 ? C.secondary : pct >= 50 ? C.primary : C.accent, marginBottom: 8 }}>{pct}%</div>
      {pct < 80 && <p style={{ color: C.textLight, marginBottom: 8 }}>{score}/{questions.length} bonnes réponses</p>}
      <div style={{ display: "inline-flex", alignItems: "center", gap: 6, background: `${C.warning}30`, padding: "8px 20px", borderRadius: 12, fontWeight: 700, color: C.accent, marginBottom: 24 }}>+{activity.xpReward || activity.xp_reward} XP <Icon name="Zap" size={14} color={C.accent} /></div><br />
      <Btn onClick={() => onComplete(pct)} size="lg">Terminer</Btn>
    </div>;
  }

  return <div style={{ animation: "fadeIn 0.3s" }}>
    <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 20, paddingTop: 18 }}>
      <span style={{ fontSize: 13, fontWeight: 700, color: C.textLight }}>{current + 1}/{questions.length}</span>
      <MascotMiniProgress value={current + 1} max={questions.length} color={C.primary} />
      <div style={{ background: timeLeft <= 10 ? "#FFE0E0" : "#F0F0F8", padding: "6px 14px", borderRadius: 10, fontWeight: 800, fontSize: 15, color: timeLeft <= 10 ? C.danger : C.text, minWidth: 50, textAlign: "center", display: "flex", alignItems: "center", gap: 4 }}><Icon name="Timer" size={14} color={timeLeft <= 10 ? C.danger : C.text} /> {timeLeft}s</div>
    </div>
    <h3 style={{ fontSize: 20, fontWeight: 800, marginBottom: 20, lineHeight: 1.4 }}>{q.q}</h3>
    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
      {q.choices.map((c, i) => {
        let bg = "#F0F0F8", border = "2px solid transparent", col = C.text;
        if (showResult) { if (i === q.answer) { bg = "#D4EDDA"; border = `2px solid ${C.secondary}`; col = "#155724"; } else if (i === selected) { bg = "#FFE0E0"; border = `2px solid ${C.danger}`; col = C.danger; } }
        return <button key={i} onClick={() => !showResult && handleAnswer(i)} disabled={showResult} style={{ padding: "16px 20px", borderRadius: 16, border, background: bg, color: col, fontSize: 15, fontWeight: 600, fontFamily: "'Nunito',sans-serif", cursor: showResult ? "default" : "pointer", textAlign: "left", transition: "all 0.2s", display: "flex", alignItems: "center", gap: 12 }}>
          <span style={{ width: 32, height: 32, borderRadius: 10, display: "flex", alignItems: "center", justifyContent: "center", background: showResult && i === q.answer ? C.secondary : showResult && i === selected ? C.danger : C.primary, color: "#fff", fontSize: 14, fontWeight: 800, flexShrink: 0 }}>{String.fromCharCode(65 + i)}</span>{c}
        </button>;

    <br /><Btn onClick={() => onComplete(100)} size="lg">Terminer</Btn>
  </div>;

  return <div style={{ animation: "fadeIn 0.3s" }}>
    {/* Instruction dynamique */}
    <div style={{ textAlign: "center", marginBottom: 14, minHeight: 38 }}>
      {leftSelected !== null
        ? <div style={{ background: `${C.accent}15`, border: `1.5px solid ${C.accent}50`, borderRadius: 12, padding: "8px 16px", fontSize: 13, fontWeight: 700, color: C.accent, display: "inline-block" }}>
            ← <span style={{ fontWeight: 900 }}>{pairs[leftSelected].left}</span> · Maintenant choisis sa définition →
          </div>
        : <p style={{ color: C.textLight, fontWeight: 600, fontSize: 13, margin: 0 }}>Appuie sur un concept à gauche, puis sa définition à droite</p>}
    </div>
    <div style={{ marginBottom: 14, paddingTop: 22 }}><MascotMiniProgress value={matched.length} max={pairs.length} color={C.secondary} /></div>
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 8 }}>
      {/* Colonne gauche — Concepts */}
      <div>
        <div style={{ textAlign: "center", fontWeight: 800, fontSize: 11, color: C.primary, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 7, padding: "5px 8px", background: `${C.primary}12`, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", gap: 5 }}><Icon name="List" size={11} color={C.primary} /> Concepts</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {pairs.map((p, i) => <button key={i} onClick={() => !isLM(i) && setLeftSelected(i === leftSelected ? null : i)} disabled={isLM(i)} style={{
            padding: "11px 12px", borderRadius: 12, border: "none",
            background: isLM(i) ? `${C.secondary}18` : leftSelected === i ? C.primary : `${C.primary}12`,
            color: isLM(i) ? C.secondary : leftSelected === i ? "#fff" : C.primary,
            fontSize: 13, fontWeight: 800, fontFamily: "'Nunito',sans-serif",
            cursor: isLM(i) ? "default" : "pointer", textAlign: "left",
            transition: "all 0.18s", transform: leftSelected === i ? "scale(1.03)" : "scale(1)",
            boxShadow: leftSelected === i ? `0 4px 14px ${C.primary}40` : "none",
            lineHeight: 1.3, display: "flex", alignItems: "center", gap: 6
          }}>{isLM(i) ? <Icon name="CheckCircle2" size={14} color={C.secondary} /> : leftSelected === i ? <Icon name="ChevronRight" size={14} color="#fff" /> : null}{p.left}</button>)}
        </div>
      </div>
      {/* Colonne droite — Définitions */}
      <div>
        <div style={{ textAlign: "center", fontWeight: 800, fontSize: 11, color: C.accent, textTransform: "uppercase", letterSpacing: 0.8, marginBottom: 7, padding: "5px 8px", background: `${C.accent}12`, borderRadius: 8, display: "flex", alignItems: "center", justifyContent: "center", gap: 5 }}><Icon name="Lightbulb" size={11} color={C.accent} /> Définitions</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
          {shuffledRight.map((t, i) => <button key={i} onClick={() => handleRight(t)} disabled={isRM(t) || leftSelected === null} style={{
            padding: "11px 12px", borderRadius: 12,
            border: `2px solid ${isRM(t) ? `${C.secondary}40` : wrong === t ? C.danger : leftSelected !== null ? `${C.accent}55` : "#E4E4F0"}`,
            background: isRM(t) ? `${C.secondary}12` : wrong === t ? "#FFE0E0" : leftSelected !== null ? `${C.accent}08` : "#F6F6FC",
            color: isRM(t) ? C.secondary : wrong === t ? C.danger : leftSelected !== null ? C.text : C.textMuted,
            fontSize: 12, fontWeight: 600, fontFamily: "'Nunito',sans-serif",
            cursor: isRM(t) || leftSelected === null ? "default" : "pointer", textAlign: "left",
            opacity: isRM(t) ? 0.7 : leftSelected === null ? 0.5 : 1,
            transition: "all 0.18s", lineHeight: 1.3, display: "flex", alignItems: "center", gap: 6
          }}>{isRM(t) ? <Icon name="CheckCircle2" size={13} color={C.secondary} /> : null}{t}</button>)}
        </div>
      </div>
    </div>
  </div>;
}

function ActivityPlayer({ activity, onComplete, onBack }) {
  const typeLabels = { qcm: "QCM", flashcards: "Flashcards", truefalse: "Vrai / Faux", fillblank: "Texte à trous", matching: "Associations" };
  const typeIcons = { qcm: "ListChecks", flashcards: "CreditCard", truefalse: "ToggleLeft", fillblank: "PenLine", matching: "Link2" };
  const diffLabels = ["", "Facile", "Moyen", "Difficile"];
  const xp = activity.xpReward || activity.xp_reward;
  return <div style={{ maxWidth: 650, margin: "0 auto", padding: 20 }}>
    <button onClick={onBack} style={{ background: "none", border: "none", cursor: "pointer", fontFamily: "'Nunito',sans-serif", fontSize: 15, fontWeight: 700, color: C.textLight, marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}><Icon name="ArrowLeft" size={16} /> Retour</button>
    <Card style={{ marginBottom: 20 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
        <div style={{ width: 48, height: 48, borderRadius: 14, background: `${C.primary}15`, display: "flex", alignItems: "center", justifyContent: "center" }}><Icon name={typeIcons[activity.type]} size={26} color={C.primary} /></div>
        <div><h2 style={{ margin: 0, fontSize: 20, fontWeight: 800 }}>{activity.title}</h2><div style={{ display: "flex", gap: 6, marginTop: 4, flexWrap: "wrap" }}><Chip color={C.primary}>{typeLabels[activity.type]}</Chip><Chip color={activity.difficulty >= 3 ? C.danger : activity.difficulty >= 2 ? C.accent : C.secondary}>{diffLabels[activity.difficulty]}</Chip><Chip color={C.warning}>+{xp} XP</Chip></div></div>
      </div>
    </Card>
    <Card>
      {activity.type === "qcm" && <QCMActivity activity={activity} onComplete={onComplete} />}
      {activity.type === "flashcards" && <FlashcardsActivity activity={activity} onComplete={onComplete} />}
      {activity.type === "truefalse" && <TrueFalseActivity activity={activity} onComplete={onComplete} />}
      {activity.type === "fillblank" && <FillBlankActivity activity={activity} onComplete={onComplete} />}
      {activity.type === "matching" && <MatchingActivity activity={activity} onComplete={onComplete} />}
    </Card>
  </div>;
}
