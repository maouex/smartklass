<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartKlass — Transformez vos cours en expériences interactives</title>
    <meta name="description" content="SmartKlass : la plateforme d'apprentissage interactive qui crée automatiquement des activités engageantes à partir de vos contenus. QCM, flashcards, quiz… en un clic.">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="shortcut icon" href="/icons/favicon.ico">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#6C5CE7">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Nunito', sans-serif; background: #F8F9FD; color: #2D3436; overflow-x: hidden; }

        :root {
            --primary: #6C5CE7;
            --primary-light: #A29BFE;
            --secondary: #00B894;
            --secondary-light: #55EFC4;
            --accent: #E17055;
            --accent-light: #FAB1A0;
            --warning: #FDCB6E;
            --bg: #F8F9FD;
            --card: #FFFFFF;
            --text: #2D3436;
            --text-light: #636E72;
            --text-muted: #B2BEC3;
            --g1: linear-gradient(135deg, #6C5CE7, #A29BFE);
            --g2: linear-gradient(135deg, #00B894, #55EFC4);
            --g3: linear-gradient(135deg, #E17055, #FAB1A0);
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
            --radius: 20px;
            --max-w: 1200px;
        }

        /* ── Animations ── */
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-14px)} }
        @keyframes floatSlow { 0%,100%{transform:translateY(0) rotate(0deg)} 50%{transform:translateY(-8px) rotate(2deg)} }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(40px)} to{opacity:1;transform:translateY(0)} }
        @keyframes scaleIn { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
        @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.08);opacity:0.8} }
        @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }
        @keyframes mascotWave { 0%,100%{transform:rotate(0deg)} 25%{transform:rotate(-6deg)} 75%{transform:rotate(6deg)} }
        @keyframes mascotBounce { 0%,100%{transform:translateY(0)} 40%{transform:translateY(-18px)} 60%{transform:translateY(-10px)} }
        @keyframes bubblePop { 0%{opacity:0;transform:scale(0.7) translateY(10px)} 60%{transform:scale(1.05) translateY(-2px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
        @keyframes walkCycle { 0%{transform:translateX(-20px)} 100%{transform:translateX(20px)} }
        @keyframes slideInLeft { from{opacity:0;transform:translateX(-50px)} to{opacity:1;transform:translateX(0)} }
        @keyframes slideInRight { from{opacity:0;transform:translateX(50px)} to{opacity:1;transform:translateX(0)} }

        .reveal { opacity:0; transform:translateY(40px); transition:opacity 0.7s ease, transform 0.7s ease; }
        .reveal.visible { opacity:1; transform:translateY(0); }
        .reveal-delay-1 { transition-delay:0.1s; }
        .reveal-delay-2 { transition-delay:0.2s; }
        .reveal-delay-3 { transition-delay:0.3s; }
        .reveal-delay-4 { transition-delay:0.4s; }
        .reveal-delay-5 { transition-delay:0.5s; }

        /* ── Header ── */
        .header {
            position:fixed; top:0; left:0; right:0; z-index:100;
            padding:14px 32px; transition:all 0.3s ease; background:transparent;
        }
        .header.scrolled {
            background:rgba(255,255,255,0.9); backdrop-filter:blur(20px);
            -webkit-backdrop-filter:blur(20px); box-shadow:0 2px 20px rgba(0,0,0,0.06);
            padding:8px 32px;
        }
        .header-inner { max-width:var(--max-w); margin:0 auto; display:flex; align-items:center; justify-content:space-between; }
        .header-logo { display:flex; align-items:center; gap:10px; font-size:22px; font-weight:900; color:var(--primary); text-decoration:none; }
        .header-logo img { height:42px; width:auto; filter:drop-shadow(0 2px 8px rgba(108,92,231,0.25)); transition:transform 0.3s; }
        .header-logo:hover img { transform:rotate(-8deg) scale(1.1); }
        .header-nav { display:flex; align-items:center; gap:28px; }
        .header-nav a { text-decoration:none; color:var(--text); font-weight:700; font-size:15px; transition:color 0.2s; }
        .header-nav a:hover { color:var(--primary); }
        .header-cta {
            background:var(--g1); color:white; border:none; padding:10px 24px;
            border-radius:50px; font-weight:800; font-size:14px; cursor:pointer;
            text-decoration:none; transition:transform 0.2s, box-shadow 0.2s;
        }
        .header-cta:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(108,92,231,0.3); }

        .hamburger { display:none; background:none; border:none; cursor:pointer; width:32px; height:32px; position:relative; z-index:110; }
        .hamburger span { display:block; width:24px; height:2px; background:var(--text); margin:6px auto; transition:all 0.3s ease; border-radius:2px; }
        .hamburger.open span:nth-child(1) { transform:rotate(45deg) translate(5px,6px); }
        .hamburger.open span:nth-child(2) { opacity:0; }
        .hamburger.open span:nth-child(3) { transform:rotate(-45deg) translate(5px,-6px); }
        .mobile-nav {
            display:none; position:fixed; top:0; left:0; right:0; bottom:0;
            background:rgba(255,255,255,0.97); backdrop-filter:blur(20px);
            flex-direction:column; align-items:center; justify-content:center; gap:32px; z-index:105;
        }
        .mobile-nav.open { display:flex; }
        .mobile-nav a { text-decoration:none; color:var(--text); font-weight:800; font-size:24px; transition:color 0.2s; }
        .mobile-nav a:hover { color:var(--primary); }

        @media (max-width:768px) {
            .header-nav { display:none; }
            .hamburger { display:block; }
            .header { padding:12px 20px; }
        }

        /* ── Hero — Mascot-first ── */
        .hero {
            min-height:100vh; display:flex; align-items:center; justify-content:center;
            padding:120px 32px 80px; position:relative; overflow:hidden;
            background:linear-gradient(170deg, #F8F9FD 0%, #EDE7FF 40%, #F0FFF8 70%, #F8F9FD 100%);
        }
        .hero::before {
            content:''; position:absolute; top:-100px; right:-100px;
            width:500px; height:500px; border-radius:50%;
            background:radial-gradient(circle, rgba(108,92,231,0.1) 0%, transparent 70%);
            pointer-events:none;
        }
        .hero::after {
            content:''; position:absolute; bottom:-80px; left:-80px;
            width:400px; height:400px; border-radius:50%;
            background:radial-gradient(circle, rgba(0,184,148,0.08) 0%, transparent 70%);
            pointer-events:none;
        }
        .hero-inner { max-width:var(--max-w); margin:0 auto; width:100%; text-align:center; position:relative; z-index:2; }

        /* Mascot hero block */
        .hero-mascot-scene {
            display:flex; align-items:flex-end; justify-content:center; gap:0; margin-bottom:32px;
            position:relative;
        }
        .hero-mascot-main {
            width:clamp(120px, 22vw, 200px); height:auto; z-index:3;
            animation:mascotBounce 2.5s ease-in-out infinite;
            filter:drop-shadow(0 12px 30px rgba(108,92,231,0.3));
        }
        .hero-mascot-side {
            width:clamp(70px, 12vw, 110px); height:auto; z-index:2; opacity:0.7;
            filter:drop-shadow(0 8px 20px rgba(0,0,0,0.15));
        }
        .hero-mascot-left {
            animation:floatSlow 3.5s ease-in-out infinite;
            margin-right:-20px; margin-bottom:5px;
        }
        .hero-mascot-right {
            animation:floatSlow 3.5s ease-in-out infinite 1s;
            margin-left:-20px; margin-bottom:5px; transform:scaleX(-1);
        }
        .hero-bubble {
            position:absolute; top:-20px; left:50%; transform:translateX(-50%);
            background:white; border-radius:22px; padding:12px 24px;
            box-shadow:0 8px 30px rgba(108,92,231,0.18); border:2px solid rgba(108,92,231,0.12);
            animation:bubblePop 0.7s ease-out 0.5s both; white-space:nowrap;
            z-index:10;
        }
        .hero-bubble p { margin:0; font-weight:800; font-size:clamp(13px, 3vw, 16px); color:var(--text); }
        .hero-bubble::after {
            content:''; position:absolute; bottom:-10px; left:50%; margin-left:-8px;
            width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent;
            border-top:11px solid white;
        }

        .hero h1 {
            font-size:clamp(32px, 6vw, 56px); font-weight:900; line-height:1.1;
            color:var(--text); margin-bottom:16px;
        }
        .hero h1 span {
            background:var(--g1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
        }
        .hero-sub {
            font-size:clamp(16px, 2.5vw, 20px); color:var(--text-light); line-height:1.6;
            margin:0 auto 36px; max-width:600px;
        }
        .hero-buttons { display:flex; gap:16px; justify-content:center; flex-wrap:wrap; }
        .btn-primary {
            background:var(--g1); color:white; border:none; padding:16px 36px;
            border-radius:50px; font-weight:800; font-size:17px; cursor:pointer;
            text-decoration:none; transition:transform 0.2s, box-shadow 0.2s;
            display:inline-flex; align-items:center; gap:8px;
        }
        .btn-primary:hover { transform:translateY(-3px); box-shadow:0 8px 30px rgba(108,92,231,0.35); }
        .btn-outline {
            background:transparent; color:var(--primary); border:2px solid var(--primary);
            padding:14px 34px; border-radius:50px; font-weight:800; font-size:17px;
            cursor:pointer; text-decoration:none; transition:all 0.2s;
            display:inline-flex; align-items:center; gap:8px;
        }
        .btn-outline:hover { background:var(--primary); color:white; transform:translateY(-3px); }

        /* ── Stats ── */
        .stats-bar { background:var(--card); padding:40px 32px; border-top:1px solid #F0F0F8; border-bottom:1px solid #F0F0F8; }
        .stats-inner { max-width:var(--max-w); margin:0 auto; display:flex; justify-content:center; gap:60px; flex-wrap:wrap; }
        .stat-item { text-align:center; }
        .stat-number { font-size:42px; font-weight:900; background:var(--g1); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
        .stat-label { font-size:15px; color:var(--text-light); font-weight:600; margin-top:4px; }
        @media (max-width:768px) { .stats-inner { gap:32px; } .stat-number { font-size:32px; } }

        /* ── Sections ── */
        .section { padding:100px 32px; }
        .section-inner { max-width:var(--max-w); margin:0 auto; }
        .section-title { font-size:clamp(28px, 5vw, 42px); font-weight:900; text-align:center; margin-bottom:16px; color:var(--text); }
        .section-subtitle { font-size:clamp(15px, 2.5vw, 18px); color:var(--text-light); text-align:center; max-width:600px; margin:0 auto 60px; line-height:1.6; }
        @media (max-width:768px) { .section { padding:60px 20px; } }

        /* ── Features — Mascot-guided ── */
        .features-showcase { display:flex; flex-direction:column; gap:80px; }
        .feature-row {
            display:grid; grid-template-columns:1fr 1fr; gap:60px; align-items:center;
        }
        .feature-row.reverse { direction:rtl; }
        .feature-row.reverse > * { direction:ltr; }
        .feature-visual {
            display:flex; align-items:center; justify-content:center; position:relative;
        }
        .feature-mascot-wrapper {
            position:relative; display:flex; flex-direction:column; align-items:center;
        }
        .feature-mascot {
            width:clamp(100px, 18vw, 160px); height:auto;
            filter:drop-shadow(0 10px 25px rgba(108,92,231,0.2));
        }
        .feature-mascot-bubble {
            position:relative; background:white; border-radius:18px; padding:10px 18px;
            box-shadow:0 6px 24px rgba(0,0,0,0.08); border:2px solid rgba(108,92,231,0.1);
            margin-bottom:-4px; text-align:center; max-width:220px;
        }
        .feature-mascot-bubble p { margin:0; font-weight:800; font-size:13px; color:var(--primary); }
        .feature-mascot-bubble::after {
            content:''; position:absolute; bottom:-9px; left:50%; margin-left:-7px;
            width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent;
            border-top:10px solid white;
        }
        .feature-content h3 { font-size:clamp(22px, 3.5vw, 30px); font-weight:900; margin-bottom:12px; color:var(--text); }
        .feature-content p { font-size:clamp(14px, 2vw, 17px); color:var(--text-light); line-height:1.7; margin-bottom:16px; }
        .feature-pills { display:flex; gap:8px; flex-wrap:wrap; }
        .feature-pill {
            display:inline-flex; align-items:center; gap:6px;
            background:#F7F7FF; border:1px solid rgba(108,92,231,0.15);
            padding:6px 14px; border-radius:50px; font-size:13px; font-weight:700; color:var(--primary);
        }
        .feature-pill.green { background:#F0FFF8; border-color:rgba(0,184,148,0.15); color:var(--secondary); }
        .feature-pill.orange { background:#FFF5F3; border-color:rgba(225,112,85,0.15); color:var(--accent); }

        @media (max-width:768px) {
            .feature-row, .feature-row.reverse { grid-template-columns:1fr; direction:ltr; text-align:center; gap:30px; }
            .feature-visual { order:-1; }
            .feature-pills { justify-content:center; }
        }

        /* ── Live Quiz ── */
        .livequiz-section {
            background:linear-gradient(135deg, #E17055 0%, #F39C6B 50%, #FDCB6E 100%);
            color:white; position:relative; overflow:hidden;
        }
        .livequiz-section::before {
            content:''; position:absolute; top:0; left:0; right:0; bottom:0;
            background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1.5' fill='rgba(255,255,255,0.08)'/%3E%3C/svg%3E");
            pointer-events:none;
        }
        .livequiz-section .section-title { color:white; }
        .livequiz-section .section-subtitle { color:rgba(255,255,255,0.9); }
        .livequiz-badge {
            display:inline-flex; align-items:center; gap:8px;
            background:rgba(255,255,255,0.18); border:1px solid rgba(255,255,255,0.3);
            padding:8px 20px; border-radius:50px; font-weight:700; font-size:14px; margin-bottom:24px;
        }
        .livequiz-dot { width:8px; height:8px; border-radius:50%; background:#ff4444; animation:pulse 1.5s ease-in-out infinite; box-shadow:0 0 8px rgba(255,68,68,0.6); }
        .livequiz-hero {
            display:flex; align-items:center; justify-content:center; gap:40px; margin-top:48px; flex-wrap:wrap;
        }
        .livequiz-mascot-area {
            display:flex; flex-direction:column; align-items:center; flex-shrink:0;
        }
        .livequiz-mascot {
            width:clamp(100px, 18vw, 150px); height:auto;
            filter:drop-shadow(0 8px 20px rgba(0,0,0,0.2));
            animation:mascotBounce 2s ease-in-out infinite;
        }
        .livequiz-mascot-bubble {
            background:rgba(255,255,255,0.95); border-radius:16px; padding:10px 18px;
            margin-bottom:-4px; text-align:center; position:relative;
            box-shadow:0 4px 16px rgba(0,0,0,0.1);
        }
        .livequiz-mascot-bubble p { margin:0; font-weight:800; font-size:13px; color:var(--accent); }
        .livequiz-mascot-bubble::after {
            content:''; position:absolute; bottom:-9px; left:50%; margin-left:-7px;
            width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent;
            border-top:10px solid rgba(255,255,255,0.95);
        }
        .livequiz-mockup {
            background:rgba(255,255,255,0.12); backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:28px;
            max-width:480px; width:100%;
        }
        .livequiz-mockup-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
        .livequiz-mockup-title { font-size:17px; font-weight:800; }
        .livequiz-mockup-live {
            display:flex; align-items:center; gap:8px;
            background:rgba(255,68,68,0.3); border:1px solid rgba(255,68,68,0.5);
            padding:4px 12px; border-radius:50px; font-size:12px; font-weight:700;
        }
        .livequiz-mockup-question {
            background:rgba(255,255,255,0.15); border-radius:12px; padding:18px;
            margin-bottom:14px; font-size:15px; font-weight:700;
        }
        .livequiz-mockup-options { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
        .livequiz-mockup-option { padding:12px; border-radius:10px; text-align:center; font-weight:700; font-size:13px; cursor:default; }
        .livequiz-mockup-bar { margin-top:16px; display:flex; align-items:center; gap:12px; }
        .livequiz-mockup-timer { font-size:22px; font-weight:900; font-variant-numeric:tabular-nums; }
        .livequiz-mockup-progress { flex:1; height:6px; background:rgba(255,255,255,0.2); border-radius:3px; overflow:hidden; }
        .livequiz-mockup-progress-fill { height:100%; width:65%; background:white; border-radius:3px; }
        .livequiz-mockup-players { margin-top:14px; display:flex; align-items:center; gap:8px; font-size:12px; opacity:0.85; }
        .livequiz-mockup-avatars { display:flex; }
        .livequiz-mockup-avatar {
            width:26px; height:26px; border-radius:50%; border:2px solid rgba(255,255,255,0.3);
            display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; margin-left:-8px;
        }
        .livequiz-mockup-avatar:first-child { margin-left:0; }
        @media (max-width:768px) {
            .livequiz-hero { flex-direction:column; }
            .livequiz-mockup-options { grid-template-columns:1fr; }
        }

        /* ── AI Section ── */
        .ai-section {
            background:linear-gradient(135deg, #6C5CE7 0%, #8B7CF7 50%, #A29BFE 100%);
            color:white; position:relative; overflow:hidden;
        }
        .ai-section::before {
            content:''; position:absolute; top:0; left:0; right:0; bottom:0;
            background:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1.5' fill='rgba(255,255,255,0.08)'/%3E%3C/svg%3E");
            pointer-events:none;
        }
        .ai-section .section-title { color:white; }
        .ai-section .section-subtitle { color:rgba(255,255,255,0.85); }
        .ai-hero {
            display:flex; align-items:center; justify-content:center; gap:48px; margin-top:40px; flex-wrap:wrap;
        }
        .ai-mascot-area { display:flex; flex-direction:column; align-items:center; flex-shrink:0; }
        .ai-mascot {
            width:clamp(90px, 16vw, 140px); height:auto;
            filter:drop-shadow(0 8px 20px rgba(0,0,0,0.2));
            animation:float 3s ease-in-out infinite;
        }
        .ai-mascot-bubble {
            background:rgba(255,255,255,0.95); border-radius:16px; padding:10px 18px;
            margin-bottom:-4px; text-align:center; position:relative;
            box-shadow:0 4px 16px rgba(0,0,0,0.1);
        }
        .ai-mascot-bubble p { margin:0; font-weight:800; font-size:13px; color:var(--primary); }
        .ai-mascot-bubble::after {
            content:''; position:absolute; bottom:-9px; left:50%; margin-left:-7px;
            width:0; height:0; border-left:7px solid transparent; border-right:7px solid transparent;
            border-top:10px solid rgba(255,255,255,0.95);
        }
        .ai-steps-flow {
            display:flex; align-items:center; gap:16px; flex-wrap:wrap; justify-content:center;
        }
        .ai-step {
            background:rgba(255,255,255,0.12); backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,0.2); border-radius:20px;
            padding:28px 24px; text-align:center; width:200px; transition:transform 0.3s;
        }
        .ai-step:hover { transform:translateY(-6px); background:rgba(255,255,255,0.18); }
        .ai-step-icon {
            width:56px; height:56px; border-radius:50%; background:rgba(255,255,255,0.2);
            display:flex; align-items:center; justify-content:center; margin:0 auto 14px;
        }
        .ai-step-icon.pulse { animation:pulse 2s ease-in-out infinite; }
        .ai-step h3 { font-size:16px; font-weight:800; margin-bottom:6px; }
        .ai-step p { font-size:13px; opacity:0.85; line-height:1.5; }
        .ai-arrow { font-size:24px; color:rgba(255,255,255,0.4); font-weight:900; }
        .ai-badge {
            display:inline-flex; align-items:center; gap:8px;
            background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.25);
            padding:8px 20px; border-radius:50px; font-weight:700; font-size:14px; margin-bottom:24px;
        }
        @media (max-width:768px) {
            .ai-hero { flex-direction:column; }
            .ai-arrow { transform:rotate(90deg); }
            .ai-steps-flow { flex-direction:column; }
            .ai-step { width:100%; max-width:300px; }
        }

        /* ── How it works ── */
        .steps-container { display:flex; justify-content:center; gap:48px; flex-wrap:wrap; position:relative; }
        .step-item { text-align:center; flex:1; min-width:220px; max-width:300px; position:relative; }
        .step-mascot { width:70px; height:auto; margin:0 auto 12px; display:block; filter:drop-shadow(0 4px 12px rgba(108,92,231,0.2)); }
        .step-number {

/* ── Animated Counter ── */
const AnimatedCounter = ({ target, suffix = "", duration = 2000 }) => {
    const [count, setCount] = useState(0);
    const ref = useRef(null);
    const counted = useRef(false);
    useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting && !counted.current) {
                counted.current = true;
                const start = Date.now();
                const tick = () => {
                    const elapsed = Date.now() - start;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    setCount(Math.floor(eased * target));
                    if (progress < 1) requestAnimationFrame(tick);
                };
                tick();
            }
        }, { threshold: 0.5 });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
    }, [target, duration]);
    return <span ref={ref} className="stat-number">{count}{suffix}</span>;
};

/* ── Scroll Reveal ── */
const useReveal = () => {
    const ref = useRef(null);
    useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) entry.target.classList.add('visible');
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
    }, []);
    return ref;
};

const RevealDiv = ({ children, className = "", delay = 0, ...props }) => {
    const ref = useReveal();
    return <div ref={ref} className={`reveal ${delay ? `reveal-delay-${delay}` : ''} ${className}`} {...props}>{children}</div>;
};
