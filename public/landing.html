<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartKlass — Transformez vos cours en expériences interactives</title>
    <meta name="description" content="SmartKlass : la plateforme d'apprentissage interactive qui crée automatiquement des activités engageantes à partir de vos contenus. QCM, flashcards, quiz… en un clic.">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
    <link rel="shortcut icon" href="/icons/favicon.ico">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <meta name="theme-color" content="#6C5CE7">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Nunito', sans-serif; background: #F8F9FD; color: #2D3436; overflow-x: hidden; }

        /* ── Design Tokens ── */
        :root {
            --primary: #6C5CE7;
            --primary-light: #A29BFE;
            --secondary: #00B894;
            --secondary-light: #55EFC4;
            --accent: #E17055;
            --accent-light: #FAB1A0;
            --warning: #FDCB6E;
            --bg: #F8F9FD;
            --card: #FFFFFF;
            --text: #2D3436;
            --text-light: #636E72;
            --text-muted: #B2BEC3;
            --g1: linear-gradient(135deg, #6C5CE7, #A29BFE);
            --g2: linear-gradient(135deg, #00B894, #55EFC4);
            --g3: linear-gradient(135deg, #E17055, #FAB1A0);
            --shadow: 0 4px 20px rgba(0,0,0,0.06);
            --shadow-lg: 0 8px 40px rgba(0,0,0,0.12);
            --radius: 16px;
            --max-w: 1200px;
        }

        /* ── Animations ── */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.08); opacity: 0.8; }
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes flowLine {
            0% { stroke-dashoffset: 100; }
            100% { stroke-dashoffset: 0; }
        }

        .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }
        .reveal.visible { opacity: 1; transform: translateY(0); }
        .reveal-delay-1 { transition-delay: 0.1s; }
        .reveal-delay-2 { transition-delay: 0.2s; }
        .reveal-delay-3 { transition-delay: 0.3s; }
        .reveal-delay-4 { transition-delay: 0.4s; }
        .reveal-delay-5 { transition-delay: 0.5s; }

        /* ── CardNav Header ── */
        .card-nav-container {
            position: absolute;
            top: 2em;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            z-index: 99;
            box-sizing: border-box;
        }
        .card-nav {
            display: block;
            height: 60px;
            padding: 0;
            background-color: white;
            border: 0.5px solid rgba(0, 0, 0, 0.08);
            border-radius: 0.75rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            position: relative;
            overflow: hidden;
            will-change: height;
        }
        .card-nav-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.5rem 0.45rem 0.55rem 1.1rem;
            z-index: 2;
        }
        .hamburger-menu {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            gap: 6px;
        }
        .hamburger-menu:hover .hamburger-line { opacity: 0.75; }
        .hamburger-line {
            width: 30px;
            height: 2px;
            background-color: currentColor;
            transition: transform 0.25s ease, opacity 0.2s ease, margin 0.3s ease;
            transform-origin: 50% 50%;
        }
        .hamburger-menu.open .hamburger-line:first-child {
            transform: translateY(4px) rotate(45deg);
        }
        .hamburger-menu.open .hamburger-line:last-child {
            transform: translateY(-4px) rotate(-45deg);
        }
        .card-nav-logo-container {
            display: flex;
            align-items: center;
            gap: 8px;
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            font-size: 18px;
            font-weight: 900;
            color: var(--primary);
            text-decoration: none;
        }
        .card-nav-logo-container img {
            height: 28px;
            width: 28px;
            border-radius: 8px;
        }
        .card-nav-cta-button {
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: calc(0.75rem - 0.35rem);
            padding: 0 1rem;
            height: 100%;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
            display: flex;
            align-items: center;
        }
        .card-nav-cta-button:hover { background-color: #5A4BD1; }
        .card-nav-content {
            position: absolute;
            left: 0; right: 0;
            top: 60px; bottom: 0;
            padding: 0.5rem;
            display: flex;
            align-items: flex-end;
            gap: 12px;
            visibility: hidden;
            pointer-events: none;
            z-index: 1;
        }
        .card-nav.open .card-nav-content {
            visibility: visible;
            pointer-events: auto;
        }
        .nav-card {
            height: 100%;
            flex: 1 1 0;
            min-width: 0;
            border-radius: calc(0.75rem - 0.2rem);
            position: relative;
            display: flex;
            flex-direction: column;
            padding: 12px 16px;
            gap: 8px;
            user-select: none;
        }
        .nav-card-label {
            font-weight: 600;
            font-size: 20px;
            letter-spacing: -0.5px;
        }
        .nav-card-links {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .nav-card-link {
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            transition: opacity 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .nav-card-link:hover { opacity: 0.75; }
        .nav-card-link-icon { flex-shrink: 0; }

        @media (max-width: 768px) {
            .card-nav-container {
                width: 90%;
                top: 1.2em;
            }
            .card-nav-top {
                padding: 0.5rem 1rem;
                justify-content: space-between;
            }
            .hamburger-menu { order: 2; }
            .card-nav-logo-container {
                position: static;
                transform: none;
                order: 1;
            }
            .card-nav-cta-button { display: none; }
            .card-nav-content {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                padding: 0.5rem;
                bottom: 0;
                justify-content: flex-start;
            }
            .nav-card {
                height: auto;
                min-height: 60px;
                flex: 1 1 auto;
                max-height: none;
            }
            .nav-card-label { font-size: 18px; }
            .nav-card-link { font-size: 15px; }
        }

        /* ── Hero ── */
        .hero {
            min-height: 100vh; display: flex; align-items: center;
            padding: 120px 32px 80px;
            position: relative; overflow: hidden;
        }
        .hero::before {
            content: ''; position: absolute; top: -20%; right: -10%;
            width: 600px; height: 600px; border-radius: 50%;
            background: radial-gradient(circle, rgba(108,92,231,0.08) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero::after {
            content: ''; position: absolute; bottom: -10%; left: -10%;
            width: 500px; height: 500px; border-radius: 50%;
            background: radial-gradient(circle, rgba(0,184,148,0.06) 0%, transparent 70%);
            pointer-events: none;
        }
        .hero-inner {
            max-width: var(--max-w); margin: 0 auto; width: 100%;
            display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center;
        }
        .hero-text h1 {
            font-size: 52px; font-weight: 900; line-height: 1.1;
            color: var(--text); margin-bottom: 20px;
        }
        .hero-text h1 span {
            background: var(--g1); -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
        }
        .hero-text p {
            font-size: 19px; color: var(--text-light); line-height: 1.6;
            margin-bottom: 32px; max-width: 500px;
        }
        .hero-buttons { display: flex; gap: 16px; flex-wrap: wrap; }
        .btn-primary {
            background: var(--g1); color: white; border: none; padding: 14px 32px;
            border-radius: 50px; font-weight: 800; font-size: 16px; cursor: pointer;
            text-decoration: none; transition: transform 0.2s, box-shadow 0.2s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(108,92,231,0.35); }
        .btn-outline {
            background: transparent; color: var(--primary); border: 2px solid var(--primary);
            padding: 12px 30px; border-radius: 50px; font-weight: 800; font-size: 16px;
            cursor: pointer; text-decoration: none; transition: all 0.2s;
            display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-outline:hover { background: var(--primary); color: white; transform: translateY(-3px); }

        /* Hero Mockups */
        .hero-mockups {
            position: relative; height: 480px;
            perspective: 1200px;
        }
        .mockup-card {
            position: absolute; width: 300px; background: var(--card);
            border-radius: 20px; box-shadow: var(--shadow-lg);
            overflow: hidden; transition: transform 0.4s ease;
        }
        .mockup-card:nth-child(1) {
            top: 40px; left: 0; transform: rotate(-8deg);
            animation: float 4s ease-in-out infinite;
            z-index: 1;
        }
        .mockup-card:nth-child(2) {
            top: 10px; left: 80px; transform: rotate(0deg);
            animation: float 4s ease-in-out infinite 0.5s;
            z-index: 3;
        }
        .mockup-card:nth-child(3) {
            top: 50px; left: 160px; transform: rotate(8deg);
            animation: float 4s ease-in-out infinite 1s;
            z-index: 2;
        }
        .mockup-header {
            padding: 14px 16px; display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #F0F0F8;
        }
        .mockup-body { padding: 16px; }
        .mockup-dot {
            width: 8px; height: 8px; border-radius: 50%;
        }

        @media (max-width: 1024px) {
            .hero-inner { grid-template-columns: 1fr; text-align: center; }
            .hero-text h1 { font-size: 38px; }
            .hero-text p { margin: 0 auto 32px; }
            .hero-buttons { justify-content: center; }
            .hero-mockups { height: 360px; margin: 0 auto; max-width: 500px; }
            .mockup-card { width: 240px; }
            .mockup-card:nth-child(1) { left: 0; }
            .mockup-card:nth-child(2) { left: 60px; }
            .mockup-card:nth-child(3) { left: 120px; }
        }
        @media (max-width: 480px) {
            .hero { padding: 100px 20px 60px; }
            .hero-text h1 { font-size: 30px; }
            .hero-text p { font-size: 16px; }
            .hero-mockups { height: 300px; }
            .mockup-card { width: 200px; }
            .mockup-card:nth-child(1) { left: 0; top: 30px; }
            .mockup-card:nth-child(2) { left: 40px; top: 10px; }
            .mockup-card:nth-child(3) { left: 80px; top: 40px; }
        }

        /* ── Social Proof / Stats ── */
        .stats-bar {
            background: var(--card); padding: 40px 32px;
            border-top: 1px solid #F0F0F8; border-bottom: 1px solid #F0F0F8;
        }
        .stats-inner {
            max-width: var(--max-w); margin: 0 auto;
            display: flex; justify-content: center; gap: 80px; flex-wrap: wrap;
        }
        .stat-item { text-align: center; }
        .stat-number {
            font-size: 42px; font-weight: 900; background: var(--g1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .stat-label { font-size: 15px; color: var(--text-light); font-weight: 600; margin-top: 4px; }

        @media (max-width: 768px) {
            .stats-inner { gap: 40px; }
            .stat-number { font-size: 32px; }
        }

        /* ── Section layout ── */
        .section {
            padding: 100px 32px;
        }
        .section-inner {
            max-width: var(--max-w); margin: 0 auto;
        }
        .section-title {
            font-size: 40px; font-weight: 900; text-align: center;
            margin-bottom: 16px; color: var(--text);
        }
        .section-subtitle {
            font-size: 18px; color: var(--text-light); text-align: center;
            max-width: 600px; margin: 0 auto 60px; line-height: 1.6;
        }

        @media (max-width: 768px) {
            .section { padding: 60px 20px; }
            .section-title { font-size: 28px; }
            .section-subtitle { font-size: 16px; margin-bottom: 40px; }
        }

        /* ── Features Grid ── */
        .features-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
        }
        .feature-card {
            background: var(--card); border-radius: var(--radius); padding: 32px;
            box-shadow: var(--shadow); transition: transform 0.3s, box-shadow 0.3s;
        }
        .feature-card:hover {
            transform: translateY(-6px); box-shadow: var(--shadow-lg);
        }
        .feature-icon {
            width: 56px; height: 56px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 20px; font-size: 26px;
        }
        .feature-card h3 { font-size: 20px; font-weight: 800; margin-bottom: 10px; }
        .feature-card p { font-size: 15px; color: var(--text-light); line-height: 1.6; }

        @media (max-width: 1024px) {
            .features-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 600px) {
            .features-grid { grid-template-columns: 1fr; }
        }

        /* ── AI Section ── */
        .ai-section {
            background: linear-gradient(135deg, #6C5CE7 0%, #8B7CF7 50%, #A29BFE 100%);
            color: white; position: relative; overflow: hidden;
        }
        .ai-section::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='30' cy='30' r='1.5' fill='rgba(255,255,255,0.08)'/%3E%3C/svg%3E");
            pointer-events: none;
        }
        .ai-section .section-title { color: white; }
        .ai-section .section-subtitle { color: rgba(255,255,255,0.85); }
        .ai-steps {
            display: flex; align-items: center; justify-content: center;
            gap: 24px; flex-wrap: wrap; margin-top: 40px;
        }
        .ai-step {
            background: rgba(255,255,255,0.12); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 20px; padding: 32px 28px; text-align: center;
            width: 240px; transition: transform 0.3s;
        }
        .ai-step:hover { transform: translateY(-6px); background: rgba(255,255,255,0.18); }
        .ai-step-icon {
            width: 64px; height: 64px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 16px; font-size: 28px;
        }
        .ai-step-icon.pulse { animation: pulse 2s ease-in-out infinite; }
        .ai-step h3 { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
        .ai-step p { font-size: 14px; opacity: 0.85; line-height: 1.5; }
        .ai-arrow {
            font-size: 28px; color: rgba(255,255,255,0.5); font-weight: 900;
        }
        .ai-badge {
            display: inline-flex; align-items: center; gap: 8px;
            background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.25);
            padding: 8px 20px; border-radius: 50px; font-weight: 700; font-size: 14px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .ai-arrow { transform: rotate(90deg); }
            .ai-steps { flex-direction: column; }
            .ai-step { width: 100%; max-width: 320px; }
        }

        /* ── How it works ── */
        .steps-container {
            display: flex; justify-content: center; gap: 60px; flex-wrap: wrap;
            position: relative;
        }
        .step-item {
            text-align: center; flex: 1; min-width: 220px; max-width: 300px;
            position: relative;
        }
        .step-number {
            width: 56px; height: 56px; border-radius: 50%;
            background: var(--g1); color: white;
            font-size: 24px; font-weight: 900;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px; position: relative; z-index: 2;
        }
        .step-item h3 { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        .step-item p { font-size: 15px; color: var(--text-light); line-height: 1.5; }
        .step-item:not(:last-child)::after {
            content: ''; position: absolute; top: 28px; left: calc(50% + 40px);
            width: calc(100% - 20px); height: 2px;
            background: linear-gradient(90deg, var(--primary-light), var(--text-muted));
            z-index: 1;
        }

        @media (max-width: 768px) {
            .steps-container { flex-direction: column; align-items: center; gap: 40px; }
            .step-item:not(:last-child)::after { display: none; }
        }

        /* ── Pricing ── */
        .pricing-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px;
            align-items: start;
        }
        .pricing-card {
            background: var(--card); border-radius: var(--radius); padding: 36px 28px;
            box-shadow: var(--shadow); text-align: center;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative; border: 2px solid transparent;
        }
        .pricing-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); }
        .pricing-card.featured {
            border-color: var(--primary); transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(108,92,231,0.15);
        }
        .pricing-card.featured:hover { transform: scale(1.05) translateY(-6px); }
        .pricing-badge {
            position: absolute; top: -14px; left: 50%; transform: translateX(-50%);
            background: var(--g1); color: white; padding: 4px 20px;
            border-radius: 50px; font-size: 13px; font-weight: 800;
            white-space: nowrap;
        }
        .pricing-card h3 { font-size: 22px; font-weight: 800; margin-bottom: 8px; }
        .pricing-price {
            font-size: 48px; font-weight: 900; color: var(--primary); margin: 16px 0;
        }
        .pricing-price span { font-size: 16px; font-weight: 600; color: var(--text-light); }
        .pricing-features {
            list-style: none; text-align: left; margin: 24px 0; padding: 0;
        }
        .pricing-features li {
            padding: 8px 0; font-size: 15px; color: var(--text-light);
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid #F0F0F8;
        }
        .pricing-features li:last-child { border-bottom: none; }
        .check { color: var(--secondary); font-weight: 900; font-size: 16px; }
        .pricing-cta {
            display: block; width: 100%; padding: 14px; border-radius: 50px;
            font-weight: 800; font-size: 16px; cursor: pointer;
            text-decoration: none; text-align: center;
            transition: all 0.2s; margin-top: 8px; border: 2px solid var(--primary);
            background: transparent; color: var(--primary);
        }
        .pricing-cta:hover { background: var(--primary); color: white; }
        .pricing-card.featured .pricing-cta {
            background: var(--g1); color: white; border-color: transparent;
        }
        .pricing-card.featured .pricing-cta:hover { box-shadow: 0 6px 20px rgba(108,92,231,0.3); transform: translateY(-2px); }
        .pricing-note {
            text-align: center; margin-top: 24px; font-size: 14px; color: var(--text-muted);
        }

        @media (max-width: 1024px) {
            .pricing-grid { grid-template-columns: 1fr; max-width: 420px; margin: 0 auto; gap: 20px; }
            .pricing-card.featured { transform: scale(1); }
            .pricing-card.featured:hover { transform: translateY(-6px); }
        }

        /* ── FAQ ── */
        .faq-list {
            max-width: 720px; margin: 0 auto;
        }
        .faq-item {
            background: var(--card); border-radius: var(--radius);
            margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden;
        }
        .faq-question {
            width: 100%; padding: 20px 24px; background: none; border: none;
            font-family: inherit; font-size: 17px; font-weight: 700;
            color: var(--text); text-align: left; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            transition: color 0.2s;
        }
        .faq-question:hover { color: var(--primary); }
        .faq-arrow {
            font-size: 20px; transition: transform 0.3s; color: var(--text-muted);
        }
        .faq-item.open .faq-arrow { transform: rotate(180deg); color: var(--primary); }
        .faq-answer {
            max-height: 0; overflow: hidden; transition: max-height 0.4s ease, padding 0.3s ease;
            padding: 0 24px;
        }
        .faq-item.open .faq-answer {
            max-height: 300px; padding: 0 24px 20px;
        }
        .faq-answer p { font-size: 15px; color: var(--text-light); line-height: 1.7; }

        /* ── Final CTA ── */
        .final-cta {

/* ── CardNav Component ── */
const ArrowIcon = () => (
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="nav-card-link-icon">
        <path d="M7 17L17 7"/><path d="M7 7h10v10"/>
    </svg>
);

const CardNav = ({
    logo,
    logoAlt = 'Logo',
    logoText = '',
    items,
    className = '',
    ease = 'power3.out',
    baseColor = '#fff',
    menuColor,
    buttonBgColor,
    buttonTextColor,
    ctaLabel = 'Get Started',
    ctaHref = '#',
    onNavigate
}) => {
    const [isHamburgerOpen, setIsHamburgerOpen] = useState(false);
    const [isExpanded, setIsExpanded] = useState(false);
    const navRef = useRef(null);
    const cardsRef = useRef([]);
    const tlRef = useRef(null);

    const calculateHeight = () => {
        const navEl = navRef.current;
        if (!navEl) return 260;
        const isMobile = window.matchMedia('(max-width: 768px)').matches;
        if (isMobile) {
            const contentEl = navEl.querySelector('.card-nav-content');
            if (contentEl) {
                const wasVisible = contentEl.style.visibility;
                const wasPointerEvents = contentEl.style.pointerEvents;
                const wasPosition = contentEl.style.position;
                const wasHeight = contentEl.style.height;
                contentEl.style.visibility = 'visible';
                contentEl.style.pointerEvents = 'auto';
                contentEl.style.position = 'static';
                contentEl.style.height = 'auto';
                contentEl.offsetHeight;
                const topBar = 60;
                const padding = 16;
                const contentHeight = contentEl.scrollHeight;
                contentEl.style.visibility = wasVisible;
                contentEl.style.pointerEvents = wasPointerEvents;
                contentEl.style.position = wasPosition;
                contentEl.style.height = wasHeight;
                return topBar + contentHeight + padding;
            }
        }
        return 260;
    };

    const createTimeline = () => {
        const navEl = navRef.current;
        if (!navEl) return null;
        gsap.set(navEl, { height: 60, overflow: 'hidden' });
        gsap.set(cardsRef.current, { y: 50, opacity: 0 });
        const tl = gsap.timeline({ paused: true });
        tl.to(navEl, { height: calculateHeight, duration: 0.4, ease });
        tl.to(cardsRef.current, { y: 0, opacity: 1, duration: 0.4, ease, stagger: 0.08 }, '-=0.1');
        return tl;
    };

    useLayoutEffect(() => {
        const tl = createTimeline();
        tlRef.current = tl;
        return () => { tl?.kill(); tlRef.current = null; };
    }, [ease, items]);

    useLayoutEffect(() => {
        const handleResize = () => {
            if (!tlRef.current) return;
            if (isExpanded) {
                const newHeight = calculateHeight();
                gsap.set(navRef.current, { height: newHeight });
                tlRef.current.kill();
                const newTl = createTimeline();
                if (newTl) { newTl.progress(1); tlRef.current = newTl; }
            } else {
                tlRef.current.kill();
                const newTl = createTimeline();
                if (newTl) { tlRef.current = newTl; }
            }
        };
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
    }, [isExpanded]);

    const toggleMenu = () => {
        const tl = tlRef.current;
        if (!tl) return;
        if (!isExpanded) {
            setIsHamburgerOpen(true);
            setIsExpanded(true);
            tl.play(0);
        } else {
            setIsHamburgerOpen(false);
            tl.eventCallback('onReverseComplete', () => setIsExpanded(false));
            tl.reverse();
        }
    };

    const handleLinkClick = (e, id) => {
        e.preventDefault();
        // Close menu first
        const tl = tlRef.current;
        if (tl && isExpanded) {
            setIsHamburgerOpen(false);
            tl.eventCallback('onReverseComplete', () => {
                setIsExpanded(false);
                if (onNavigate && id) onNavigate(id);
            });
            tl.reverse();
        } else {
            if (onNavigate && id) onNavigate(id);
        }
    };

    const setCardRef = (i) => (el) => {
        if (el) cardsRef.current[i] = el;
    };

    return (
        <div className={`card-nav-container ${className}`}>
            <nav ref={navRef} className={`card-nav ${isExpanded ? 'open' : ''}`} style={{ backgroundColor: baseColor }}>
                <div className="card-nav-top">
                    <div
                        className={`hamburger-menu ${isHamburgerOpen ? 'open' : ''}`}
                        onClick={toggleMenu}
                        role="button"
                        aria-label={isExpanded ? 'Fermer le menu' : 'Ouvrir le menu'}
                        tabIndex={0}
                        style={{ color: menuColor || '#000' }}
                    >
                        <div className="hamburger-line" />
                        <div className="hamburger-line" />
                    </div>
                    <a href="#" className="card-nav-logo-container" onClick={(e) => { e.preventDefault(); window.scrollTo({top:0,behavior:'smooth'}); }}>
                        <img src={logo} alt={logoAlt} />
                        {logoText && <span>{logoText}</span>}
                    </a>
                    <a
                        href={ctaHref}
                        className="card-nav-cta-button"
                        style={{ backgroundColor: buttonBgColor, color: buttonTextColor }}
                    >
                        {ctaLabel}
                    </a>
                </div>
                <div className="card-nav-content" aria-hidden={!isExpanded}>
                    {(items || []).slice(0, 3).map((item, idx) => (
                        <div
                            key={`${item.label}-${idx}`}
                            className="nav-card"
                            ref={setCardRef(idx)}
                            style={{ backgroundColor: item.bgColor, color: item.textColor }}
                        >
                            <div className="nav-card-label">{item.label}</div>
                            <div className="nav-card-links">
                                {item.links?.map((lnk, i) => (
                                    <a
                                        key={`${lnk.label}-${i}`}
                                        className="nav-card-link"
                                        href={`#${lnk.id || ''}`}
                                        onClick={(e) => handleLinkClick(e, lnk.id)}
                                        aria-label={lnk.ariaLabel || lnk.label}
                                    >
                                        <ArrowIcon />
                                        {lnk.label}
                                    </a>
                                ))}
                            </div>
                        </div>
                    ))}
                </div>
            </nav>
        </div>
    );
};

/* ── Animated Counter ── */
const AnimatedCounter = ({ target, suffix = "", duration = 2000 }) => {
    const [count, setCount] = useState(0);
    const ref = useRef(null);
    const counted = useRef(false);

    useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting && !counted.current) {
                counted.current = true;
                const start = Date.now();
                const tick = () => {
                    const elapsed = Date.now() - start;
                    const progress = Math.min(elapsed / duration, 1);
                    const eased = 1 - Math.pow(1 - progress, 3);
                    setCount(Math.floor(eased * target));
                    if (progress < 1) requestAnimationFrame(tick);
                };
                tick();
            }
        }, { threshold: 0.5 });
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
    }, [target, duration]);

    return <span ref={ref} className="stat-number">{count}{suffix}</span>;
};

/* ── Scroll Reveal Hook ── */
const useReveal = () => {
    const ref = useRef(null);
    useEffect(() => {
        const observer = new IntersectionObserver(
            ([entry]) => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            },
            { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
        );
        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
    }, []);
    return ref;
};

const RevealDiv = ({ children, className = "", delay = 0, ...props }) => {
    const ref = useReveal();
    return (
        <div ref={ref} className={`reveal ${delay ? `reveal-delay-${delay}` : ''} ${className}`} {...props}>
            {children}
        </div>
    );
};
